    <button type="button" id="composerFabBtn" title="Open composer" aria-label="Open composer"><svg viewBox="0 0 24 24"
        fill="none" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="7.25"></circle>
      </svg></button>
    <div class="composer-overlay" id="composerOverlay" hidden>
      <form class="composer" id="composer">
        <div class="composer-main-shell">
          <div class="target-picker" id="targetPicker"></div>
          <div class="composer-stack">
            <div class="composer-plus-menu" id="composerPlusMenu">
              <button type="button" class="composer-plus-toggle" id="cameraBtn" aria-label="Import" title="Import">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3.5"
                  stroke-linecap="round" stroke-linejoin="round">
                  <line x1="12" y1="5" x2="12" y2="19"></line>
                  <line x1="5" y1="12" x2="19" y2="12"></line>
                </svg>
              </button>
              <input type="file" id="cameraInput" class="attach-file-input" multiple>
            </div>
            <div class="composer-shell">
              <div class="composer-above-input">
                <div id="attachPreviewRow" class="attach-preview-row" style="display:none"></div>
              </div>
              <div class="composer-input-anchor">
                <div class="composer-field">
                  <textarea id="message" placeholder="Write a message"></textarea>
                  <button type="button" id="micBtn" class="mic-btn" aria-label="Voice input">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                      stroke-linecap="round" stroke-linejoin="round">
                      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                      <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                      <line x1="12" y1="19" x2="12" y2="23"></line>
                      <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                  </button>
                  <button type="submit" class="send-btn" aria-label="Send">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                      stroke-linecap="round" stroke-linejoin="round">
                      <line x1="12" y1="19" x2="12" y2="5"></line>
                      <polyline points="5 12 12 5 19 12"></polyline>
                    </svg>
                  </button>
                </div>
              </div>
              <div id="pendingLaunchControls" class="pending-launch-controls" hidden>
                <button type="button" id="pendingLaunchBtn" class="pending-launch-btn" disabled>Start Session</button>
              </div>
            </div>
            <div class="quick-actions">
              <details class="quick-more">
                <summary class="quick-action quick-more-toggle"><span class="action-emoji">⋯</span><span
                    class="action-label">Cmd</span><span class="action-mobile">Cmd</span></summary>
                <div class="quick-more-menu">
                  <button type="button" class="quick-action" data-shortcut="save"><span
                      class="action-emoji">📝</span><span class="action-label">Save Log</span><span
                      class="action-mobile">Save</span></button>
                  <button type="button" class="quick-action" data-shortcut="restart"
                    title="Restart selected agent panes"><span class="action-icon" aria-hidden="true"><svg
                        viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="5" width="18" height="14" rx="2.5"></rect>
                        <path d="M15.5 10A4 4 0 1 0 16 15"></path>
                        <path d="M16 9v3h-3"></path>
                      </svg></span><span class="action-label">Restart</span><span
                      class="action-mobile">Restart</span></button>
                  <button type="button" class="quick-action" data-shortcut="resume"
                    title="Resume selected agent panes"><span class="action-icon" aria-hidden="true"><svg
                        viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 5v10"></path>
                        <path d="m8 11 4 4 4-4"></path>
                        <path d="M5 19h14"></path>
                      </svg></span><span class="action-label">Resume</span><span
                      class="action-mobile">Resume</span></button>
                  <button type="button" class="quick-action" data-shortcut="ctrlc"
                    title="Send Ctrl+C to selected agents"><span class="action-icon" aria-hidden="true"><svg
                        viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="5" width="18" height="14" rx="2.5"></rect>
                        <path d="M8 10h.01"></path>
                        <path d="M11 10h.01"></path>
                        <path d="M14 10h.01"></path>
                        <path d="M17 10h.01"></path>
                        <path d="M8 14h8"></path>
                      </svg></span><span class="action-label">Ctrl+C</span><span
                      class="action-mobile">Ctrl+C</span></button>
                  <button type="button" class="quick-action" data-shortcut="enter"
                    title="Send Enter to selected agents"><span class="action-icon" aria-hidden="true"><svg
                        viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="9 10 4 15 9 20"></polyline>
                        <path d="M20 4v7a4 4 0 0 1-4 4H4"></path>
                      </svg></span><span class="action-label">Enter</span><span
                      class="action-mobile">Enter</span></button>
                  <button type="button" class="quick-action" data-shortcut="interrupt"
                    title="Send Escape to selected agents"><span class="action-icon" aria-hidden="true"><svg
                        viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="5" width="18" height="14" rx="2.5"></rect>
                        <path d="m9 10 6 6"></path>
                        <path d="m15 10-6 6"></path>
                      </svg></span><span class="action-label">Interrupt</span><span
                      class="action-mobile">Esc</span></button>
                </div>
              </details>
            </div>
          </div>
        </div>
        <div class="statusline" id="statusline"></div>
      </form>
    </div>
