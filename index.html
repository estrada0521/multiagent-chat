<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>okadaharuto.com</title>
  <meta name="description" content="okadaharuto.com">
  <style>
    :root {
      color-scheme: dark;
      --bg: rgb(10, 10, 10);
      --text: rgb(252, 252, 252);
      --muted: rgba(252, 252, 252, 0.58);
      --line: rgba(255, 255, 255, 0.1);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: "anthropicSans", "SF Pro Text", "Hiragino Sans", "Yu Gothic UI", sans-serif;
    }
    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
    main {
      width: min(560px, 100%);
      text-align: center;
    }
    p {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.9;
      letter-spacing: 0.01em;
    }
    .actions {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }
    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 42px;
      padding: 0 16px;
      border-radius: 999px;
      border: 0.5px solid var(--line);
      color: var(--text);
      text-decoration: none;
      background: transparent;
      transition: background 140ms ease, border-color 140ms ease, transform 140ms ease;
    }
    a:hover {
      background: rgba(255, 255, 255, 0.04);
      border-color: rgba(255, 255, 255, 0.16);
      transform: translateY(-1px);
    }
  </style>
</head>
<body>
  <main>
    <p>Quietly under construction.</p>
    <div class="actions">
      <a href="https://hub.okadaharuto.com/">Open Hub</a>
    </div>
  </main>
</body>
</html>
