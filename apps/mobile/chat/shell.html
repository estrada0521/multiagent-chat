<!doctype html>
<html lang="en" data-theme="__THEME__">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="__DARK_BG__">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="agent-index chat">
  <link rel="manifest" href="__CHAT_MANIFEST_URL__">
  <link rel="icon" type="image/png" sizes="192x192" href="__CHAT_PWA_ICON_192_URL__">
  <link rel="apple-touch-icon" href="__CHAT_APPLE_TOUCH_ICON_URL__">
  <title>agent-index chat</title>
  <script>
    if (new URLSearchParams(window.location.search).get("launch_shell") === "1") {
      document.documentElement.dataset.launchShell = "1";
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/ansi_up@5.1.0/ansi_up.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-typescript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-yaml.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-css.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-markup.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"></script>
__CHAT_MAIN_STYLE_BLOCK____CHAT_SHELL_STYLE_BLOCK__  <style id="chatFontSettingsStyle">
    __AGENT_FONT_MODE_INLINE_STYLE__
  </style>
</head>

<body>
  <div id="fileDropdown"></div>
  <div id="cmdDropdown"></div>

  <section class="shell">
    __CHAT_HEADER_HTML__
    <select id="hubPageNativeMenuSelect" class="hub-native-menu-select" aria-label="Menu">
      <option value="">Menu</option>
      <option value="openGitBranchMenu" data-menu-icon="branches">Git Branches</option>
      <option value="openAttachedFilesMenu" data-menu-icon="files">Repository</option>
      <option value="reloadChat" data-menu-icon="reload">Reload</option>
      <option value="openPaneTraceWindow" data-menu-icon="pane">Pane Trace</option>
      <option value="addAgent" data-menu-icon="add">Add Agent</option>
      <option value="removeAgent" data-menu-icon="remove">Remove Agent</option>
    </select>
    <main id="messages"></main>
    <button type="button" id="scrollToBottomBtn" title="Scroll to bottom" aria-label="Scroll to bottom"><svg
        viewBox="0 0 24 24" fill="none" stroke-width="2.8" stroke-linecap="round" stroke-linejoin="round"
        aria-hidden="true">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg></button>
__CHAT_COMPOSER_HTML__  </section>
__CHAT_APP_SCRIPT_BLOCK__</body>

</html>
