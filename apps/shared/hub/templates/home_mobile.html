<!doctype html>
<html lang="en" data-theme="__THEME__">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="__DARK_BG__">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="__APP_DISPLAY_NAME__">
  <link rel="manifest" href="__HUB_MANIFEST_URL__">
  <link rel="icon" type="image/png" sizes="192x192" href="__PWA_ICON_192_URL__">
  <link rel="apple-touch-icon" href="__APPLE_TOUCH_ICON_URL__">
  <script>
    (() => {
      if (!("serviceWorker" in navigator)) return;
      const isLocalHost = location.hostname === "localhost" || location.hostname === "127.0.0.1" || location.hostname === "[::1]";
      if (!(window.isSecureContext || isLocalHost)) return;
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/hub-service-worker.js", { scope: "/" }).catch((err) => {
          console.warn("hub service worker registration failed", err);
        });
      }, { once: true });
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">
  <title>__PAGE_TITLE__</title>
  <style>
__HUB_INCLUDE:home_mobile.css__
  </style>
</head>

<body>
  <div id="launchShell" class="launch-shell" hidden>
    <div class="launch-shell-card" aria-hidden="true">
      <span class="launch-shell-spinner"></span>
    </div>
  </div>
  <div id="chatOverlay" hidden><iframe id="chatFrame" src="about:blank"
      allow="camera; microphone; clipboard-write"></iframe></div>
  <div id="mobSheet" class="mob-sheet-backdrop mobile-bottom-sheet-backdrop" hidden>
    <div class="mob-sheet-panel mobile-bottom-sheet-panel" id="mobSheetPanel">
      <div class="mob-sheet-nav mobile-bottom-sheet-nav" id="mobSheetNav">
        <div class="mob-sheet-pill mobile-bottom-sheet-pill"></div>
        <div class="mob-sheet-nav-bar mobile-bottom-sheet-nav-bar">
          <button class="mob-sheet-back-btn mob-sheet-glass-btn" id="mobSheetBackBtn" aria-label="Back" hidden>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 6 9 12 15 18"/></svg>
          </button>
          <div class="mob-sheet-nav-gap"></div>
          <div class="mob-sheet-nav-title mobile-bottom-sheet-title" id="mobSheetTitle"></div>
          <button class="mob-sheet-close mob-sheet-glass-btn mobile-bottom-sheet-button" id="mobSheetClose" aria-label="Close">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
              stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
      </div>
      <iframe id="mobSheetFrame"
        srcdoc="<!doctype html><html><head><meta name='color-scheme' content='__COLOR_SCHEME__'><style>html,body{margin:0;min-height:100%;background:transparent;color-scheme:__COLOR_SCHEME__}</style></head><body></body></html>"
        allow="camera; microphone; clipboard-write"></iframe>
    </div>
  </div>
  <div class="hub-top-blur hub-top-blur-1" aria-hidden="true"></div>
  <div class="hub-top-blur hub-top-blur-2" aria-hidden="true"></div>
  <div class="hub-top-blur hub-top-blur-3" aria-hidden="true"></div>
  <div class="hub-top-blur hub-top-blur-4" aria-hidden="true"></div>
  <div class="hub-top-blur hub-top-blur-5" aria-hidden="true"></div>
  <div class="hub-top-blur hub-top-blur-6" aria-hidden="true"></div>
  <div class="hub-top-blur hub-top-blur-7" aria-hidden="true"></div>
  <div class="hub-top-blur hub-top-blur-8" aria-hidden="true"></div>
  <div class="hub-top-gradient" aria-hidden="true"></div>
  <div class="shell">
    __HUB_HEADER_HTML__
    <p class="hub-mobile-tagline"><b>Making Life Multiplanetary</b></p>
    <div class="mob-list-wrap" id="mobListWrap">
      <div class="mob-empty loading" id="mobLoading"><span class="mob-inline-loading"><span class="mob-inline-loading-spinner" aria-hidden="true"></span></span></div>
    </div>
  </div>
  <script>
__HUB_INCLUDE:home_mobile.js__
  </script>
  <div id="safariSafeAreaHack"
    style="position:absolute;bottom:0;width:100%;height:env(safe-area-inset-bottom);pointer-events:none;opacity:0;z-index:-1;">
  </div>
</body>

</html>
