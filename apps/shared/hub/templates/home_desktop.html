<!doctype html>
<html lang="en" data-theme="black-hole">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="__DARK_BG__">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Session Hub">
  <link rel="manifest" href="__HUB_MANIFEST_URL__">
  <link rel="icon" type="image/png" sizes="192x192" href="__PWA_ICON_192_URL__">
  <link rel="apple-touch-icon" href="__APPLE_TOUCH_ICON_URL__">
  <script>
    (() => {
      if (!("serviceWorker" in navigator)) return;
      const isLocalHost = location.hostname === "localhost" || location.hostname === "127.0.0.1" || location.hostname === "[::1]";
      if (!(window.isSecureContext || isLocalHost)) return;
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/hub-service-worker.js", { scope: "/" }).catch((err) => {
          console.warn("hub service worker registration failed", err);
        });
      }, { once: true });
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">
  <title>Session Hub</title>
  <script>
    (() => {
      const markTauriApp = () => {
        document.documentElement.dataset.tauriApp = "1";
        try { sessionStorage.setItem("multiagent_tauri_app", "1"); } catch (_) {}
        window.__multiagentIsTauriApp = true;
      };
      try {
        const params = new URLSearchParams(window.location.search || "");
        const stored = sessionStorage.getItem("multiagent_tauri_app") === "1";
        if (
          params.get("tauri") === "1" ||
          stored ||
          typeof window.__TAURI__ !== "undefined" ||
          typeof window.__TAURI_INTERNALS__ !== "undefined"
        ) {
          markTauriApp();
        }
      } catch (_) {}
    })();
  </script>
  <style>
__HUB_INCLUDE:home_desktop.css__
  </style>
</head>
<body>
  <div class="shell">
    <button type="button" class="desk-app-sidebar-toggle" id="deskAppSidebarToggle" aria-label="Toggle sessions sidebar" title="Sessions">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="4" y="5" width="16" height="14" rx="2.5"></rect>
        <path d="M9 5v14"></path>
      </svg>
    </button>
    <button type="button" class="desk-chat-menu-btn" id="deskChatMenuBtn" aria-label="Menu" title="Menu">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
        <line x1="4" y1="9" x2="20" y2="9"></line>
        <line x1="10" y1="15" x2="20" y2="15"></line>
      </svg>
    </button>
    <div class="desk-right-panel-controls" id="deskRightPanelControls" aria-label="Right panel">
      <button type="button" class="desk-panel-ctrl-btn" id="deskPanelToggle" aria-label="Toggle Repo / Git panel" title="Repo / Git" aria-pressed="false">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="3" width="18" height="18" rx="2"></rect><line x1="15" y1="3" x2="15" y2="21"></line></svg>
      </button>
    </div>
    <div class="desk-workbench" id="deskWorkbench">
      <aside class="desk-sidebar" id="deskSidebar">
        <div class="desk-sidebar-shell">
          <div class="desk-sidebar-content">
            <div class="desk-sidebar-sessions" id="deskSidebarSessions">
              <div class="desk-new-session-section">
                <div class="desk-session-row desk-new-session-toggle" id="deskNewSessionToggle" tabindex="0" role="button" aria-label="New Session">
                  <div class="desk-row-head">
                    <div class="desk-row-main">
                      <span class="desk-row-leading-icon" aria-hidden="true">
                        <svg viewBox="0 0 24 24">
                          <path d="M12 5v14"></path>
                          <path d="M5 12h14"></path>
                        </svg>
                      </span>
                      <div class="desk-row-stack">
                        <div class="desk-row-name">New Session</div>
                      </div>
                    </div>
                  </div>
                </div>
              </div>
              <div class="desk-session-list" id="deskSessionList">
                <div class="desk-empty-list">Loading sessions…</div>
              </div>
            </div>
            <div class="desk-sidebar-pane" id="deskSidebarPane" hidden>
              <div class="desk-sidebar-pane-head">
                <div class="desk-sidebar-pane-title" id="deskSidebarPaneTitle">New Session</div>
              </div>
              <iframe
                class="desk-sidebar-frame"
                id="deskSidebarFrame"
                src="about:blank"
                allow="camera; microphone; clipboard-write"
              ></iframe>
            </div>
          </div>
        </div>
      </aside>
      <div class="desk-floating-controls" aria-label="Hub controls">
        <button type="button" class="desk-settings-icon-btn" id="deskReloadBtn" aria-label="Reload" title="Reload">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"></path><path d="M20 12a8 8 0 1 1-2.1-5.3L21 8"></path></svg>
        </button>
        <button type="button" class="desk-settings-icon-btn" id="deskSettingsBtn" data-desk-action="open-settings" aria-label="Settings" title="Settings">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>
        </button>
      </div>
      <div class="desk-sidebar-resizer" id="deskSidebarResizer" aria-hidden="true"></div>
      <section class="desk-main">
        <div class="desk-chat-shell">
          <iframe
            class="desk-chat-frame"
            id="deskChatFrame"
            src="about:blank"
            allow="camera; microphone; clipboard-write"
          ></iframe>
        </div>
      </section>
      <div class="desk-workbench-outline" aria-hidden="true"></div>
    </div>
  </div>
  <div id="deskReloadShell" class="desk-reload-shell" hidden>
    <div class="desk-reload-shell-card">
      <span class="desk-reload-shell-spinner" aria-hidden="true"></span>
    </div>
  </div>
  <script>
__HUB_INCLUDE:home_desktop.js__
  </script>
  <script>
    (function() {
      if (document.documentElement.dataset.tauriApp === "1") {
        console.log("[App] Hub UI Initialized (Fixed Black Mode)");
      }
    })();
  </script>
</body>
</html>
