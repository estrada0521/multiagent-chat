<!doctype html>
<html lang="en" data-theme="black-hole" data-view-variant="__VIEW_VARIANT__">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="__DARK_BG__">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Session Hub">
  <link rel="manifest" href="__HUB_MANIFEST_URL__">
  <link rel="icon" type="image/png" sizes="192x192" href="__PWA_ICON_192_URL__">
  <link rel="apple-touch-icon" href="__APPLE_TOUCH_ICON_URL__">
  <title>Hub Settings</title>
  <script>
    (() => {
      const params = new URLSearchParams(window.location.search || "");
      let embed = (params.get("embed") || "") === "1";
      if (!embed) {
        const rawTarget = (params.get("target") || "").trim();
        if (rawTarget) {
          try {
            const next = new URL(rawTarget, window.location.origin);
            embed = (next.searchParams.get("embed") || "") === "1";
          } catch (_) {}
        }
      }
      if (embed) {
        document.documentElement.dataset.hubEmbed = "1";
      }
    })();
  </script>
  <style>
__HUB_INCLUDE:settings.css__
  </style>
</head>
<body>
  <div class="shell">
    __HUB_HEADER_HTML__
    <section class="hero">
      <div class="eyebrow">multiagent</div>
      <h1>Settings</h1>
      <div class="hub-nav">
        <a href="/">Hub</a>
        <a href="/new-session">New Session</a>
        <a href="/settings" class="active">Settings</a>
        <form class="hub-restart-form" method="post" action="/restart-hub"><button type="submit">Restart Hub</button></form>
      </div>
    </section>

    <form class="panel" id="settingsFormDesktop" method="post" action="/settings">
      __NOTICE_HTML__
      
      <div class="field" style="border:none; padding:0;">
        <div class="chat-toggles">
          <div class="toggle-row" style="flex-direction:column; align-items:flex-start; border-bottom:0; padding-bottom:12px;">
            <span class="toggle-row-copy" style="margin-bottom:6px;">
              <div class="set-desk-bullet"><i></i></div><label for="user_message_font" style="cursor:pointer;">User Messages</label>
            </span>
            <select id="user_message_font" name="user_message_font" style="width:100%; padding:6px 10px; font-size:13px; cursor:pointer;">
              __USER_MESSAGE_FONT_OPTIONS__
            </select>
          </div>
          <div class="toggle-row" style="flex-direction:column; align-items:flex-start; padding-bottom:12px;">
            <span class="toggle-row-copy" style="margin-bottom:6px;">
              <div class="set-desk-bullet"><i></i></div><label for="agent_message_font" style="cursor:pointer;">Agent Messages</label>
            </span>
            <select id="agent_message_font" name="agent_message_font" style="width:100%; padding:6px 10px; font-size:13px; cursor:pointer;">
              __AGENT_MESSAGE_FONT_OPTIONS__
            </select>
          </div>
          <div class="toggle-row">
            <span class="toggle-row-copy">
              <div class="set-desk-bullet"><i></i></div><label for="message_text_size" style="cursor:pointer;">Text Size</label>
            </span>
            <input id="message_text_size" name="message_text_size" type="number" min="11" max="18" step="1" value="__MESSAGE_TEXT_SIZE__" style="width: 72px; padding: 6px 10px;">
          </div>
          <div class="toggle-row">
            <span class="toggle-row-copy">
              <div class="set-desk-bullet"><i></i></div><label for="theme_bg_level" style="cursor:pointer;">Background Shade</label>
            </span>
            <input id="theme_bg_level" name="theme_bg_level" type="number" min="0" max="40" step="1" value="__THEME_BG_LEVEL__" style="width: 72px; padding: 6px 10px;">
          </div>
          <div class="toggle-row">
            <span class="toggle-row-copy">
              <div class="set-desk-bullet"><i></i></div><label for="theme_fg_level" style="cursor:pointer;">Foreground Shade</label>
            </span>
            <input id="theme_fg_level" name="theme_fg_level" type="number" min="220" max="255" step="1" value="__THEME_FG_LEVEL__" style="width: 72px; padding: 6px 10px;">
          </div>
          <div class="toggle-row" style="flex-direction:column; align-items:flex-start; padding-bottom:12px;">
            <span class="toggle-row-copy" style="margin-bottom:6px;">
              <div class="set-desk-bullet"><i></i></div><label for="external_editor" style="cursor:pointer;">External Editor</label>
            </span>
            <select id="external_editor" name="external_editor" style="width:100%; padding:6px 10px; font-size:13px; cursor:pointer;">
              __EXTERNAL_EDITOR_OPTIONS__
            </select>
          </div>
          <div class="toggle-row" style="flex-direction:column; align-items:flex-start; padding-bottom:12px;">
            <span class="toggle-row-copy" style="margin-bottom:6px;">
              <div class="set-desk-bullet"><i></i></div><label for="external_editor_markdown" style="cursor:pointer;" title="For .md / .markdown (direct open and preview toolbar). MarkEdit appears when installed.">Markdown editor</label>
            </span>
            <select id="external_editor_markdown" name="external_editor_markdown" style="width:100%; padding:6px 10px; font-size:13px; cursor:pointer;">
              __MARKDOWN_EXTERNAL_EDITOR_OPTIONS__
            </select>
          </div>
          <label class="toggle-row" title="Workspace file links and repo file picks open in the external editor when supported; binaries and PDFs still use preview.">
            <span class="toggle-row-copy">
              <div class="set-desk-bullet"><i></i></div><span>Open files directly in external editor</span>
            </span>
            <input type="checkbox" name="open_files_direct_external_editor" value="on"__OPEN_FILES_DIRECT_EXTERNAL_EDITOR_CHECKED__ switch>
          </label>
          <input type="hidden" name="agent_font_mode" value="__FONT_MODE__">
          <label class="toggle-row">
            <span class="toggle-row-copy">
              <div class="set-desk-bullet"><i></i></div><span>Bold (mobile)</span>
            </span>
            <input type="checkbox" name="bold_mode_mobile" value="on"__BOLD_MODE_MOBILE_CHECKED__ switch>
          </label>
          <label class="toggle-row" style="border-bottom: 1px solid rgba(255,255,255,0.18); padding-bottom: 12px;">
            <span class="toggle-row-copy">
              <div class="set-desk-bullet"><i></i></div><span>Bold (desktop)</span>
            </span>
            <input type="checkbox" name="bold_mode_desktop" value="on"__BOLD_MODE_DESKTOP_CHECKED__ switch>
          </label>
          <label class="toggle-row" style="padding-top: 12px;">
            <span class="toggle-row-copy">
              <div class="set-desk-bullet"><i></i></div><span>Auto mode</span>
            </span>
            <input type="checkbox" name="chat_auto_mode" value="on"__CHAT_AUTO_CHECKED__ switch>
          </label>
          <label class="toggle-row">
            <span class="toggle-row-copy">
              <div class="set-desk-bullet"><i></i></div><span>Awake</span>
              <span class="audio-preview-meter" id="awakePreviewMeterD" aria-hidden="true">
                <span class="audio-preview-meter-bar"></span>
                <span class="audio-preview-meter-bar"></span>
                <span class="audio-preview-meter-bar"></span>
              </span>
            </span>
            <input type="checkbox" name="chat_awake" value="on"__CHAT_AWAKE_CHECKED__ switch>
          </label>
          <label class="toggle-row">
            <span class="toggle-row-copy">
              <div class="set-desk-bullet"><i></i></div><span>Sound</span>
              <span class="audio-preview-meter" id="soundPreviewMeterD" aria-hidden="true">
                <span class="audio-preview-meter-bar"></span>
                <span class="audio-preview-meter-bar"></span>
                <span class="audio-preview-meter-bar"></span>
              </span>
            </span>
            <input type="checkbox" name="chat_sound" value="on"__CHAT_SOUND_CHECKED__ switch>
          </label>
        </div>
      </div>
    </form>

    <form id="settingsFormMobile" method="post" action="/settings">
      __NOTICE_HTML__
      <input type="hidden" name="agent_font_mode" value="__FONT_MODE__">
      <input type="hidden" name="open_files_direct_external_editor" value="__OPEN_FILES_DIRECT_EXTERNAL_EDITOR_HIDDEN__">
      <input type="hidden" name="external_editor_markdown" value="__EXTERNAL_EDITOR_MARKDOWN_HIDDEN__">

      <div class="set-section">
        <div class="set-section-header">Appearance</div>
        <div class="set-section-body">

          <div class="set-row">
            <div class="set-row-left">
              <span class="set-row-icon">
                <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              </span>
              <span class="set-row-name">User Messages</span>
            </div>
            <div class="set-row-right">
              <select name="user_message_font">__USER_MESSAGE_FONT_OPTIONS__</select>
            </div>
          </div>

          <div class="set-row">
            <div class="set-row-left">
              <span class="set-row-icon">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.58-7 8-7s8 3 8 7"/></svg>
              </span>
              <span class="set-row-name">Agent Messages</span>
            </div>
            <div class="set-row-right">
              <select name="agent_message_font">__AGENT_MESSAGE_FONT_OPTIONS__</select>
            </div>
          </div>

          <div class="set-row set-row-gap-after">
            <div class="set-row-left">
              <span class="set-row-icon">
                <svg viewBox="0 0 24 24"><polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/><line x1="12" y1="4" x2="12" y2="20"/></svg>
              </span>
              <span class="set-row-name">Text Size</span>
            </div>
            <div class="set-row-right set-row-right-text-size">
              <div class="stepper-control">
                <button type="button" class="stepper-btn" id="textSizeMinus">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
                <span class="stepper-value" id="textSizeValue">__MESSAGE_TEXT_SIZE__</span>
                <input type="hidden" name="message_text_size" value="__MESSAGE_TEXT_SIZE__">
                <button type="button" class="stepper-btn" id="textSizePlus">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                </button>
              </div>
            </div>
          </div>
          <div class="set-row">
            <div class="set-row-left">
              <span class="set-row-icon">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/></svg>
              </span>
              <span class="set-row-name">Background Shade</span>
            </div>
            <div class="set-row-right">
              <input type="number" name="theme_bg_level" min="0" max="40" step="1" value="__THEME_BG_LEVEL__">
            </div>
          </div>
          <div class="set-row set-row-gap-after">
            <div class="set-row-left">
              <span class="set-row-icon">
                <svg viewBox="0 0 24 24"><path d="M12 3v18"/><path d="M3 12h18"/><circle cx="12" cy="12" r="9"/></svg>
              </span>
              <span class="set-row-name">Foreground Shade</span>
            </div>
            <div class="set-row-right">
              <input type="number" name="theme_fg_level" min="220" max="255" step="1" value="__THEME_FG_LEVEL__">
            </div>
          </div>

          <label class="set-row" for="mob_bold_mobile">
            <div class="set-row-left">
              <span class="set-row-icon">
                <svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
              </span>
              <span class="set-row-name">Bold (mobile)</span>
            </div>
            <input id="mob_bold_mobile" type="checkbox" name="bold_mode_mobile" value="on" class="set-toggle"__BOLD_MODE_MOBILE_CHECKED__ switch>
          </label>

          <label class="set-row" for="mob_bold_desktop">
            <div class="set-row-left">
              <span class="set-row-icon">
                <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
              </span>
              <span class="set-row-name">Bold (desktop)</span>
            </div>
            <input id="mob_bold_desktop" type="checkbox" name="bold_mode_desktop" value="on" class="set-toggle"__BOLD_MODE_DESKTOP_CHECKED__ switch>
          </label>

        </div>
      </div>

      <div class="set-section">
        <div class="set-section-header">Chat</div>
        <div class="set-section-body">

          <label class="set-row" for="mob_auto_mode">
            <div class="set-row-left">
              <span class="set-row-icon">
                <svg viewBox="0 0 24 24"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
              </span>
              <span class="set-row-name">Auto mode</span>
            </div>
            <input id="mob_auto_mode" type="checkbox" name="chat_auto_mode" value="on" class="set-toggle"__CHAT_AUTO_CHECKED__ switch>
          </label>

          <label class="set-row" for="mob_awake">
            <div class="set-row-left">
              <span class="set-row-icon">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
              </span>
              <span class="set-row-name">
                Awake
                <span class="audio-preview-meter" id="awakePreviewMeter" aria-hidden="true">
                  <span class="audio-preview-meter-bar"></span>
                  <span class="audio-preview-meter-bar"></span>
                  <span class="audio-preview-meter-bar"></span>
                </span>
              </span>
            </div>
            <input id="mob_awake" type="checkbox" name="chat_awake" value="on" class="set-toggle"__CHAT_AWAKE_CHECKED__ switch>
          </label>

          <label class="set-row" for="mob_sound">
            <div class="set-row-left">
              <span class="set-row-icon">
                <svg viewBox="0 0 24 24"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
              </span>
              <span class="set-row-name">
                Sound
                <span class="audio-preview-meter" id="soundPreviewMeter" aria-hidden="true">
                  <span class="audio-preview-meter-bar"></span>
                  <span class="audio-preview-meter-bar"></span>
                  <span class="audio-preview-meter-bar"></span>
                </span>
              </span>
            </div>
            <input id="mob_sound" type="checkbox" name="chat_sound" value="on" class="set-toggle"__CHAT_SOUND_CHECKED__ switch>
          </label>

        </div>
      </div>

      <div class="set-section" id="app-controls">
        <div class="set-section-header">App &amp; Install</div>
        <div class="set-section-body">

          <button class="set-row set-row-btn" type="button" id="installAppBtn">
            <div class="set-row-left">
              <span class="set-row-icon">
                <svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              </span>
              <span class="set-row-name">Install This App</span>
            </div>
            <svg class="set-row-chevron" viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
          </button>

          <div class="app-status-stack">
            <div class="app-status" id="installStatus"></div>
          </div>
        </div>
      </div>

    </form>
  </div>
  <script>
__HUB_INCLUDE:settings.js__
  </script>
</body>
</html>
