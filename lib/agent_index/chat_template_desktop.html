  <script>
    (() => {
      const params = new URLSearchParams(window.location.search || "");
      if (params.get("hub_shell") === "1") {
        document.documentElement.dataset.hubShell = "1";
      }
      if (params.get("launch_shell") === "1") {
        document.documentElement.dataset.launchShell = "1";
      }
      // Detect Tauri desktop app via URL param, session marker, Tauri globals, or parent frame flag.
      function _detectTauri() {
        try {
          const stored = sessionStorage.getItem("multiagent_tauri_app") === "1";
          if (
            params.get("tauri") === "1" ||
            stored ||
            typeof window.__TAURI__ !== "undefined" ||
            typeof window.__TAURI_INTERNALS__ !== "undefined" ||
            (window.parent !== window && window.parent.__multiagentAppSettingsLoaded)
          ) {
            document.documentElement.dataset.tauriApp = "1";
            try { sessionStorage.setItem("multiagent_tauri_app", "1"); } catch (_) {}
            return true;
          }
        } catch (_) {}
        return false;
      }
      if (!_detectTauri()) {
        window.addEventListener("load", _detectTauri, { once: true });
      }
    })();
  </script>

    /* Hub 等の iframe 内のみ: キーボードで innerHeight が縮むと inset:0 の高さが「キーボード上〜画面上」になり、

      flex: 1 1 auto;
    }
    .camera-mode-thinking-toggle {
      appearance: none;
      border: none;
      padding: 6px;
      margin: 0;
      background: transparent;
      color: inherit;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex: 0 0 auto;
      pointer-events: auto;
      touch-action: manipulation;
      line-height: 0;
      min-width: 40px;
      min-height: 40px;
    }
    /* Match chat .message-thinking-icon-wrap scale (1.55em) and pulse/spin */
    .camera-mode-thinking-toggle .message-thinking-icon-wrap {
      width: 1.55em;
      height: 1.55em;
    }
    .camera-mode-thinking-toggle .message-thinking-icon {
      width: 100%;
      height: 100%;
      filter: brightness(0) invert(1);
      opacity: 1;
    }
    .camera-mode-thinking-toggle.is-idle .message-thinking-glow {
      animation: none;
      opacity: 0;
    }
    .camera-mode-thinking-toggle.is-idle .message-thinking-icon-wrap {
      animation: none;
      transform: none;
    }
    .camera-mode-thinking-toggle.is-idle .message-thinking-icon {
      animation: none;
      transform: none;
      filter: brightness(0) invert(1);
      opacity: 1;
    }
    .camera-mode-thinking-copy {
      min-width: 0;
      display: inline-flex;
      align-items: center;
      font-size: inherit;
      line-height: inherit;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-left: 2px;
    }
    /* Same structure as chat sticky thinking: bold line + keyword weight + char wave */
    .camera-mode-thinking .message-thinking-runtime-line {
      max-width: min(85vw, 640px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      vertical-align: middle;
    }
    .camera-mode-thinking-copy.is-idle {
      color: rgba(252, 252, 252, 0.7);
      font-size: inherit;
      letter-spacing: inherit;
    }
    .camera-mode-thinking-targets {
      display: none;
      align-items: center;
      gap: 8px;
      min-width: 0;
      flex: 1 1 auto;
      overflow-x: auto;
      overflow-y: hidden;
      scrollbar-width: none;
      -ms-overflow-style: none;
      white-space: nowrap;
      pointer-events: auto;
    }
    .camera-mode-thinking-targets::-webkit-scrollbar {
      display: none;
    }
    .camera-mode-thinking-targets.is-open {
      display: flex;
    }
    .camera-mode-thinking-target-chip {
      flex: 0 0 auto;
      padding: 8px;
      margin: 0;
      pointer-events: auto;
      touch-action: manipulation;
      line-height: 0;
      opacity: 0;
      transform: scale(0.7);
      transition: opacity 180ms ease, transform 180ms cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .camera-mode-thinking-targets.is-open .camera-mode-thinking-target-chip {
      opacity: 1;
      transform: scale(1);
    }
    .camera-mode-thinking-target-chip .target-icon {
      filter: brightness(0) invert(1);
      opacity: 0.72;
      transition: opacity 180ms ease, filter 180ms ease;
    }
    .camera-mode-thinking-target-chip .agent-icon-slot--chip {
      color: rgba(252, 252, 252, 0.8);
      transform: none;
      transition: color 180ms ease;
    }
    .camera-mode-thinking-target-chip .agent-icon-instance-sub {
      color: rgba(252, 252, 252, 0.8);
      text-shadow: none;
    }
    .camera-mode-thinking-target-chip:nth-child(1) { transition-delay: 0ms; }
    .camera-mode-thinking-target-chip:nth-child(2) { transition-delay: 30ms; }
    .camera-mode-thinking-target-chip:nth-child(3) { transition-delay: 60ms; }
    .camera-mode-thinking-target-chip:nth-child(4) { transition-delay: 90ms; }
    .camera-mode-thinking-target-chip:nth-child(5) { transition-delay: 120ms; }
    .camera-mode-thinking-target-chip:nth-child(6) { transition-delay: 150ms; }
    .camera-mode-thinking-target-chip:nth-child(7) { transition-delay: 180ms; }
    .camera-mode-thinking-target-chip:nth-child(8) { transition-delay: 210ms; }
    .camera-mode-thinking-target-chip:nth-child(9) { transition-delay: 240ms; }
    .camera-mode-thinking-target-chip:nth-child(10) { transition-delay: 270ms; }
    .camera-mode-targets {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 10px;
      width: 44px;
      max-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 2px 0;
      pointer-events: none;
      scrollbar-width: none;
      -ms-overflow-style: none;
      opacity: 0;
      visibility: hidden;
      transform: translateY(-8px) scale(0.96);
      transition: opacity 180ms ease, transform 220ms cubic-bezier(0.16, 1, 0.3, 1), max-height 220ms ease, visibility 0s linear 220ms;
    }
    .camera-mode-targets::-webkit-scrollbar {
      display: none;
    }
    .camera-mode-target-rail.is-open .camera-mode-targets {
      max-height: calc(100% - 48px);
      pointer-events: auto;
      opacity: 1;
      visibility: visible;
      transform: translateY(0) scale(1);
      transition-delay: 0s;
    }
    .camera-mode-target {
      appearance: none;
      flex: 0 0 40px;
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 999px;
      background: transparent;
      color: var(--muted);
      padding: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: none;
      transform: translateY(-6px) scale(0.94);
      pointer-events: auto;
      touch-action: manipulation;
      opacity: 0;
      transition: opacity 180ms ease, transform 220ms cubic-bezier(0.16, 1, 0.3, 1), color 0.2s ease;
    }
    .camera-mode-target-rail.is-open .camera-mode-target {
      opacity: 1;
      transform: translateY(0) scale(1);
    }
    .camera-mode-target:nth-child(1) { transition-delay: 0ms; }
    .camera-mode-target:nth-child(2) { transition-delay: 24ms; }
    .camera-mode-target:nth-child(3) { transition-delay: 48ms; }
    .camera-mode-target:nth-child(4) { transition-delay: 72ms; }
    .camera-mode-target:nth-child(5) { transition-delay: 96ms; }
    .camera-mode-target:nth-child(6) { transition-delay: 120ms; }
    .camera-mode-target.active {
      background: transparent;
      color: var(--text);
      box-shadow: none;
    }
    .camera-mode-target.active .agent-icon-instance-sub {
      color: rgba(252, 252, 252, 0.98);
      text-shadow:
        0 0 1px rgba(10, 10, 10, 0.96),
        0 0 2px rgba(10, 10, 10, 0.96);
    }
    .camera-mode-target .camera-mode-target-icon {
      filter: brightness(0) invert(0.8);
      opacity: 0.72;
      transition: filter 0.2s ease, opacity 0.2s ease;
    }
    .camera-mode-target .agent-icon-slot--camera {
      color: rgba(252, 252, 252, 0.76);
      transition: color 0.2s ease, transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .camera-mode-target.active .agent-icon-slot--camera {
      color: rgba(252, 252, 252, 0.98);
      transform: scale(1.15);
    }
    .camera-mode-target.active .camera-mode-target-icon {
      filter: brightness(0) invert(1);
      opacity: 1;
    }
    .camera-mode-target-label {
      display: none;
    }
    .camera-mode-hint {
      position: absolute;
      left: 50%;
      bottom: calc(max(8px, env(safe-area-inset-bottom, 0px)) + 68px);
      transform: translateX(-50%);
      width: min(var(--message-max-width, 900px), calc(100% - 40px));
      box-sizing: border-box;
      padding: 12px 20px;
      text-align: center;
      font: 500 15px/1.4 "SF Pro Text","Segoe UI",sans-serif;
      color: #fff;
      background: rgba(10, 10, 10, 0.72);
      backdrop-filter: blur(16px) saturate(180%);
      -webkit-backdrop-filter: blur(16px) saturate(180%);
      border: 1.5px solid rgba(255, 255, 255, 0.24);
      border-radius: 22px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.32);
      pointer-events: none;
      z-index: 10;
      animation: cameraHintReveal 240ms cubic-bezier(0.2, 1, 0.4, 1) both;
      white-space: pre-wrap;
      overflow-wrap: break-word;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }
    .camera-mode-hint[hidden] {
      display: none;
    }
    @keyframes cameraHintReveal {
      0% { opacity: 0; transform: translate(-50%, 8px) scale(0.96); }
      100% { opacity: 1; transform: translate(-50%, 0) scale(1); }
    }
    .camera-mode-hint.is-listening {
      background: rgba(10, 10, 10, 0.82);
      border-color: rgba(255, 255, 255, 0.45);
    }
    .camera-waveform {
      display: none;
      align-items: center;
      gap: 3px;
      height: 16px;
      flex-shrink: 0;
    }
    .camera-mode-hint.is-listening .camera-waveform {
      display: flex;
    }
    .camera-waveform-bar {
      width: 2px;
      height: 100%;
      background: #fff;
      border-radius: 1px;
      transform-origin: 50% 50%;
      animation: camera-wave-bar 0.8s ease-in-out infinite;
    }
    .camera-waveform.is-live .camera-waveform-bar {
      animation: none;
      transform: scaleY(var(--camera-wave-scale, 0.3));
      opacity: var(--camera-wave-opacity, 0.4);
    }
    .camera-waveform-bar:nth-child(2) { animation-delay: 0.15s; }
    .camera-waveform-bar:nth-child(3) { animation-delay: 0.3s; }
    .camera-waveform-bar:nth-child(4) { animation-delay: 0.45s; }
    .camera-waveform-bar:nth-child(5) { animation-delay: 0.6s; }

    @keyframes camera-wave-bar {
      0%, 100% { transform: scaleY(0.3); opacity: 0.4; }
      50% { transform: scaleY(1); opacity: 1; }
    }
    .camera-mode-hint.error {
      background: rgba(60, 10, 10, 0.82);
      color: rgba(255, 214, 214, 0.96);
      border-color: rgba(255, 100, 100, 0.2);
    }
    .camera-mode-footer {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      padding: 8px 20px max(8px, env(safe-area-inset-bottom, 0px));
      z-index: 2;
      pointer-events: none;
    }
    .camera-mode-mic {
      appearance: none;
      flex: 0 0 auto;
      width: 58px;
      height: 58px;
      border-radius: 999px;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.34);
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.96);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      box-shadow:
        0 10px 28px rgba(0, 0, 0, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      transition: transform 160ms ease, opacity 160ms ease, background 160ms ease, border-color 160ms ease;
    }
    .camera-mode-mic:active {
      transform: scale(0.94);
    }
    .camera-mode-mic.listening {
      background: rgba(186, 48, 60, 0.86);
      border-color: rgba(255, 166, 173, 0.42);
      transform: scale(1.12);
    }
    .camera-mode-mic.no-speech {
      display: none;
    }
    .camera-mode-shutter {
      appearance: none;
      flex: 0 0 auto;
      width: 58px;
      height: 58px;
      border-radius: 999px;
      padding: 0;
      border: 2px solid rgba(255, 255, 255, 0.82);
      background: rgba(255, 255, 255, 0.08);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      box-shadow:
        0 10px 28px rgba(0, 0, 0, 0.28),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
    }
    .camera-mode-shutter::before {
      content: "";
      width: 40px;
      height: 40px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.98);
      transition: transform 120ms ease, opacity 120ms ease;
    }
    .camera-mode-shutter:active::before {
      transform: scale(0.94);
      opacity: 0.88;
    }
    .camera-mode-backdrop-toggle {
      appearance: none;
      flex: 0 0 auto;
      width: 58px;
      height: 58px;
      border-radius: 999px;
      padding: 0;
      border: 1px solid rgba(255, 255, 255, 0.34);
      background: rgba(255, 255, 255, 0.08);
      color: rgba(255, 255, 255, 0.96);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      pointer-events: auto;
      box-shadow:
        0 10px 28px rgba(0, 0, 0, 0.24),
        inset 0 1px 0 rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      transition: transform 160ms ease, opacity 160ms ease, background 160ms ease, border-color 160ms ease, color 160ms ease;
    }
    .camera-mode-backdrop-toggle:active {
      transform: scale(0.94);
    }
    .camera-mode-backdrop-toggle.active {
      background: rgba(0, 0, 0, 0.18);
      border-color: rgba(255, 255, 255, 0.32);
      color: rgba(255, 255, 255, 1);
    }
    .camera-mode-backdrop-toggle svg {
      width: 22px;
      height: 22px;
      stroke-width: 2;
    }
    .camera-mode-empty {
      top: 50%;
      left: 0;
      right: 0;
      transform: translateY(-50%);
      padding: 0 24px;
      text-align: center;
    }
    .camera-mode-empty-title {
      font: 650 16px/1.2 "SF Pro Text","Segoe UI",sans-serif;
      color: rgba(255, 255, 255, 0.96);
    }
    .camera-mode-empty-copy {
      margin-top: 8px;
      font: 500 13px/1.45 "SF Pro Text","Segoe UI",sans-serif;
      color: rgba(255, 255, 255, 0.72);
    }
    .camera-mode.busy .camera-mode-shutter::before {
      transform: scale(0.86);
      opacity: 0.7;
    }
    .camera-mode.busy .camera-mode-mic,
    .camera-mode.busy .camera-mode-backdrop-toggle,
    .camera-mode.busy .camera-mode-target,
    .camera-mode.busy .camera-mode-close {
      opacity: 0.54;
      pointer-events: none;
    }
    .copy-btn {
      flex-shrink: 0;
      align-self: flex-start;
      margin-top: 2px;
      background: rgba(20, 20, 19, 0); /* Transparent by default */
      border: none;
      padding: 4px;
      cursor: pointer;
      color: var(--muted);
      line-height: 1;
      border-radius: 4px;
      transition: color 150ms ease, background 250ms ease, transform 100ms ease;
      -webkit-tap-highlight-color: transparent;
    }
    .has-hover .copy-btn:hover { color: var(--text); background: var(--surface); }
    .copy-btn.copied { color: var(--text); }
    @keyframes msg-highlight {
      0%   { box-shadow: 0 0 0 2px rgba(255,255,255,0.35); }
      100% { box-shadow: 0 0 0 2px rgba(255,255,255,0); }
    }
    .msg-highlight {
      animation: msg-highlight 1.2s ease-out forwards;
      border-radius: 20px;
    }
    /* ユーザーメッセージへの返信ジャンプ: 本文ではなく本文下の区切り線がふんわり発光 */
    @keyframes msg-highlight-user-divider {
      0% {
        background: rgba(255, 255, 255, 0.55);
        box-shadow: 0 0 10px rgba(255, 255, 255, 0.42), 0 0 24px rgba(255, 255, 255, 0.16);
      }
      45% {
        background: rgba(255, 255, 255, 0.22);
        box-shadow: 0 0 6px rgba(255, 255, 255, 0.22);
      }
      100% {
        background: var(--text);
        box-shadow: none;
      }
    }
    .message.user .user-message-divider.msg-highlight-user-divider {
      animation: msg-highlight-user-divider 1.35s ease-out forwards;
    }
    @media (prefers-reduced-motion: reduce) {
      .message.user .user-message-divider.msg-highlight-user-divider {
        animation: msg-highlight-user-divider-reduced 0.9s ease-out forwards;
      }
      @keyframes msg-highlight-user-divider-reduced {
        0%, 100% { opacity: 1; background: var(--text); box-shadow: none; }
        40% { opacity: 0.45; }
      }
    }
    @keyframes msg-highlight-rail {
      0%, 100% { opacity: 1; }
    }
    .msg-highlight-rail {
      position: relative;
    }
    .msg-highlight-rail::before {
      content: "";
      position: absolute;
      left: -20px;
      top: var(--message-rail-top-inset);
      bottom: var(--message-rail-bottom-inset);
      width: 1.5px;
      border-radius: 2px;
      background: linear-gradient(to bottom, transparent, var(--text) 20%, #fff 50%, var(--text) 80%, transparent);
      animation: msg-highlight-rail 0.8s step-start forwards;
      pointer-events: none;
    }
    .message-row:not(.user):not(.kind-agent-thinking) .message {
      position: relative;
    }
    .message-row:not(.user):not(.kind-agent-thinking) .message::before {
      content: "";
      position: absolute;
      left: -20px;
      top: var(--message-rail-top-inset);
      bottom: var(--message-rail-bottom-inset);
      width: 1.5px;
      border-radius: 2px;
      background: linear-gradient(to bottom, transparent, var(--text) 20%, #fff 50%, var(--text) 80%, transparent);
      opacity: 0;
      pointer-events: none;
    }
    .message-row:not(.user):not(.kind-agent-thinking):is(:hover, :focus-within, .is-centered) .message::before {
      opacity: 0.8;
    }
    /* user message: no bubble — plain text on timeline */
    .message.user .md-body {
      background: transparent;
      background-image: none;
      border: none;
      color: var(--text);
    }
    /* message collapse gradient */
    .message-row.is-collapsible .message-body-row.is-collapsed::after {
      background: linear-gradient(180deg, rgba(0, 0, 0, 0) 0%, var(--bg) 78%);
    }
    .md-body :not(pre) > code,
    .message.user .md-body :not(pre):not(a.inline-file-link):not(a.local-file-link) > code {
      color: var(--inline-code-fg);
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
    }
    /* input box */
    .mic-btn,
    .send-btn {
      background: var(--fg-bright);
      color: var(--surface);
    }
    /* tap / hover interactive color (file-item uses same rgba as cmd-item; see .has-hover .file-item:hover) */
    .has-hover .quick-action:hover:not(:disabled),
    .has-hover .composer-plus-toggle:hover,
    .daybreak,
    .has-hover .copy-btn:hover,
    #scrollToBottomBtn:active,
    #composerFabBtn:active,
    .attach-card-remove {
      background: var(--surface-alt);
    }
    #fileDropdown {
      background: transparent;
    }
    .conversation-empty-card {
      background: rgba(20, 20, 20, 0.9);
    }
    .attach-card-ext,
    .file-card {
      background: var(--surface);
    }
    .md-body pre {
      background: transparent;
    }
    /* scroll button */
    #scrollToBottomBtn,
    #composerFabBtn {
      background: rgba(var(--bg-rgb), 0.72);
    }
    .has-hover #scrollToBottomBtn:hover,
    .has-hover #composerFabBtn:hover {
      background: rgba(25, 25, 25, 0.88);
    }
    /* selected / open states */
    .composer-plus-menu[open] .composer-plus-toggle,
    .composer-plus-menu:not([open]) .composer-plus-toggle:active {
      background: var(--bg);
    }
    /* Mobile Performance: Remove blur and use solid background */
    @media (max-width: 480px) {
      .composer-plus-menu,
      .file-menu-list,
      #fileDropdown,
      .pane-viewer,
      .composer-overlay,
      .add-agent-panel,
      .attach-rename-panel,
      .file-modal-dialog,
      .git-commit-detail-head {
        background: rgb(10, 10, 10);
        backdrop-filter: none;
        -webkit-backdrop-filter: none;
      }
    }
    html[data-tauri-app="1"],
    html[data-tauri-app="1"] body,
    html[data-tauri-app="1"] .shell,
    html[data-tauri-app="1"] main {
      background: var(--bg);
    }
    #hubPageMenuPanel.open.hub-menu-mode-pane {
      display: flex;
      max-height: none;
    }
  </style>

    html[data-tauri-app="1"] .shell > .hub-page-header .hub-page-logo {

  </style>

<body>
  <div id="fileDropdown"></div>
  <div id="cmdDropdown"></div>
  <div id="fileModal" class="file-modal" hidden>
    <div class="file-modal-backdrop"></div>
    <div class="file-modal-dialog" role="dialog" aria-modal="true" aria-labelledby="fileModalTitle">
      <div id="fileModalSplitResizer" class="file-modal-split-resizer" aria-hidden="true"></div>
      <div class="file-modal-header">
        <div class="file-modal-meta">
          <span id="fileModalIcon" class="file-modal-icon" role="button" tabindex="0" title="Back to attached files" aria-label="Back to attached files"></span>
          <div class="file-modal-text">
            <div id="fileModalTitle" class="file-modal-title">Preview</div>
          </div>
        </div>

          best = candidate;

        const data = await res.json();
        if (typeof data?.agent_font_mode === "string" && data.agent_font_mode) {
          document.documentElement.dataset.agentFontMode = data.agent_font_mode;
        }
        if (typeof data?.chat_font_settings_css === "string") {
          const styleNode = document.getElementById("chatFontSettingsStyle");
          if (styleNode && styleNode.textContent !== data.chat_font_settings_css) {
            styleNode.textContent = data.chat_font_settings_css;
          }
        }
        if (typeof data?.chat_sound === "boolean") {
          setSoundBtn(data.chat_sound);
        }
        if (typeof data?.chat_browser_notifications === "boolean") {
          setBrowserNotifications(data.chat_browser_notifications);
        }
        if (!browserPushManagedByHub) queuePushSync();
      } catch (_) {}
    };
    syncChatNotificationDefaults();
    setInterval(syncChatNotificationDefaults, 30000);
    document.addEventListener("visibilitychange", () => {
      if (!document.hidden) {
        syncChatNotificationDefaults();
        void refreshSessionState();
        scheduleSessionStatePoll(0);
      }
      postPushPresence({ force: true, keepalive: document.hidden });
    });
    window.addEventListener("focus", () => { postPushPresence({ force: true }); });
    window.addEventListener("blur", () => { postPushPresence({ force: true, keepalive: true }); });
    window.addEventListener("pageshow", () => { postPushPresence({ force: true }); });
    window.addEventListener("pagehide", () => { postPushPresence({ force: true, keepalive: true }); });
    setInterval(() => { postPushPresence(); }, 20000);

    // Auto-prime on first user gesture if sound is on
    const primeSoundOnGesture = async () => {
      if (_audioPrimed) return;
      await primeSound();
    };
    let _pushPermissionPrompted = false;
    const primePushOnGesture = async () => {
      if (browserPushManagedByHub) return;
      if (!browserNotificationsEnabled) return;
      if (!supportsPushNotifications) return;
      if (Notification.permission === "default" && !_pushPermissionPrompted) {
        _pushPermissionPrompted = true;
        try {
          const permission = await Notification.requestPermission();
          if (permission !== "granted") return;
        } catch (_) {
          return;
        }
      }
      if (Notification.permission !== "granted") return;
      if (pushNotificationsActive) return;
      await syncPushSubscription().catch(() => {});
    };
    document.addEventListener("pointerdown", (e) => {
      const toggle = e.target.closest(".hub-page-menu-btn, .composer-plus-toggle, .quick-action");
      if (toggle) {
        if (toggle.classList.contains("animating")) {
          e.preventDefault();
          e.stopPropagation();
          return;
        }
        flashHeaderToggle(toggle);
      }
      primePushOnGesture().catch(() => {});
    });
    document.addEventListener("click", primeSoundOnGesture);
    document.addEventListener("click", () => { primePushOnGesture().catch(() => {}); });
    document.addEventListener("click", blurTouchControlAfterTap, true);
    // Delegated handler for code block copy buttons
    const codeCopySvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>';
    const codeCheckSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
    document.addEventListener("click", (e) => {
      const btn = e.target.closest(".code-copy-btn");
      if (!btn) return;
      const wrap = btn.closest(".code-block-wrap");
      if (!wrap) return;
      const code = wrap.querySelector("code") || wrap.querySelector("pre");
      navigator.clipboard.writeText(code.textContent).then(() => {
        btn.innerHTML = codeCheckSvg;
        setTimeout(() => { btn.innerHTML = codeCopySvg; }, 1500);
      });
    });
    /** Strip ANSI escapes (fallback when ansi_up is unavailable). */
    const stripAnsiForTrace = (value) => String(value ?? "")
      .replace(/\u001b\[[0-?]*[ -/]*[@-~]/g, "")
      .replace(/\u001b\][^\u0007]*\u0007/g, "");
    let paneTraceAnsiUp = null;
    let paneTraceAnsiLoadPromise = null;
    const ensurePaneTraceAnsiUp = async () => {
      if (paneTraceAnsiUp) return true;
      try {
        if (typeof AnsiUp === "function") {
          paneTraceAnsiUp = new AnsiUp();
          return true;
        }
      } catch (_) {
        paneTraceAnsiUp = null;
      }
      if (paneTraceAnsiLoadPromise) return paneTraceAnsiLoadPromise;
      paneTraceAnsiLoadPromise = loadExternalScriptOnce(ANSI_UP_SRC).then((ready) => {
        if (!ready) return false;
        try {
          if (typeof AnsiUp === "function") paneTraceAnsiUp = new AnsiUp();
        } catch (_) {
          paneTraceAnsiUp = null;
        }
        return !!paneTraceAnsiUp;
      }).finally(() => {
        if (!paneTraceAnsiUp) paneTraceAnsiLoadPromise = null;
      });
      return paneTraceAnsiLoadPromise;
    };
    const paneTraceHtml = (raw) => {
      const text = String(raw ?? "No output");
      if (!paneTraceAnsiUp) {
        try {
          if (typeof AnsiUp === "function") paneTraceAnsiUp = new AnsiUp();
        } catch (_) {
          paneTraceAnsiUp = null;
        }
      }
      let html;
      if (paneTraceAnsiUp) {
        try {
          html = paneTraceAnsiUp.ansi_to_html(text);
        } catch (_) {
          html = null;
        }
      }
      if (!html) {
        const plain = stripAnsiForTrace(text);
        html = escapeHtml(plain).replace(/\n/g, "<br>");
      }
      return html.replace(/[●⏺]/g, '<span class="trace-dot">●</span>');
    };

    // Mobile Pane Viewer（ハンバーガーパネル内の第2層）
    let paneViewerAgents = [];
    let paneViewerLastAgent = null;
    let paneViewerContentCache = Object.create(null);
    const paneViewerEl = document.getElementById("paneViewer");
    const paneViewerTabs = document.getElementById("paneViewerTabs");
    const paneViewerCarousel = document.getElementById("paneViewerCarousel");
    const scrollPaneSlideToBottom = (slide) => {
      if (!slide) return;
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          slide.scrollTop = slide.scrollHeight;
        });
      });
    };
    const _paneSlideAtBottom = (el) => !el || el.scrollHeight - el.scrollTop - el.clientHeight < 48;
    const fetchPaneViewerSlide = async (agent, slide, scrollToBottomAfter) => {
      if (!slide) return;
      if (!paneViewerEl?.classList?.contains("visible")) return;
      if (document.hidden) return;
      const body = slide.querySelector(".pane-viewer-body");
      if (!body) return;
      if (!scrollToBottomAfter && !_paneSlideAtBottom(body)) return;
      try {
        /* Pane Viewer はモバイル専用導線（Terminal ボタンはデスクトップでは /open-terminal）。常に軽量 tail。 */
        const ansiReady = ensurePaneTraceAnsiUp();
        const res = await fetch(`/trace?agent=${encodeURIComponent(agent)}&lines=160&ts=${Date.now()}`);
        if (!res.ok) return;
        const data = await res.json();
        if (!paneViewerEl?.classList?.contains("visible")) return;
        if (document.hidden) return;
        const content = String(data.content || "");
        const atBottom = _paneSlideAtBottom(body);
        const cacheKey = `${agent}`;
        if (!scrollToBottomAfter && paneViewerContentCache[cacheKey] === content) {
          return;
        }
        paneViewerContentCache[cacheKey] = content;
        await ansiReady;
        body.innerHTML = paneTraceHtml(content || "No output");
        if (scrollToBottomAfter || atBottom) scrollPaneSlideToBottom(body);
      } catch (_) {}
    };
    const fetchPaneViewerSlideByIndex = (idx, scrollToBottomAfter = false) => {
      if (!paneViewerCarousel || !paneViewerAgents.length) return;
      const i = Math.max(0, Math.min(paneViewerAgents.length - 1, idx));
      const agent = paneViewerAgents[i];
      const slide = paneViewerCarousel.children[i];
      if (agent && slide) fetchPaneViewerSlide(agent, slide, scrollToBottomAfter);
    };
    /* カルーセルの見えているタブだけポーリング（全エージェント並列 /trace しない）。 */
    const fetchVisiblePaneViewerSlide = (scrollToBottomAfter = false) => {
      if (!paneViewerEl?.classList?.contains("visible")) return;
      if (document.hidden) return;
      if (!paneViewerCarousel || !paneViewerAgents.length) return;
      const width = paneViewerCarousel.offsetWidth;
      if (!width) {
        fetchPaneViewerSlideByIndex(lastPaneViewerTabIdx, scrollToBottomAfter);
        return;
      }
      const scrollLeft = paneViewerCarousel.scrollLeft;
      let idx = Math.round(scrollLeft / width);
      if (!Number.isFinite(idx)) idx = 0;
      idx = Math.max(0, Math.min(paneViewerAgents.length - 1, idx));
      fetchPaneViewerSlideByIndex(idx, scrollToBottomAfter);
    };
    function movePaneViewerIndicator(idx, { scrollTabIntoView = false } = {}) {
      const indicator = paneViewerTabs.querySelector(".pane-viewer-tab-indicator");
      const tabs = Array.from(paneViewerTabs.querySelectorAll(".pane-viewer-tab"));
      if (!indicator || !tabs.length) return;
      const safeIdx = Math.max(0, Math.min(tabs.length - 1, idx));
      const tab = tabs[safeIdx];
      indicator.style.left = tab.offsetLeft + "px";
      indicator.style.width = tab.offsetWidth + "px";
      if (scrollTabIntoView && tab) {
        tab.scrollIntoView({ inline: "center", block: "nearest", behavior: "smooth" });
      }
    }
    const syncPaneViewerTab = () => {
      if (!paneViewerCarousel || !paneViewerAgents.length) return;
      const width = paneViewerCarousel.offsetWidth;
      if (!width) return;
      const scrollLeft = paneViewerCarousel.scrollLeft;
      let idx = Math.round(scrollLeft / width);
      if (!Number.isFinite(idx)) idx = 0;
      idx = Math.max(0, Math.min(paneViewerAgents.length - 1, idx));
      lastPaneViewerTabIdx = idx;
      paneViewerLastAgent = paneViewerAgents[idx];
      const tabs = Array.from(paneViewerTabs.querySelectorAll(".pane-viewer-tab"));
      tabs.forEach((t, i) => t.classList.toggle("active", i === idx));
      movePaneViewerIndicator(idx);
    };
    const onPaneViewerCarouselScroll = () => {
      if (!paneViewerTabScrollRaf) {
        paneViewerTabScrollRaf = requestAnimationFrame(() => {
          paneViewerTabScrollRaf = 0;
          syncPaneViewerTab();
        });
      }
      if (paneViewerTabScrollEndTimer) clearTimeout(paneViewerTabScrollEndTimer);
      paneViewerTabScrollEndTimer = setTimeout(() => {
        paneViewerTabScrollEndTimer = null;
        movePaneViewerIndicator(lastPaneViewerTabIdx, { scrollTabIntoView: true });
        fetchVisiblePaneViewerSlide(false);
      }, 120);
    };
    const schedulePaneViewerScrollAlign = () => {
      let tries = 0;
      const run = () => {
        if (!paneViewerCarousel || !paneViewerAgents.length) return;
        const w = paneViewerCarousel.offsetWidth;
        if (!w) {
          if (++tries > 48) return;
          requestAnimationFrame(run);
          return;
        }
        const agent = paneViewerLastAgent && paneViewerAgents.includes(paneViewerLastAgent)
          ? paneViewerLastAgent
          : paneViewerAgents[0];
        const idx = Math.max(0, paneViewerAgents.indexOf(agent));
        paneViewerCarousel.scrollTo({ left: idx * w, behavior: "auto" });
        syncPaneViewerTab();
        requestAnimationFrame(() => {
          movePaneViewerIndicator(lastPaneViewerTabIdx, { scrollTabIntoView: true });
        });
      };
      requestAnimationFrame(() => requestAnimationFrame(run));
    };
    const scrollToAgent = (agent) => {
      const idx = paneViewerAgents.indexOf(agent);
      if (idx < 0) return;
      lastPaneViewerTabIdx = idx;
      paneViewerLastAgent = agent;
      paneViewerCarousel.scrollTo({ left: idx * paneViewerCarousel.offsetWidth, behavior: "smooth" });
      const tabs = Array.from(paneViewerTabs.querySelectorAll(".pane-viewer-tab"));
      tabs.forEach((t, i) => t.classList.toggle("active", i === idx));
      movePaneViewerIndicator(idx, { scrollTabIntoView: true });
      fetchPaneViewerSlideByIndex(idx, true);
    };
    const paneViewerTabCharsHtml = (name) => {
      let idx = 0;
      return [...String(name)].map((ch) => {
        const i = idx++;
        const inner = ch === " " ? "&nbsp;" : escapeHtml(ch);
        return `<span class="pane-viewer-tab-char" style="--char-i:${i}">${inner}</span>`;
      }).join("");
    };
    const buildPaneViewer = () => {
      paneViewerAgents = availableTargets.filter(t => t !== "others");
      const restoreAgent = paneViewerLastAgent && paneViewerAgents.includes(paneViewerLastAgent)
        ? paneViewerLastAgent
        : paneViewerAgents[0];
      const initialIdx = restoreAgent ? Math.max(0, paneViewerAgents.indexOf(restoreAgent)) : 0;
      paneViewerTabs.innerHTML = `<div class="pane-viewer-tab-indicator"></div>` + paneViewerAgents.map((a, i) =>
        `<button class="pane-viewer-tab${i === initialIdx ? " active" : ""}" data-agent="${escapeHtml(a)}">${paneViewerTabCharsHtml(a)}</button>`
      ).join("");
      paneViewerCarousel.innerHTML = paneViewerAgents.map(a =>
        `<div class="pane-viewer-slide" data-agent="${escapeHtml(a)}"><div class="pane-viewer-header-shadow"></div><span class="pane-viewer-pane-badge" data-agent="${escapeHtml(a)}">${paneViewerBadgeHtml(a)}</span><div class="pane-viewer-body inline-loading-pane">${loadingIndicatorHtml("Loading…")}</div></div>`
      ).join("");
      paneViewerTabs.querySelectorAll(".pane-viewer-tab").forEach(tab => {
        tab.addEventListener("click", () => scrollToAgent(tab.dataset.agent));
      });
      if (paneViewerCarousel && !paneViewerCarousel._paneViewerScrollBound) {
        paneViewerCarousel._paneViewerScrollBound = true;
        paneViewerCarousel.addEventListener("scroll", onPaneViewerCarouselScroll, { passive: true });
      }
      syncPaneViewerTabThinkingStatuses();
      lastPaneViewerTabIdx = initialIdx;
      requestAnimationFrame(() => {
        movePaneViewerIndicator(initialIdx);
        const firstTab = paneViewerTabs.querySelector(".pane-viewer-tab.active");
        if (firstTab) firstTab.scrollIntoView({ inline: "center", block: "nearest" });
      });
    };
    const resolvePaneFocusAgent = (raw) => {
      if (!raw) return null;
      const allowed = availableTargets.filter(t => t !== "others");
      if (!allowed.length) return null;
      if (allowed.includes(raw)) return raw;
      const base = agentBaseName(raw);
      const hit = allowed.find((t) => t === base || agentBaseName(t) === base);
      return hit || null;
    };
    const showPaneTraceViewer = (focusAgent) => {
      if (!paneViewerEl) return;
      const resolved = resolvePaneFocusAgent(focusAgent);
      if (resolved) paneViewerLastAgent = resolved;
      if (paneViewerEl.classList.contains("visible")) {
        if (resolved && paneViewerAgents.includes(resolved)) {
          scrollToAgent(resolved);
        }
        return;
      }
      if (gitBranchPanel) {
        gitBranchPanel.hidden = true;
        gitBranchPanel.classList.remove("open");
      }
      gitBranchMenuBtn?.classList.remove("open");
      if (attachedFilesPanel) {
        attachedFilesPanel.hidden = true;
        attachedFilesPanel.classList.remove("open");
      }
      attachedFilesMenuBtn?.classList.remove("open");
      if (rightMenuPanel) {
        rightMenuPanel.hidden = false;
        rightMenuPanel.classList.add("open");
        rightMenuPanel.classList.add("hub-menu-mode-pane");
      }
      rightMenuBtn?.classList.add("open");
      paneViewerEl.classList.add("visible");
      paneViewerContentCache = Object.create(null);
      syncHeaderMenuFocus();
      clearPaneViewerOpenWork();
      paneViewerOpenRaf = requestAnimationFrame(() => {
        paneViewerOpenRaf = 0;
        buildPaneViewer();
        schedulePaneViewerScrollAlign();
        paneViewerInitialFetchTimer = setTimeout(() => {
          paneViewerInitialFetchTimer = 0;
          fetchPaneViewerSlideByIndex(lastPaneViewerTabIdx, true);
          /* LAN/Local は少し落として CPU を抑える。Public は従来どおり。 */
          const paneTracePollMs = isLocalHubHostname() ? 300 : 1500;
          if (paneViewerInterval) clearInterval(paneViewerInterval);
          paneViewerInterval = setInterval(() => fetchVisiblePaneViewerSlide(false), paneTracePollMs);
        }, 0);
      });
    };
    document.addEventListener("visibilitychange", () => {
      if (document.hidden) return;
      if (!paneViewerEl?.classList?.contains("visible")) return;
      fetchVisiblePaneViewerSlide(false);
    });
    void refreshSessionState();
    scheduleSessionStatePoll();
    setInterval(() => {
      if (Object.keys(currentAgentStatuses).length) {
        renderAgentStatus(currentAgentStatuses);
      }
    }, 1000);

    let lastApprovalTs = 0;
    const showAutoApprovalNotice = (agent) => {
      const chip = agent
        ? document.querySelector(`.target-chip[data-target="${CSS.escape(agent)}"]`)
        : null;
      if (!chip) return;
      document.querySelectorAll(".target-chip.auto-approval-notice").forEach((node) => {
        if (node._autoApprovalNoticeHideTimer) clearTimeout(node._autoApprovalNoticeHideTimer);
        if (node._autoApprovalNoticeCleanupTimer) clearTimeout(node._autoApprovalNoticeCleanupTimer);
        node.classList.remove("auto-approval-notice-visible");
        node.classList.remove("auto-approval-notice");
      });
      chip.classList.add("auto-approval-notice");
      void chip.offsetWidth;
      chip.classList.add("auto-approval-notice-visible");
      chip._autoApprovalNoticeHideTimer = setTimeout(() => {
        chip.classList.remove("auto-approval-notice-visible");
        chip._autoApprovalNoticeCleanupTimer = setTimeout(() => {
          chip.classList.remove("auto-approval-notice");
          chip._autoApprovalNoticeCleanupTimer = null;
          chip._autoApprovalNoticeHideTimer = null;
        }, 220);
      }, 1600);
    };
    const refreshAutoMode = async () => {
      try {
        const res = await fetch("/auto-mode", { cache: "no-store" });
        if (!res.ok) return;
        const d = await res.json();
        if (d.last_approval && d.last_approval !== lastApprovalTs) {
          if (lastApprovalTs !== 0) showAutoApprovalNotice(d.last_approval_agent || "");
          lastApprovalTs = d.last_approval;
        }
      } catch (_) {}
    };
    refreshAutoMode();
    setInterval(refreshAutoMode, 3000);

    if (window.__STATIC_EXPORT__) {
      const comp = document.getElementById("composer");
      const message = document.getElementById("message");
      if (message) {
        message.readOnly = true;
        message.value = "";
        message.placeholder = "Static export preview";
      }
      if (comp) {
        comp.classList.add("static-export-composer");
        comp.querySelectorAll("button, input, textarea, summary, details").forEach((el) => {
          if (el.tagName === "TEXTAREA") return;
          el.disabled = true;
          el.style.pointerEvents = "none";
        });
      }
      document.querySelector(".hub-page-header")?.querySelectorAll("button, details, summary")?.forEach(el => { el.disabled = true; el.style.pointerEvents = "none"; });
      const status = document.getElementById("statusline");
      if (status) status.textContent = "Static export";
    }
    let followRefreshTimer = 0;
    const nextFollowRefreshMs = () => {
      if (document.hidden) return 1200;
      return 250;
    };
    const scheduleFollowRefresh = (delay = nextFollowRefreshMs()) => {
      if (followRefreshTimer) clearTimeout(followRefreshTimer);
      if (!followMode || window.__STATIC_EXPORT__) return;
      followRefreshTimer = setTimeout(async () => {
        await refresh();
        scheduleFollowRefresh();
      }, Math.max(120, delay || 0));
    };
    refresh({ forceScroll: true });
    if (followMode && !window.__STATIC_EXPORT__) {
      scheduleFollowRefresh();
      document.addEventListener("visibilitychange", () => {
        if (!document.hidden) {
          void refresh();
          scheduleFollowRefresh(0);
        }
      });
    }
  </script>
</body>
</html>
