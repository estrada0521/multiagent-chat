<!doctype html>
<html lang="en" data-theme="black-hole" data-view-variant="__VIEW_VARIANT__">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="rgb(10, 10, 10)">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Session Hub">
  <link rel="manifest" href="__HUB_MANIFEST_URL__">
  <link rel="icon" type="image/png" sizes="192x192" href="__PWA_ICON_192_URL__">
  <link rel="apple-touch-icon" href="__APPLE_TOUCH_ICON_URL__">
  <title>Hub Settings</title>
  <script>
    (() => {
      const params = new URLSearchParams(window.location.search || "");
      let embed = (params.get("embed") || "") === "1";
      if (!embed) {
        const rawTarget = (params.get("target") || "").trim();
        if (rawTarget) {
          try {
            const next = new URL(rawTarget, window.location.origin);
            embed = (next.searchParams.get("embed") || "") === "1";
          } catch (_) {}
        }
      }
      if (embed) {
        document.documentElement.dataset.hubEmbed = "1";
      }
    })();
  </script>
  <style>
    :root {
      color-scheme: dark;
      --bg: rgb(10, 10, 10);
      --bg-rgb: 10, 10, 10;
      --panel: rgb(20, 20, 20);
      --panel-2: rgb(15, 15, 15);
      --line: rgba(255,255,255,0.06);
      --line-strong: rgba(255,255,255,0.10);
      --fg: rgb(252, 252, 252);
      --muted: rgb(158, 158, 158);
      --accent: rgb(44, 132, 219);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: "SF Pro Text", "Segoe UI", sans-serif;
    }
    body {
      padding: 0 0 max(20px, env(safe-area-inset-bottom)) 0;
    }
    .shell { max-width: 900px; margin: 0 auto; min-height: 100dvh; }
    .shell > :not(.hub-page-header) { padding-left: 12px; padding-right: 12px; }
    .hero { padding: 8px 2px 18px 2px; }
    .eyebrow { color: var(--muted); font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 8px; }
    h1 { margin: 0; font-size: clamp(28px, 5vw, 40px); line-height: 1.02; font-weight: 600; letter-spacing: -0.03em; }
    .hub-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
      width: 100%;
      align-items: center;
    }
    .hub-nav a {
      color: var(--muted);
      text-decoration: none;
      border: 0.5px solid var(--line);
      background: var(--panel);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      line-height: 1;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .hub-nav form { margin: 0; }
    .hub-nav .hub-restart-form { margin-left: auto; }
    .hub-nav button {
      color: var(--muted);
      border: 0.5px solid var(--line);
      background: var(--panel);
      border-radius: 999px;
      padding: 6px 10px;
      font: inherit;
      font-size: 12px;
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }
    .hub-nav .hub-restart-form button { color: rgb(44, 132, 219); }
    .hub-nav a.active { color: var(--fg); border-color: var(--line-strong); }
    /* ── Desktop: panel/field/toggle-row (unchanged) ── */
    .panel {
      background: var(--panel);
      border: 0.5px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }
    .field + .field { margin-top: 16px; }
    .label { display:block; font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
    select, input[type="text"], input[type="number"] {
      width: 100%;
      border: 0.5px solid var(--line-strong);
      background: var(--panel-2);
      color: var(--fg);
      border-radius: 10px;
      padding: 9px 11px;
      font-size: 13px;
      line-height: 1.3;
      outline: none;
      appearance: none;
      -webkit-appearance: none;
      font-family: inherit;
    }
    select:focus, input[type="text"]:focus, input[type="number"]:focus {
      border-color: rgba(255,255,255,0.22);
    }
    html[data-theme="black-hole"] select,
    html[data-theme="black-hole"] input[type="text"],
    html[data-theme="black-hole"] input[type="number"] {
      background: linear-gradient(145deg, rgb(20, 20, 20) 0%, rgb(10, 10, 10) 100%);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      border: 0.5px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
    }
    .row {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 10px;
    }
    .save {
      margin-top: 14px;
      border: 0.5px solid var(--line);
      background: transparent;
      color: var(--fg);
      border-radius: 12px;
      padding: 11px 13px;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.2;
      letter-spacing: 0.01em;
      text-transform: none;
      cursor: pointer;
      width: 100%;
      text-align: left;
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 8px;
      transition: background 140ms ease, border-color 140ms ease, color 140ms ease;
    }
    .save svg {
      width: 15px;
      height: 15px;
      flex: 0 0 auto;
      stroke: currentColor;
      stroke-width: 1.8;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .save:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.16);
      color: var(--fg);
    }
    .save[disabled] {
      opacity: 0.52;
      cursor: default;
    }
    @keyframes hubRestartingPulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .hub-nav button.restarting {
      animation: hubRestartingPulse 900ms ease-in-out infinite;
      pointer-events: none;
    }
    .hub-nav a.active {
      background: var(--bg);
      border-color: rgba(255, 255, 255, 0.2);
    }
    /* ── Desktop toggle-row ── */
    .chat-toggles { display: flex; flex-direction: column; gap: 0; }
    .toggle-row { display: flex; align-items: center; justify-content: space-between; gap: 7px; padding: 6px 0; border-bottom: 0.5px solid var(--line); font-size: 12px; line-height: 1.18; font-weight: 500; cursor: pointer; }
    .toggle-row:last-child { border-bottom: none; }
    .toggle-row-copy { display: inline-flex; align-items: center; gap: 7px; min-width: 0; }
    .toggle-row input[type="checkbox"] { width: 30px; height: 16px; -webkit-appearance: none; appearance: none; background: var(--line-strong); border-radius: 999px; cursor: pointer; transition: background 200ms; position: relative; flex-shrink: 0; }
    .toggle-row input[type="checkbox"]:checked { background: var(--accent, rgb(44,132,219)); }
    .toggle-row input[type="checkbox"]::before { content: ""; position: absolute; width: 12px; height: 12px; background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: transform 200ms; }
    .toggle-row input[type="checkbox"]:checked::before { transform: translateX(14px); }
    /* ── Audio preview meter ── */
    .audio-preview-meter {
      display: inline-flex;
      align-items: flex-end;
      gap: 1px;
      height: 9px;
      opacity: 0;
      transition: opacity 140ms ease;
      pointer-events: none;
    }
    .audio-preview-meter.is-playing { opacity: 0.95; }
    .audio-preview-meter-bar {
      width: 1.5px;
      height: 2px;
      border-radius: 999px;
      background: rgba(252, 252, 252, 0.68);
      transform-origin: center bottom;
      transition: height 80ms linear;
    }
    /* ── App controls (desktop) ── */
    .app-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }
    .app-button {
      appearance: none;
      border: 0.5px solid var(--line-strong);
      background: transparent;
      color: rgba(252,252,252,0.94);
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 500;
      line-height: 1.3;
      cursor: pointer;
    }
    .app-button[disabled] {
      opacity: 0.48;
      cursor: default;
    }
    .app-status-stack { display: none; }
    .app-status {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }
    /* ── Mobile set-row layout ── */
    .set-section { display: none; }
    /* ── Embed ── */
    .hero, .hub-nav { display: none; }
    html[data-hub-embed="1"] body { padding-bottom: 0; }
    html[data-hub-embed="1"] .hub-page-header,
    html[data-hub-embed="1"] .hero { display: none; }
    html[data-hub-embed="1"] .shell {
      max-width: none;
      min-height: 100dvh;
    }
    html[data-hub-embed="1"] .shell > :not(.hub-page-header) {
      padding-left: 10px;
      padding-right: 10px;
    }
    __HUB_HEADER_CSS__
    .hub-page-header {
      --page-side-pad: 12px;
      --chrome-icon-btn-size: 44px;
      --chrome-icon-size: 21px;
      --chrome-icon-stroke: 1.85;
      --chrome-icon-gap: 9px;
    }
    .hub-page-header .hub-page-header-top {
      padding: max(8px, env(safe-area-inset-top)) calc(20px + env(safe-area-inset-right, 0px)) 8px var(--page-side-pad);
      min-height: 60px;
    }
    .hub-page-header .hub-page-title {
      min-width: 48px;
      min-height: 48px;
    }
    .hub-page-header .hub-page-logo {
      height: 24px;
      transform: translateY(-2px);
    }
    .hub-page-header .hub-page-header-actions {
      gap: 0;
      margin-left: auto;
    }
    .hub-page-header .hub-page-header-actions .hub-page-menu-btn {
      background: transparent;
      border: none;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      -webkit-tap-highlight-color: transparent;
      transition: none;
      color: #fff;
      justify-content: flex-end;
      padding-right: 0;
    }
    .hub-page-header .hub-page-header-actions .hub-page-menu-btn svg {
      transform: translateY(-2px);
    }
    .hub-page-header .hub-page-header-actions .hub-page-menu-btn:active,
    .hub-page-header .hub-page-header-actions .hub-page-menu-btn.open {
      background: transparent;
      transform: none;
    }
    /* ── Desktop view ── */
    html[data-view-variant="desktop"]:not([data-hub-embed="1"]) .hub-page-header {
      display: none;
    }
    html[data-view-variant="desktop"]:not([data-hub-embed="1"]) .shell > :not(.hub-page-header) {
      padding-left: 16px;
      padding-right: 16px;
    }
    html[data-view-variant="desktop"] #app-controls {
      display: none;
    }
    html[data-view-variant="desktop"] .save {
      width: auto;
      max-width: 100%;
      margin-right: auto;
    }
    html[data-view-variant="desktop"] .panel {
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0 12px;
    }
    html[data-view-variant="desktop"] .field {
      padding: 10px 0;
      border-bottom: 0.5px solid var(--line);
    }
    html[data-view-variant="desktop"] .field + .field { margin-top: 0; }
    html[data-view-variant="desktop"] .field:first-child { border-top: 0.5px solid var(--line); }
    html[data-view-variant="desktop"] .row {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    /* ── Mobile view ── */
    html[data-view-variant="mobile"]:not([data-hub-embed="1"]) .panel {
      display: none;
    }
    html[data-view-variant="mobile"]:not([data-hub-embed="1"]) .set-section {
      display: block;
      margin-bottom: 0;
    }
    html[data-view-variant="mobile"]:not([data-hub-embed="1"]) .set-section-header {
      padding: 22px 16px 7px;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
    }
    html[data-view-variant="mobile"]:not([data-hub-embed="1"]) .set-section-body {
      border-top: 0.5px solid var(--line);
      border-bottom: 0.5px solid var(--line);
    }
    html[data-view-variant="mobile"]:not([data-hub-embed="1"]) .set-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 11px 16px;
      background: var(--bg);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      min-height: 52px;
    }
    html[data-view-variant="mobile"]:not([data-hub-embed="1"]) .set-row-left {
      display: flex;
      align-items: center;
      gap: 12px;
      min-width: 0;
      flex: 1;
    }
    html[data-view-variant="mobile"]:not([data-hub-embed="1"]) .set-row-icon {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    html[data-view-variant="mobile"]:not([data-hub-embed="1"]) .set-row-icon svg {
      width: 17px;
      height: 17px;
      stroke: #fff;
      fill: none;
      stroke-width: 1.7;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    html[data-view-variant="mobile"]:not([data-hub-embed="1"]) .set-row-name {
      font-size: var(--settings-text-size, 15px);
      font-weight: 400;
      letter-spacing: -0.01em;
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    html[data-view-variant="mobile"]:not([data-hub-embed="1"]) .set-row-right {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }
    /* Select in set-row: show value text + native dropdown */
    html[data-view-variant="mobile"]:not([data-hub-embed="1"]) .set-row-right select {
      font-size: 15px;
      color: var(--muted);
      border: none;
      background: transparent;
      padding: 0;
      width: auto;
      max-width: 130px;
      text-align: right;
      outline: none;
      -webkit-appearance: auto;
      appearance: auto;
      cursor: pointer;
    }
    /* Number input in set-row */
    html[data-view-variant="mobile"]:not([data-hub-embed="1"]) .set-row-right input[type="number"] {
      font-size: 15px;
      color: var(--muted);
      border: none;
      background: transparent;
      padding: 0;
      width: 48px;
      text-align: right;
      outline: none;
      -webkit-appearance: none;
      appearance: none;
    }
    /* Chevron for select rows */
    html[data-view-variant="mobile"]:not([data-hub-embed="1"]) .set-row-chevron {
      width: 14px;
      height: 14px;
      stroke: var(--muted);
      fill: none;
      stroke-width: 2.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }
    /* Button rows */
    html[data-view-variant="mobile"]:not([data-hub-embed="1"]) .set-row-btn {
      appearance: none;
      -webkit-appearance: none;
      width: 100%;
      text-align: left;
      border: none;
      font: inherit;
      color: inherit;
    }
    html[data-view-variant="mobile"]:not([data-hub-embed="1"]) .set-row-btn[disabled] {
      opacity: 0.45;
      cursor: default;
    }
    html[data-view-variant="mobile"]:not([data-hub-embed="1"]) .mob-app-status {
      font-size: 12px;
      color: var(--muted);
      padding: 4px 16px 10px;
      display: none;
    }
    html[data-view-variant="mobile"]:not([data-hub-embed="1"]) .mob-app-status.visible {
      display: block;
    }
    /* ── iOS-style toggle ── */
    html[data-view-variant="mobile"]:not([data-hub-embed="1"]) .set-toggle {
      -webkit-appearance: none;
      appearance: none;
      position: relative;
      width: 51px;
      height: 31px;
      border-radius: 16px;
      background: rgba(120, 120, 128, 0.32);
      cursor: pointer;
      flex-shrink: 0;
      transition: background 250ms ease;
      outline: none;
      border: none;
    }
    html[data-view-variant="mobile"]:not([data-hub-embed="1"]) .set-toggle::after {
      content: '';
      position: absolute;
      width: 27px;
      height: 27px;
      border-radius: 50%;
      background: #fff;
      box-shadow: 0 3px 7px rgba(0,0,0,0.14), 0 0.5px 1px rgba(0,0,0,0.08);
      top: 2px;
      left: 2px;
      transition: transform 250ms cubic-bezier(0.32, 0.72, 0, 1);
    }
    html[data-view-variant="mobile"]:not([data-hub-embed="1"]) .set-toggle:checked {
      background: rgb(44, 132, 219);
    }
    html[data-view-variant="mobile"]:not([data-hub-embed="1"]) .set-toggle:checked::after {
      transform: translateX(20px);
    }
    /* Save button mobile */
    html[data-view-variant="mobile"]:not([data-hub-embed="1"]) .mob-save-wrap {
      padding: 20px 16px max(24px, env(safe-area-inset-bottom));
    }
    html[data-view-variant="mobile"]:not([data-hub-embed="1"]) .mob-save {
      appearance: none;
      -webkit-appearance: none;
      display: block;
      width: 100%;
      border: none;
      background: rgb(44, 132, 219);
      color: #fff;
      border-radius: 14px;
      padding: 15px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
      text-align: center;
      cursor: pointer;
      transition: opacity 120ms ease;
    }
    html[data-view-variant="mobile"]:not([data-hub-embed="1"]) .mob-save:active {
      opacity: 0.75;
    }
    html[data-view-variant="mobile"]:not([data-hub-embed="1"]) .mob-save[disabled] {
      opacity: 0.45;
      cursor: default;
    }
    /* Bold mode on Settings page */
    html[data-bold-mode="1"][data-view-variant="mobile"] .set-row-name {
      font-weight: 700;
    }
    html[data-bold-mode="1"][data-view-variant="mobile"] .set-section-header {
      font-weight: 700;
    }
    html[data-bold-mode="1"][data-view-variant="desktop"] .toggle-row {
      font-weight: 700;
    }
    html[data-bold-mode="1"][data-view-variant="desktop"] .label {
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div class="shell">
    __HUB_HEADER_HTML__
    <section class="hero">
      <div class="eyebrow">multiagent</div>
      <h1>Settings</h1>
      <div class="hub-nav">
        <a href="/">Hub</a>
        <a href="/new-session">New Session</a>
        <a href="/settings" class="active">Settings</a>
        <form class="hub-restart-form" method="post" action="/restart-hub"><button type="submit">Restart Hub</button></form>
      </div>
    </section>

    <!-- ── Desktop form ── -->
    <form class="panel" id="settingsFormDesktop" method="post" action="/settings">
      __NOTICE_HTML__
      <div class="field">
        <div class="row">
          <div>
            <label class="label" for="user_message_font">User Messages</label>
            <select id="user_message_font" name="user_message_font">
              __USER_MESSAGE_FONT_OPTIONS__
            </select>
          </div>
          <div>
            <label class="label" for="agent_message_font">Agent Messages</label>
            <select id="agent_message_font" name="agent_message_font">
              __AGENT_MESSAGE_FONT_OPTIONS__
            </select>
          </div>
        </div>
      </div>
      <div class="field">
        <label class="label" for="message_text_size">Message Text Size</label>
        <input id="message_text_size" name="message_text_size" type="number" min="11" max="18" step="1" value="__MESSAGE_TEXT_SIZE__">
      </div>
      <input type="hidden" name="agent_font_mode" value="__FONT_MODE__">
      <div class="field">
        <div class="chat-toggles">
          <label class="toggle-row">
            <span>Auto mode</span>
            <input type="checkbox" name="chat_auto_mode" value="on"__CHAT_AUTO_CHECKED__>
          </label>
          <label class="toggle-row">
            <span class="toggle-row-copy">
              <span>Awake</span>
              <span class="audio-preview-meter" id="awakePreviewMeterD" aria-hidden="true">
                <span class="audio-preview-meter-bar"></span>
                <span class="audio-preview-meter-bar"></span>
                <span class="audio-preview-meter-bar"></span>
              </span>
            </span>
            <input type="checkbox" name="chat_awake" value="on"__CHAT_AWAKE_CHECKED__>
          </label>
          <label class="toggle-row">
            <span class="toggle-row-copy">
              <span>Sound notifications</span>
              <span class="audio-preview-meter" id="soundPreviewMeterD" aria-hidden="true">
                <span class="audio-preview-meter-bar"></span>
                <span class="audio-preview-meter-bar"></span>
                <span class="audio-preview-meter-bar"></span>
              </span>
            </span>
            <input type="checkbox" name="chat_sound" value="on"__CHAT_SOUND_CHECKED__>
          </label>
          <label class="toggle-row">
            <span>Browser notifications</span>
            <input type="checkbox" name="chat_browser_notifications" value="on"__CHAT_BROWSER_NOTIF_CHECKED__>
          </label>
        </div>
      </div>
      <div class="field">
        <div class="chat-toggles">
          <label class="toggle-row">
            <span>Bold mode (mobile)</span>
            <input type="checkbox" name="bold_mode_mobile" value="on"__BOLD_MODE_MOBILE_CHECKED__>
          </label>
          <label class="toggle-row">
            <span>Bold mode (desktop)</span>
            <input type="checkbox" name="bold_mode_desktop" value="on"__BOLD_MODE_DESKTOP_CHECKED__>
          </label>
        </div>
      </div>
      <button class="save" type="submit">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 3h11l3 3v15H5z"></path><path d="M9 3v6h6V3"></path><path d="M9 15h6"></path></svg>
        <span>Save Settings</span>
      </button>
    </form>

    <!-- ── Mobile form (LINE-style) ── -->
    <form id="settingsFormMobile" method="post" action="/settings">
      __NOTICE_HTML__
      <input type="hidden" name="agent_font_mode" value="__FONT_MODE__">

      <!-- Section: Appearance -->
      <div class="set-section">

  </div>
  <script>
    const HUB_EMBED = document.documentElement.dataset.hubEmbed === "1";
    const VIEW_VARIANT = document.documentElement.dataset.viewVariant || "";
    const isMobileView = VIEW_VARIANT === "mobile";

    // ── Bold mode reflected on Settings page ──
    const boldMobileToggle = isMobileView
      ? document.querySelector('#settingsFormMobile input[name="bold_mode_mobile"]')
      : document.querySelector('#settingsFormDesktop input[name="bold_mode_mobile"]');
    const boldDesktopToggle = isMobileView
      ? document.querySelector('#settingsFormMobile input[name="bold_mode_desktop"]')
      : document.querySelector('#settingsFormDesktop input[name="bold_mode_desktop"]');
    const applyBoldMode = () => {
      const html = document.documentElement;
      const mobileBold = boldMobileToggle?.checked;
      const desktopBold = boldDesktopToggle?.checked;
      const active = (isMobileView && mobileBold) || (!isMobileView && desktopBold);
      if (active) {
        html.dataset.boldMode = '1';
      } else {
        delete html.dataset.boldMode;
      }
    };
    boldMobileToggle?.addEventListener('change', applyBoldMode);
    boldDesktopToggle?.addEventListener('change', applyBoldMode);
    applyBoldMode();

    // ── Apply chat text size to Settings page ──
    const textSizeInput = document.querySelector('input[name="message_text_size"]');
    if (textSizeInput) {
      const applyTextSize = () => {
        const sz = Math.max(11, Math.min(18, parseInt(textSizeInput.value, 10) || 15));
        document.documentElement.style.setProperty('--settings-text-size', sz + 'px');
      };
      applyTextSize();
      textSizeInput.addEventListener('input', applyTextSize);
    }

    // ── Form submit ──
    const activeForm = isMobileView
      ? document.getElementById('settingsFormMobile')
      : document.getElementById('settingsFormDesktop');
    const settingsForm = activeForm;
    if (HUB_EMBED && settingsForm) {
      settingsForm.action = "/settings?embed=1";
    }
    const closeSettingsPage = () => {
      if (HUB_EMBED && window.self !== window.top) {
        window.parent.postMessage({ type: "multiagent-hub-close-sidebar-page" }, "*");
        return;
      }
      if (window.history.length > 1) {
        window.history.back();
        return;
      }
      window.location.href = "/";
    };
    if (settingsForm) {
      settingsForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        if (settingsForm.dataset.saving === "1") return;
        settingsForm.dataset.saving = "1";
        const saveBtn = settingsForm.querySelector(".save, .mob-save");
        if (saveBtn) saveBtn.disabled = true;
        const payload = new URLSearchParams();
        const formData = new FormData(settingsForm);
        for (const [key, value] of formData.entries()) {
          payload.append(key, String(value));
        }
        try {
          const response = await fetch(settingsForm.action || "/settings", {
            method: "POST",
            headers: { "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8" },
            body: payload.toString(),
            cache: "no-store",
          });
          if (!response.ok) {
            throw new Error(`Failed to save settings (${response.status}).`);
          }
          closeSettingsPage();
        } catch (error) {
          window.alert(error?.message || "Failed to save settings.");
          if (saveBtn) saveBtn.disabled = false;
          settingsForm.dataset.saving = "0";
          return;
        }
        settingsForm.dataset.saving = "0";
      });
    }
    const hubRestartForm = document.querySelector(".hub-restart-form");
    if (hubRestartForm) {
      hubRestartForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const btn = e.currentTarget.querySelector("button");
        if (btn.classList.contains("restarting")) return;
        btn.classList.add("restarting");
        btn.disabled = true;
        btn.textContent = "Restarting…";
        try { await fetch("/restart-hub", { method: "POST" }); } catch (_) {}
        const started = Date.now();
        const poll = async () => {
          try {
            const res = await fetch(`/sessions?ts=${Date.now()}`, { cache: "no-store" });
            if (res.ok) { window.location.replace(window.location.pathname); return; }
          } catch (_) {}
          if (Date.now() - started < 20000) { setTimeout(poll, 500); } else { window.location.reload(); }
        };
        setTimeout(poll, 700);
      });
    }

    // ── Audio preview (sound toggle) ──
    const chatSoundToggle = document.querySelector('input[name="chat_sound"]');
    if (chatSoundToggle) {
      const previewAudio = new Audio('/notify-sound?name=mictest.ogg');
      previewAudio.preload = 'auto';
      const previewMeter = document.getElementById('soundPreviewMeter');
      const previewMeterBars = previewMeter ? Array.from(previewMeter.querySelectorAll('.audio-preview-meter-bar')) : [];
      let previewAudioCtx = null;
      let previewAnalyser = null;
      let previewSource = null;
      let previewMeterFrame = 0;
      let previewMeterData = null;
      const resetPreviewMeter = () => {
        if (previewMeter) previewMeter.classList.remove('is-playing');
        previewMeterBars.forEach((bar) => { bar.style.height = '2px'; });
      };
      const stopPreviewMeter = () => {
        if (previewMeterFrame) { cancelAnimationFrame(previewMeterFrame); previewMeterFrame = 0; }
        resetPreviewMeter();
      };
      const ensurePreviewMeterAudio = async () => {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx || previewAnalyser) return;
        previewAudioCtx = new AudioCtx();
        previewAnalyser = previewAudioCtx.createAnalyser();
        previewAnalyser.fftSize = 64;
        previewAnalyser.smoothingTimeConstant = 0.82;
        previewMeterData = new Uint8Array(previewAnalyser.frequencyBinCount);
        previewSource = previewAudioCtx.createMediaElementSource(previewAudio);
        previewSource.connect(previewAnalyser);
        previewAnalyser.connect(previewAudioCtx.destination);
      };
      const drawPreviewMeter = () => {
        if (!previewAnalyser || !previewMeterData || previewAudio.paused || previewAudio.ended) {
          stopPreviewMeter(); return;
        }
        previewAnalyser.getByteFrequencyData(previewMeterData);
        const groups = [previewMeterData.slice(1, 4), previewMeterData.slice(4, 10), previewMeterData.slice(10, 18)];
        if (previewMeter) previewMeter.classList.add('is-playing');
        previewMeterBars.forEach((bar, index) => {
          const group = groups[index] || [];
          const avg = group.length ? group.reduce((sum, value) => sum + value, 0) / group.length : 0;
          bar.style.height = `${Math.max(2, Math.min(8, Math.round((avg / 255) * 6) + 2))}px`;
        });
        previewMeterFrame = requestAnimationFrame(drawPreviewMeter);
      };
      const playSoundPreview = () => {
        try {
          previewAudio.pause();
          previewAudio.currentTime = 0;
          ensurePreviewMeterAudio().then(async () => {
            if (previewAudioCtx && previewAudioCtx.state === 'suspended') { try { await previewAudioCtx.resume(); } catch (_) {} }
            stopPreviewMeter();
            const result = previewAudio.play();
            if (result && typeof result.catch === 'function') { result.catch(() => { stopPreviewMeter(); }); }
            drawPreviewMeter();
          }).catch(() => { resetPreviewMeter(); });
        } catch (_) {}
      };
      previewAudio.addEventListener('ended', stopPreviewMeter);
      previewAudio.addEventListener('pause', () => { if (!previewAudio.ended) stopPreviewMeter(); });
      chatSoundToggle.addEventListener('change', () => {
        if (chatSoundToggle.checked) playSoundPreview();
      });
    }

    // ── Audio preview (awake toggle) ──
    const chatAwakeToggle = document.querySelector('input[name="chat_awake"]');
    if (chatAwakeToggle) {
      const awakeAudio = new Audio('/notify-sound?name=awake.ogg');
      awakeAudio.preload = 'auto';
      const awakeMeter = document.getElementById('awakePreviewMeter');
      const awakeMeterBars = awakeMeter ? Array.from(awakeMeter.querySelectorAll('.audio-preview-meter-bar')) : [];
      let awakeAudioCtx = null;
      let awakeAnalyser = null;
      let awakeSource = null;
      let awakeMeterFrame = 0;
      let awakeMeterData = null;
      const resetAwakeMeter = () => {
        if (awakeMeter) awakeMeter.classList.remove('is-playing');
        awakeMeterBars.forEach((bar) => { bar.style.height = '2px'; });
      };
      const stopAwakeMeter = () => {
        if (awakeMeterFrame) { cancelAnimationFrame(awakeMeterFrame); awakeMeterFrame = 0; }
        resetAwakeMeter();
      };
      const ensureAwakeMeterAudio = async () => {
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx || awakeAnalyser) return;
        awakeAudioCtx = new AudioCtx();
        awakeAnalyser = awakeAudioCtx.createAnalyser();
        awakeAnalyser.fftSize = 64;
        awakeAnalyser.smoothingTimeConstant = 0.82;
        awakeMeterData = new Uint8Array(awakeAnalyser.frequencyBinCount);
        awakeSource = awakeAudioCtx.createMediaElementSource(awakeAudio);
        awakeSource.connect(awakeAnalyser);
        awakeAnalyser.connect(awakeAudioCtx.destination);
      };
      const drawAwakeMeter = () => {
        if (!awakeAnalyser || !awakeMeterData || awakeAudio.paused || awakeAudio.ended) {
          stopAwakeMeter(); return;
        }
        awakeAnalyser.getByteFrequencyData(awakeMeterData);
        const groups = [awakeMeterData.slice(1, 4), awakeMeterData.slice(4, 10), awakeMeterData.slice(10, 18)];
        if (awakeMeter) awakeMeter.classList.add('is-playing');
        awakeMeterBars.forEach((bar, index) => {
          const group = groups[index] || [];
          const avg = group.length ? group.reduce((sum, value) => sum + value, 0) / group.length : 0;
          bar.style.height = `${Math.max(2, Math.min(8, Math.round((avg / 255) * 6) + 2))}px`;
        });
        awakeMeterFrame = requestAnimationFrame(drawAwakeMeter);
      };
      awakeAudio.addEventListener('ended', stopAwakeMeter);
      awakeAudio.addEventListener('pause', () => { if (!awakeAudio.ended) stopAwakeMeter(); });
      chatAwakeToggle.addEventListener('change', () => {
        const chatSoundToggleRef = document.querySelector('input[name="chat_sound"]');
        if (chatAwakeToggle.checked && chatSoundToggleRef && chatSoundToggleRef.checked) {
          try {
            awakeAudio.pause(); awakeAudio.currentTime = 0;
            ensureAwakeMeterAudio().then(async () => {
              if (awakeAudioCtx && awakeAudioCtx.state === 'suspended') { try { await awakeAudioCtx.resume(); } catch (_) {} }
              stopAwakeMeter();
              const result = awakeAudio.play();
              if (result && typeof result.catch === 'function') { result.catch(() => { stopAwakeMeter(); }); }
              drawAwakeMeter();
            }).catch(() => { resetAwakeMeter(); });
          } catch (_) {}
        }
      });
    }

    // ── App install / notifications ──
    const installAppBtn = document.getElementById('installAppBtn');
    const installStatus = document.getElementById('installStatus');
    const installHelp = document.getElementById('installHelp');
    const notificationPermissionBtn = document.getElementById('notificationPermissionBtn');
    const testNotificationBtn = document.getElementById('testNotificationBtn');
    const notificationStatus = document.getElementById('notificationStatus');
    const chatBrowserNotificationToggle = document.querySelector('input[name="chat_browser_notifications"]');
    let deferredInstallPrompt = null;
    const hubPushClientId = (() => {
      const fallback = `hub-push-${Date.now()}-${Math.random().toString(36).slice(2, 10)}`;
      try {
        const key = "multiagentHubPushClientId";
        const current = localStorage.getItem(key);
        if (current) return current;
        const created = (window.crypto && typeof window.crypto.randomUUID === 'function')
          ? window.crypto.randomUUID()
          : fallback;
        localStorage.setItem(key, created);
        return created;
      } catch (_) { return fallback; }
    })();
    const isStandaloneApp = () => window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    const isIOS = /iphone|ipad|ipod/i.test(window.navigator.userAgent || "");
    const isSafari = /^((?!chrome|android).)*safari/i.test(window.navigator.userAgent || "");
    const supportsNotificationApi = typeof window.Notification !== 'undefined';
    const supportsPushNotifications = 'serviceWorker' in navigator && 'PushManager' in window;
    const notificationIconUrl = `${window.location.origin}/pwa-icon-192.png`;
    const notificationTargetUrl = `${window.location.origin}${window.location.pathname}${window.location.search || ''}`;
    let hubPushActive = false;
    let hubPushSyncPromise = null;
    let lastHubPushPresenceSig = "";
    const setInstallStatus = (_) => { if (installStatus) installStatus.textContent = ""; };
    const setNotificationStatus = (_) => { if (notificationStatus) notificationStatus.textContent = ""; };
    const urlB64ToUint8Array = (raw) => {
      const text = String(raw || "").trim();
      if (!text) return new Uint8Array();
      const pad = "=".repeat((4 - (text.length % 4 || 4)) % 4);
      const normalized = (text + pad).replace(/-/g, "+").replace(/_/g, "/");
      const decoded = atob(normalized);
      return Uint8Array.from(decoded, (char) => char.charCodeAt(0));
    };
    const uint8ArrayToUrlB64 = (raw) => {
      const bytes = raw instanceof Uint8Array ? raw : new Uint8Array(raw || []);
      let binary = "";
      for (let i = 0; i < bytes.length; i++) binary += String.fromCharCode(bytes[i]);
      return btoa(binary).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
    };
    const hubPushSubscriptionPayload = (subscription) => {
      if (!subscription) return null;
      const payload = subscription.toJSON ? subscription.toJSON() : {};
      const keys = { ...(payload?.keys || {}) };
      try {
        if (!keys.p256dh && typeof subscription.getKey === 'function') {
          const p256dh = subscription.getKey('p256dh');
          if (p256dh) keys.p256dh = uint8ArrayToUrlB64(new Uint8Array(p256dh));
        }
        if (!keys.auth && typeof subscription.getKey === 'function') {
          const auth = subscription.getKey('auth');
          if (auth) keys.auth = uint8ArrayToUrlB64(new Uint8Array(auth));
        }
      } catch (_) {}
      return {
        endpoint: subscription.endpoint || payload?.endpoint || "",
        expirationTime: subscription.expirationTime ?? payload?.expirationTime ?? null,
        keys,
      };
    };
    const postHubPushPresence = async ({ force = false, keepalive = false } = {}) => {
      if (!hubPushActive) return;
      try {
        const registration = await navigator.serviceWorker.ready;
        const subscription = await registration.pushManager.getSubscription();
        const body = {
          client_id: hubPushClientId,
          endpoint: subscription?.endpoint || "",
          visible: !document.hidden,
          focused: typeof document.hasFocus === 'function' ? document.hasFocus() : !document.hidden,
        };
        const sig = JSON.stringify(body);
        if (!force && sig === lastHubPushPresenceSig) return;
        lastHubPushPresenceSig = sig;
        await fetch('/push/presence', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          cache: 'no-store',
          keepalive,
          body: sig,
        });
      } catch (_) {}
    };
    const syncHubPushSubscription = async ({ unsubscribeOnly = false } = {}) => {
      if (!supportsPushNotifications || !supportsNotificationApi) { hubPushActive = false; return false; }
      if (hubPushSyncPromise) return hubPushSyncPromise;
      hubPushSyncPromise = (async () => {
        const registration = await navigator.serviceWorker.ready;
        let subscription = await registration.pushManager.getSubscription();
        if (unsubscribeOnly || !chatBrowserNotificationToggle?.checked || Notification.permission !== 'granted') {
          hubPushActive = false;
          lastHubPushPresenceSig = "";
          if (subscription) {
            try {
              await fetch('/push/unsubscribe', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                cache: 'no-store',
                keepalive: true,
                body: JSON.stringify({ client_id: hubPushClientId, endpoint: subscription.endpoint || "" }),
              });
            } catch (_) {}
            try { await subscription.unsubscribe(); } catch (_) {}
          }
          return false;
        }
        const configRes = await fetch(`/push-config?ts=${Date.now()}`, { cache: 'no-store' });
        if (!configRes.ok) { hubPushActive = false; return false; }
        const config = await configRes.json();
        const publicKey = String(config?.public_key || '').trim();
        if (!publicKey || !config?.enabled) { hubPushActive = false; return false; }
        if (!subscription) {
          subscription = await registration.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlB64ToUint8Array(publicKey),
          });
        }
        const subPayload = hubPushSubscriptionPayload(subscription);
        if (!subPayload || !subPayload.endpoint || !subPayload.keys?.p256dh || !subPayload.keys?.auth) {
          hubPushActive = false; return false;
        }
        const saveRes = await fetch('/push/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          cache: 'no-store',
          body: JSON.stringify({
            client_id: hubPushClientId,
            user_agent: navigator.userAgent || '',
            subscription: subPayload,
          }),
        });
        if (!saveRes.ok) { hubPushActive = false; return false; }
        hubPushActive = true;
        await postHubPushPresence({ force: true });
        return true;
      })().catch(() => { hubPushActive = false; return false; }).finally(() => { hubPushSyncPromise = null; });
      return hubPushSyncPromise;
    };
    const updateInstallUi = () => {
      if (!installAppBtn) return;
      if (installHelp) installHelp.hidden = true;
      if (isStandaloneApp()) {
        installAppBtn.disabled = true;
        installAppBtn.querySelector('.set-row-name').textContent = 'Installed';
        setInstallStatus(""); return;
      }
      installAppBtn.disabled = false;
      if (deferredInstallPrompt) {
        installAppBtn.querySelector('.set-row-name').textContent = 'Install This App';
        setInstallStatus(""); return;
      }
      if (isIOS && isSafari) {
        installAppBtn.querySelector('.set-row-name').textContent = 'Show iPhone Steps';
        setInstallStatus(""); return;
      }
      installAppBtn.querySelector('.set-row-name').textContent = 'Show Install Help';
      setInstallStatus("");
    };
    const updateNotificationUi = () => {
      if (!notificationPermissionBtn || !testNotificationBtn) return;
      if (!supportsNotificationApi) {
        notificationPermissionBtn.disabled = true;
        testNotificationBtn.disabled = true;
        setNotificationStatus(""); return;
      }
      const permission = Notification.permission;
      testNotificationBtn.hidden = permission !== 'granted';
      testNotificationBtn.disabled = permission !== 'granted';
      if (permission === 'granted') {
        notificationPermissionBtn.disabled = true;
        notificationPermissionBtn.querySelector('.set-row-name').textContent = 'Notifications Enabled';
        setNotificationStatus(""); return;
      }
      if (permission === 'denied') {
        notificationPermissionBtn.disabled = true;
        notificationPermissionBtn.querySelector('.set-row-name').textContent = 'Notifications Blocked';
        setNotificationStatus(""); return;
      }
      notificationPermissionBtn.disabled = false;
      notificationPermissionBtn.querySelector('.set-row-name').textContent = 'Allow Notifications';
      setNotificationStatus("");
    };
    const showTestNotification = async () => {
      if (!supportsNotificationApi || Notification.permission !== 'granted') return;
      try {
        const registration = ('serviceWorker' in navigator) ? await navigator.serviceWorker.ready : null;
        if (registration && typeof registration.showNotification === 'function') {
          await registration.showNotification('multiagent notifications', {
            body: 'Browser notifications are working on this device.',
            tag: 'multiagent-notification-test',
            icon: notificationIconUrl,
            badge: notificationIconUrl,
            data: { url: notificationTargetUrl },
          });
          return;
        }
      } catch (_) {}
      try {
        const notification = new Notification('multiagent notifications', {
          body: 'Browser notifications are working on this device.',
          icon: notificationIconUrl,
          tag: 'multiagent-notification-test',
        });
        notification.onclick = () => { window.focus(); notification.close(); };
      } catch (_) {}
    };
    if (chatBrowserNotificationToggle) {
      chatBrowserNotificationToggle.addEventListener('change', () => {
        updateNotificationUi();
        syncHubPushSubscription(chatBrowserNotificationToggle.checked ? {} : { unsubscribeOnly: true }).catch(() => {});
      });
    }
    if (installAppBtn) {
      installAppBtn.addEventListener('click', async () => {
        if (deferredInstallPrompt) {
          try { deferredInstallPrompt.prompt(); await deferredInstallPrompt.userChoice; } catch (_) {}
          deferredInstallPrompt = null;
          updateInstallUi(); return;
        }
        if (installHelp) {
          installHelp.hidden = false;
          installHelp.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        } else if (installStatus) {
          setInstallStatus("");
        }
      });
    }
    window.addEventListener('beforeinstallprompt', (event) => {
      event.preventDefault();
      deferredInstallPrompt = event;
      updateInstallUi();
    });
    window.addEventListener('appinstalled', () => {
      deferredInstallPrompt = null;
      updateInstallUi();
    });
    if (notificationPermissionBtn) {
      notificationPermissionBtn.addEventListener('click', async () => {
        if (!supportsNotificationApi) return;
        try { await Notification.requestPermission(); } catch (_) {}
        updateNotificationUi();
        syncHubPushSubscription().catch(() => {});
      });
    }
    if (testNotificationBtn) {
      testNotificationBtn.addEventListener('click', () => { showTestNotification(); });
    }
    updateInstallUi();
    updateNotificationUi();
    syncHubPushSubscription().catch(() => {});
    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) syncHubPushSubscription().catch(() => {});
      postHubPushPresence({ force: true, keepalive: document.hidden }).catch(() => {});
    });
    window.addEventListener('focus', () => { postHubPushPresence({ force: true }).catch(() => {}); });
    window.addEventListener('blur', () => { postHubPushPresence({ force: true, keepalive: true }).catch(() => {}); });
    window.addEventListener('pageshow', () => { postHubPushPresence({ force: true }).catch(() => {}); });
    window.addEventListener('pagehide', () => { postHubPushPresence({ force: true, keepalive: true }).catch(() => {}); });
    setInterval(() => { postHubPushPresence().catch(() => {}); }, 20000);
  __HUB_HEADER_JS__
  </script>
