<!doctype html>
<html lang="en" data-theme="black-hole">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="rgb(10, 10, 10)">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Session Hub">
  <link rel="manifest" href="__HUB_MANIFEST_URL__">
  <link rel="icon" type="image/png" sizes="192x192" href="__PWA_ICON_192_URL__">
  <link rel="apple-touch-icon" href="__APPLE_TOUCH_ICON_URL__">
  <script>
    (() => {
      if (!("serviceWorker" in navigator)) return;
      const isLocalHost = location.hostname === "localhost" || location.hostname === "127.0.0.1" || location.hostname === "[::1]";
      if (!(window.isSecureContext || isLocalHost)) return;
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/hub-service-worker.js", { scope: "/" }).catch((err) => {
          console.warn("hub service worker registration failed", err);
        });
      }, { once: true });
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">
  <title>Session Hub</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: rgb(10, 10, 10);
      --bg-rgb: 10, 10, 10;
      --panel: rgba(18, 18, 20, 0.7);
      --panel-2: rgba(25, 25, 28, 0.8);
      --line: rgba(255,255,255,0.06);
      --line-strong: rgba(255,255,255,0.12);
      --fg: rgb(245, 245, 245);
      --muted: rgb(140, 140, 145);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: "SF Pro Text", "Segoe UI", sans-serif;
    }
    body {
      padding: 0;
    }
    .shell {
      width: 100%;
      min-height: 100dvh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
    }
    .hero {
      padding: 8px 2px 18px 2px;
    }
    .eyebrow {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 40px);
      line-height: 1.02;
      font-weight: 600;
      letter-spacing: -0.03em;
    }
    .sub {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      max-width: 40rem;
    }
    .home-grid {
      display: grid;
      gap: 12px;
      margin-top: 8px;
    }
    .hub-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
      width: 100%;
      align-items: center;
    }
    .hub-nav a {
      color: var(--muted);
      text-decoration: none;
      border: 0.5px solid var(--line);
      background: var(--panel);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      line-height: 1;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .hub-nav form {
      margin: 0;
    }
    .hub-nav .hub-restart-form {
      margin-left: auto;
    }
    .hub-nav button {
      color: var(--muted);
      border: 0.5px solid var(--line);
      background: var(--panel);
      border-radius: 999px;
      padding: 6px 10px;
      font: inherit;
      font-size: 12px;
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }
    .hub-nav .hub-restart-form button { color: rgb(44, 132, 219); }
    @keyframes hubRestartingPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .hub-nav button.restarting { animation: hubRestartingPulse 900ms ease-in-out infinite; pointer-events: none; }
    .home-card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--panel);
      border: 0.5px solid var(--line);
      border-radius: 20px;
      padding: 24px 22px 22px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15), inset 0 1px 1px rgba(255, 255, 255, 0.05);
      transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      position: relative;
      overflow: hidden;
    }
    .home-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(circle at top left, rgba(255,255,255,0.04), transparent 60%);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }
    .home-card:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.25), inset 0 1px 1px rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.15);
      background: var(--panel-2);
    }
    .home-card:hover::before {
      opacity: 1;
    }
    .home-label {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .home-title {
      font-size: 22px;
      line-height: 1.1;
      font-weight: 600;
      letter-spacing: -0.03em;
    }
    .home-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      margin-top: 10px;
      max-width: 34rem;
    }
    .hub-nav a.active {
      background: var(--bg) !important;
      border-color: rgba(255, 255, 255, 0.2) !important;
    }
    /* ── Hub home layout ── */
    body { padding: 0; }
    .hero, .home-grid, .hub-nav { display: none !important; }
    __HUB_HEADER_CSS__
    .desk-workbench {
      --desk-sidebar-width: 304px;
      --desk-sidebar-min-width: 248px;
      --desk-sidebar-max-width: 420px;
      --desk-phone-gap: 48px;
      --desk-phone-sidebar-width: min(var(--desk-sidebar-width), calc(100vw - var(--desk-phone-gap)));
      display: grid;
      position: relative;
      flex: 1;
      min-height: 0;
      width: 100%;
      background: var(--bg);
      overflow: hidden;
      grid-template-columns: 0 minmax(0, 1fr);
      align-items: stretch;
      transition: grid-template-columns 220ms cubic-bezier(0.22, 1, 0.36, 1);
    }
    .desk-workbench.sidebar-open {
      grid-template-columns: var(--desk-sidebar-width) minmax(0, 1fr);
    }
    .desk-sidebar {
      position: relative;
      width: var(--desk-sidebar-width);
      max-width: 100%;
      min-width: 0;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transform: translateX(-18px);
      transition: opacity 220ms ease, transform 220ms cubic-bezier(0.22, 1, 0.36, 1), width 180ms ease;
      border-right: 0.5px solid rgba(255,255,255,0.08);
      background: var(--bg);
      box-shadow: none;
      z-index: 6;
    }
    .desk-workbench.sidebar-open .desk-sidebar {
      width: var(--desk-sidebar-width);
      opacity: 1;
      pointer-events: auto;
      transform: translateX(0);
    }
    .desk-workbench-resizing,
    .desk-workbench-resizing * {
      cursor: col-resize !important;
      user-select: none !important;
    }
    .desk-sidebar-resizer {
      position: absolute;
      top: 0;
      bottom: 0;
      left: calc(var(--desk-sidebar-width) - 6px);
      width: 14px;
      z-index: 10;
      cursor: col-resize;
      opacity: 0;
      transition: opacity 150ms ease;
      touch-action: none;
    }
    .desk-sidebar-resizer::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 6px;
      width: 2px;
      height: 64px;
      transform: translateY(-50%);
      border-radius: 999px;
      background: rgba(255,255,255,0.16);
    }
    .desk-workbench.sidebar-open .desk-sidebar-resizer {
      opacity: 1;
    }
    .desk-sidebar-shell {
      height: 100%;
      width: 100%;
      max-width: 100%;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      min-width: 0;
      overflow: hidden;
      padding-top: 0;
    }
    .desk-sidebar-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: max(8px, env(safe-area-inset-top, 0px)) 14px 8px;
      min-height: 48px;
    }
    .desk-sidebar-topbar-actions {
      display: inline-flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
      margin-left: auto;
    }
    .desk-settings-icon-btn {
      width: 28px;
      height: 28px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: none;
      color: rgba(255,255,255,0.74);
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      transition: color 120ms ease, transform 120ms ease;
    }
    .desk-settings-icon-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .desk-settings-icon-btn:hover {
      color: var(--fg);
      transform: translateY(-1px);
    }
    .desk-settings-icon-btn.is-active {
      color: var(--fg);
    }
    .desk-launcher-btn {
      display: inline-flex;
      align-items: center;
      justify-content: flex-start;
      gap: 0;
      width: auto;
      min-width: 48px;
      height: 48px;
      margin-right: 0;
    }
    .desk-launcher-logo {
      height: 26px;
      width: auto;
      display: block;
      filter: invert(1) grayscale(1) brightness(1.04) contrast(1.04);
      flex: 0 0 auto;
    }
    .desk-launcher-badge {
      font-size: 13px;
      line-height: 1;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: rgba(252,252,252,0.9);
      flex: 0 0 auto;
    }
    .desk-sidebar-content {
      min-height: 0;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .desk-sidebar-pane,
    .desk-sidebar-sessions {
      flex: 1;
      min-height: 0;
      min-width: 0;
      overflow: hidden;
    }
    .desk-sidebar-pane[hidden],
    .desk-sidebar-sessions[hidden] {
      display: none !important;
    }
    .desk-sidebar-pane {
      display: flex;
      flex-direction: column;
    }
    .desk-sidebar-pane-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 16px 12px;
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
    }
    .desk-sidebar-pane-title {
      font-size: 18px;
      line-height: 1.05;
      font-weight: 650;
      letter-spacing: -0.03em;
      color: var(--fg);
    }
    .desk-sidebar-frame {
      flex: 1;
      min-height: 0;
      width: 100%;
      border: none;
      background: transparent;
    }
    .desk-session-list {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 0 0 20px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }
    .desk-session-list::-webkit-scrollbar { display: none; }
    .desk-new-session-section {
      padding: 0;
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
    }
    .desk-new-session-toggle {
      width: 100%;
      margin: 0;
    }
    .desk-inline-panel {
      display: none;
      margin-top: 0;
      border-radius: 0;
      overflow: hidden;
      border-top: 0.5px solid rgba(255,255,255,0.08);
      background: var(--bg);
    }
    .desk-inline-panel.open {
      display: block;
    }
    .desk-inline-frame {
      display: block;
      width: 100%;
      height: 420px;
      border: none;
      background: transparent;
      transition: height 180ms ease;
    }
    .desk-section-label {
      padding: 9px 12px 8px;
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .desk-session-row {
      display: block;
      padding: 10px 12px 9px;
      border-bottom: none;
      border-radius: 0;
      cursor: pointer;
      overflow: hidden;
      transition: background 120ms ease, border-color 120ms ease;
    }
    .desk-session-row:hover {
      background: rgba(255,255,255,0.04);
    }
    .desk-session-row.archived {
      opacity: 0.82;
    }
    .desk-swipe-row {
      position: relative;
      overflow: hidden;
      border-radius: 0;
      margin: 0;
      background: transparent;
      border-bottom: 0.5px solid rgba(255,255,255,0.06);
    }
    .desk-swipe-track {
      position: relative;
      z-index: 1;
      will-change: transform;
      touch-action: pan-y;
      background: var(--bg);
    }
    .desk-swipe-action-rail {
      position: absolute;
      inset: 0 0 0 auto;
      display: flex;
      align-items: stretch;
      justify-content: flex-end;
      z-index: 0;
    }
    .desk-swipe-action-btn {
      min-width: 92px;
      border: none;
      background: rgb(255, 59, 48);
      color: #fff;
      font: inherit;
      font-size: 12px;
      font-weight: 650;
      letter-spacing: 0.02em;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      padding: 0 16px;
    }
    .desk-swipe-action-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      stroke-width: 2.2;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex: 0 0 auto;
    }
    .desk-row-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 8px;
      min-width: 0;
    }
    .desk-row-main {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }
    .desk-row-bullet {
      flex: 0 0 auto;
      width: 15px;
      height: 12px;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 2.5px;
      margin-top: 2px;
    }
    .desk-row-bullet i {
      display: block;
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: rgba(255,255,255,0.20);
      transition: background 160ms ease;
    }
    @keyframes deskRunningDotJump {
      0%, 100% { transform: translateY(0); opacity: 0.35; }
      50% { transform: translateY(-1.5px); opacity: 1; }
    }
    .desk-row-bullet.is-running i {
      background: rgba(255,255,255,0.96);
      animation: deskRunningDotJump 1.2s ease-in-out infinite;
    }
    .desk-row-bullet.is-running i:nth-child(2) { animation-delay: 0.15s; }
    .desk-row-bullet.is-running i:nth-child(3) { animation-delay: 0.3s; }
    .desk-row-bullet:not(.is-running) i:not(:first-child) {
      display: none;
    }
    .desk-row-bullet:not(.is-running) i:first-child {
      width: 8px;
      height: 8px;
      margin-left: 1px;
    }
    .desk-row-stack {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 1px;
    }
    .desk-row-name {
      font-size: 13px;
      line-height: 1.3;
      font-weight: 500;
      letter-spacing: -0.01em;
      color: var(--fg);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .desk-row-expand-btn {
      width: 24px;
      height: 24px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: none;
      color: var(--muted);
      cursor: pointer;
      padding: 0;
      margin-top: -1px;
      flex: 0 0 auto;
      transition: transform 180ms ease, color 120ms ease;
    }
    .desk-row-expand-btn:hover {
      color: var(--fg);
    }
    .desk-row-expand-btn svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      stroke-width: 2.4;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .desk-session-row.expanded .desk-row-expand-btn {
      transform: rotate(90deg);
      color: var(--fg);
    }
    .desk-row-preview {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }
    .desk-row-preview .sender {
      color: var(--fg);
      opacity: 0.72;
      margin-right: 4px;
    }
    .desk-row-preview.is-empty {
      opacity: 0.8;
      font-style: italic;
    }
    .desk-row-detail {
      display: none;
      margin: 8px 0 0 18px;
      padding-top: 8px;
      border-top: 0.5px solid rgba(255,255,255,0.08);
    }
    .desk-session-row.expanded .desk-row-detail {
      display: block;
    }
    .session-detail-line {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      min-width: 0;
    }
    .session-detail-line + .session-detail-line {
      margin-top: 6px;
    }
    .session-detail-label {
      flex: 0 0 72px;
      font-size: 10px;
      line-height: 1.35;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.52);
    }
    .session-detail-value {
      flex: 1;
      min-width: 0;
      font-size: 11px;
      line-height: 1.35;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .session-detail-path {
      display: block;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .session-detail-aux {
      color: var(--fg);
      opacity: 0.7;
    }
    .session-agent-list {
      display: flex;
      align-items: center;
      flex-wrap: nowrap;
      gap: 4px;
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
    }
    .session-agent-icon {
      width: 14px;
      height: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: var(--fg);
      opacity: 0.62;
      font-size: 10px;
      line-height: 1;
      letter-spacing: 0.02em;
      flex: 0 0 auto;
    }
    .session-agent-icon img {
      width: 14px;
      height: 14px;
      display: block;
      filter: brightness(0) invert(1) grayscale(1);
      opacity: 0.68;
    }
    .session-agent-more {
      flex: 0 0 auto;
      font-size: 10px;
      line-height: 1;
      color: rgba(255,255,255,0.52);
    }
    .session-agent-empty {
      font-size: 12px;
      color: var(--muted);
    }
    .desk-empty-list {
      padding: 18px 12px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }
    .desk-main {
      position: relative;
      min-width: 0;
      min-height: 0;
      height: 100%;
      width: 100%;
      background: var(--bg);
      display: flex;
      align-items: stretch;
      justify-content: center;
      padding: 0;
    }
    .desk-chat-shell {
      position: relative;
      width: 100%;
      min-width: 0;
      height: 100%;
      margin: 0;
    }
    .desk-chat-frame {
      display: block;
      width: 100%;
      height: 100%;
      border: none;
      background: var(--bg);
    }
    @media (max-width: 480px) {
      .desk-workbench,
      .desk-workbench.sidebar-open {
        display: block;
        grid-template-columns: none;
      }
      .desk-sidebar {
        position: absolute;
        inset: 0 auto 0 0;
        width: var(--desk-phone-sidebar-width);
        max-width: calc(100vw - var(--desk-phone-gap));
        transform: translateX(calc(-100% - 14px));
        box-shadow: 18px 0 36px rgba(0,0,0,0.28);
      }
      .desk-sidebar-shell {
        width: 100%;
      }
      .desk-workbench.sidebar-open .desk-sidebar {
        width: var(--desk-phone-sidebar-width);
        transform: translateX(0);
      }
      .desk-launcher-btn {
        left: max(10px, calc(env(safe-area-inset-left, 0px) + 10px));
      }
      .desk-main {
        transition: filter 220ms ease, transform 220ms ease, opacity 220ms ease;
      }
      .desk-workbench.sidebar-open .desk-main {
        filter: blur(18px) saturate(0.82);
        transform: scale(0.986);
        opacity: 0.58;
      }
      .desk-sidebar-resizer {
        display: none;
      }
    }
    body {
      padding-bottom: 0;
      overflow: hidden;
    }
    .shell {
      height: 100dvh;
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="desk-workbench" id="deskWorkbench">
      <aside class="desk-sidebar" id="deskSidebar">
        <div class="desk-sidebar-shell">
          <div class="desk-sidebar-topbar">
            <button type="button" class="desk-settings-icon-btn desk-launcher-btn" id="deskLauncherBtn" aria-label="Sessions" title="Sessions">
              <img src="__HUB_LOGO_DATA_URI__" alt="" class="desk-launcher-logo">
            </button>
            <div class="desk-sidebar-topbar-actions">
              <button type="button" class="desk-settings-icon-btn" id="deskReloadBtn" aria-label="Reload" title="Reload">
                <svg viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"></polyline><path d="M3.51 15a9 9 0 1 0 .49-3.62"></path></svg>
              </button>
              <button type="button" class="desk-settings-icon-btn" id="deskSettingsBtn" data-desk-action="open-settings" aria-label="Settings" title="Settings">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
              </button>
            </div>
          </div>
          <div class="desk-sidebar-content">
            <div class="desk-sidebar-sessions" id="deskSidebarSessions">
              <div class="desk-new-session-section">
                <div class="desk-session-row desk-new-session-toggle" id="deskNewSessionToggle" tabindex="0" role="button" aria-expanded="false">
                  <div class="desk-row-head">
                    <div class="desk-row-main">
                      <span class="desk-row-bullet" aria-hidden="true"><i></i><i></i><i></i></span>
                      <div class="desk-row-stack">
                        <div class="desk-row-name">New Session</div>
                      </div>
                    </div>
                    <button type="button" class="desk-row-expand-btn" aria-hidden="true" tabindex="-1">
                      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"></polyline></svg>
                    </button>
                  </div>
                </div>
                <div class="desk-inline-panel" id="deskNewSessionPanel">
                  <iframe
                    class="desk-inline-frame"
                    id="deskNewSessionFrame"
                    src="about:blank"
                    allow="camera; microphone; clipboard-write"
                  ></iframe>
                </div>
              </div>
              <div class="desk-session-list" id="deskSessionList">
                <div class="desk-empty-list">Loading sessions…</div>
              </div>
            </div>
            <div class="desk-sidebar-pane" id="deskSidebarPane" hidden>
              <div class="desk-sidebar-pane-head">
                <div class="desk-sidebar-pane-title" id="deskSidebarPaneTitle">New Session</div>
              </div>
              <iframe
                class="desk-sidebar-frame"
                id="deskSidebarFrame"
                src="about:blank"
                allow="camera; microphone; clipboard-write"
              ></iframe>
            </div>
          </div>
        </div>
      </aside>
      <div class="desk-sidebar-resizer" id="deskSidebarResizer" aria-hidden="true"></div>
      <section class="desk-main">
        <div class="desk-chat-shell">
          <iframe
            class="desk-chat-frame"
            id="deskChatFrame"
            src="about:blank"
            allow="camera; microphone; clipboard-write"
          ></iframe>
        </div>
      </section>
    </div>
  </div>
  <script>
    const PHONE_VIEWPORT_MAX_PX = 480;
    const _deskWorkbench = document.getElementById("deskWorkbench");
    const _deskSidebar = document.getElementById("deskSidebar");
    const _deskSidebarResizer = document.getElementById("deskSidebarResizer");
    const _deskLauncherBtn = document.getElementById("deskLauncherBtn");
    const _deskSidebarEnvBadge = document.getElementById("deskSidebarEnvBadge");
    const _deskSessionList = document.getElementById("deskSessionList");
    const _deskChatFrame = document.getElementById("deskChatFrame");
    const _deskMain = document.querySelector(".desk-main");
    const _deskSidebarSessions = document.getElementById("deskSidebarSessions");
    const _deskSidebarPane = document.getElementById("deskSidebarPane");
    const _deskSidebarFrame = document.getElementById("deskSidebarFrame");
    const _deskSidebarPaneTitle = document.getElementById("deskSidebarPaneTitle");
    const _deskSettingsBtn = document.getElementById("deskSettingsBtn");
    const _deskReloadBtn = document.getElementById("deskReloadBtn");
    const _deskNewSessionToggle = document.getElementById("deskNewSessionToggle");
    const _deskNewSessionPanel = document.getElementById("deskNewSessionPanel");
    const _deskNewSessionFrame = document.getElementById("deskNewSessionFrame");
    const DESK_SELECTED_KEY = "multiagent_hub_selected_session";
    const DESK_EXPANDED_KEY = "multiagent_hub_desktop_expanded_rows";
    const DESK_SIDEBAR_WIDTH_KEY = "multiagent_hub_sidebar_width";
    const PINNED_KEY = "multiagent_hub_pinned";
    const DESK_DEFAULT_SIDEBAR_WIDTH = 304;
    const DESK_MIN_SIDEBAR_WIDTH = 248;
    const DESK_MAX_SIDEBAR_WIDTH = 420;
    const DESK_SWIPE_ACTION_WIDTH = 92;
    const DESK_SWIPE_OPEN_THRESHOLD = 40;
    const DESK_ACTIVE_PREWARM_LIMIT = 8;
    const DESK_ACTIVE_PREWARM_CONCURRENCY = 2;
    const DESK_SIDEBAR_CLOSE_SWIPE_EDGE_PX = 36;
    const DESK_SIDEBAR_CLOSE_SWIPE_THRESHOLD = 54;
    const DESK_CHAT_URL_CACHE_LIMIT = 16;
    const _phoneViewportQuery = window.matchMedia(`(max-width: ${PHONE_VIEWPORT_MAX_PX}px)`);
    const AGENT_ICON_SOURCES = {
      claude: "__CLAUDE_ICON__",
      codex: "__CODEX_ICON__",
      gemini: "__GEMINI_ICON__",
      kimi: "__KIMI_ICON__",
      copilot: "__COPILOT_ICON__",
      cursor: "__CURSOR_ICON__",
      grok: "__GROK_ICON__",
      opencode: "__OPENCODE_ICON__",
      qwen: "__QWEN_ICON__",
      aider: "__AIDER_ICON__",
    };
    const AGENT_DISPLAY_NAMES = {
      claude: "Claude",
      codex: "Codex",
      gemini: "Gemini",
      kimi: "Kimi",
      copilot: "Copilot",
      cursor: "Cursor",
      grok: "Grok",
      opencode: "OpenCode",
      qwen: "Qwen",
      aider: "Aider",
    };
    const esc = (value) => String(value || "").replace(/[&<>"']/g, (char) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[char]));
    const isLocalHubHostname = (host = String(location.hostname || "")) =>
      host === "127.0.0.1" || host === "localhost" || host === "[::1]" || host.startsWith("192.168.") || host.startsWith("10.") || /^172\\.(1[6-9]|2\\d|3[01])\\./.test(host);

    let _hubSessionsCache = { active: [], archived: [] };
    let _deskSelectedSessionName = "";
    let _deskExpandedRows = new Set();
    let _deskOpenToken = 0;
    let _deskSidebarMode = "list";
    let _deskNewSessionExpanded = false;
    let _deskSidebarWidth = DESK_DEFAULT_SIDEBAR_WIDTH;
    let _deskChatUrlCache = new Map();
    let _deskChatUrlInflight = new Map();
    let _deskActivePrewarmToken = 0;
    let _deskOpenSwipeRow = null;

    if (_deskSidebarEnvBadge) {
      _deskSidebarEnvBadge.textContent = isLocalHubHostname() ? "Local" : "Public";
    }

    function getPinned() {
      try {
        return JSON.parse(localStorage.getItem(PINNED_KEY) || "[]");
      } catch (_) {
        return [];
      }
    }

    function isPhoneViewport() {
      return !!_phoneViewportQuery.matches;
    }

    function clampDeskSidebarWidth(value) {
      return Math.max(DESK_MIN_SIDEBAR_WIDTH, Math.min(DESK_MAX_SIDEBAR_WIDTH, Math.round(Number(value) || DESK_DEFAULT_SIDEBAR_WIDTH)));
    }

    function readDeskSidebarWidth() {
      try {
        return clampDeskSidebarWidth(localStorage.getItem(DESK_SIDEBAR_WIDTH_KEY));
      } catch (_) {
        return DESK_DEFAULT_SIDEBAR_WIDTH;
      }
    }

    function setDeskSidebarWidth(nextWidth, { persist = true } = {}) {
      _deskSidebarWidth = clampDeskSidebarWidth(nextWidth);
      if (_deskWorkbench) {
        _deskWorkbench.style.setProperty("--desk-sidebar-width", `${_deskSidebarWidth}px`);
      }
      if (_deskLauncherBtn) {
        _deskLauncherBtn.classList.toggle("is-active", isDeskSidebarOpen());
      }
      if (persist) {
        try {
          localStorage.setItem(DESK_SIDEBAR_WIDTH_KEY, String(_deskSidebarWidth));
        } catch (_) {}
      }
    }

    function readDeskExpandedRows() {
      try {
        const raw = JSON.parse(sessionStorage.getItem(DESK_EXPANDED_KEY) || "[]");
        if (!Array.isArray(raw)) return new Set();
        return new Set(raw.map((item) => String(item || "")).filter(Boolean));
      } catch (_) {
        return new Set();
      }
    }

    function persistDeskExpandedRows() {
      try {
        sessionStorage.setItem(DESK_EXPANDED_KEY, JSON.stringify(Array.from(_deskExpandedRows)));
      } catch (_) {}
    }

    function deskSessionRowKey(sessionName, archived) {
      return `${archived ? "archived" : "active"}:${String(sessionName || "")}`;
    }

    function isDeskRowExpanded(rowKey) {
      return !!(rowKey && _deskExpandedRows.has(rowKey));
    }

    function setDeskRowExpanded(rowKey, expanded) {
      if (!rowKey) return;
      if (expanded) _deskExpandedRows.add(rowKey);
      else _deskExpandedRows.delete(rowKey);
      persistDeskExpandedRows();
    }

    function toggleDeskRowExpanded(rowKey) {
      const next = !isDeskRowExpanded(rowKey);
      setDeskRowExpanded(rowKey, next);
      return next;
    }

    function sortActiveSessions(active) {
      const pinned = getPinned();
      return [...active].sort((a, b) => {
        const pa = pinned.indexOf(a.name);
        const pb = pinned.indexOf(b.name);
        if (pa < 0 && pb < 0) return 0;
        if (pa < 0) return 1;
        if (pb < 0) return -1;
        return pa - pb;
      });
    }

    function setDeskSelectionInUrl(name) {
      try {
        const next = new URL(window.location.href);
        if (name) next.searchParams.set("session", name);
        else next.searchParams.delete("session");
        history.replaceState(null, "", `${next.pathname}${next.search}${next.hash}`);
      } catch (_) {}
    }

    function persistDeskSelection(name) {
      try {
        if (name) sessionStorage.setItem(DESK_SELECTED_KEY, name);
        else sessionStorage.removeItem(DESK_SELECTED_KEY);
      } catch (_) {}
    }

    function getRequestedDeskSelection() {
      try {
        const queryName = new URL(window.location.href).searchParams.get("session");
        if (queryName) return queryName;
      } catch (_) {}
      try {
        return sessionStorage.getItem(DESK_SELECTED_KEY) || "";
      } catch (_) {
        return "";
      }
    }

    function findSessionRecord(name) {
      const active = (_hubSessionsCache.active || []).find((session) => session.name === name);
      if (active) return { session: active, archived: false };
      const archived = (_hubSessionsCache.archived || []).find((session) => session.name === name);
      if (archived) return { session: archived, archived: true };
      return null;
    }

    function buildSessionOpenHref(sessionName, archived) {
      const base = archived ? "/revive-session" : "/open-session";
      return `${base}?session=${encodeURIComponent(sessionName)}`;
    }

    function cacheDeskChatUrl(cacheKey, chatUrl) {
      const key = String(cacheKey || "");
      const value = String(chatUrl || "");
      if (!key || !value) return;
      if (_deskChatUrlCache.has(key)) _deskChatUrlCache.delete(key);
      _deskChatUrlCache.set(key, value);
      while (_deskChatUrlCache.size > DESK_CHAT_URL_CACHE_LIMIT) {
        const oldest = _deskChatUrlCache.keys().next();
        if (oldest && !oldest.done) _deskChatUrlCache.delete(oldest.value);
        else break;
      }
    }

    function readCachedDeskChatUrl(cacheKey) {
      const key = String(cacheKey || "");
      if (!key || !_deskChatUrlCache.has(key)) return "";
      const value = _deskChatUrlCache.get(key) || "";
      if (value) cacheDeskChatUrl(key, value);
      return value;
    }

    function scheduleDeskActivePrewarm() {
      if (!isDeskSidebarOpen() || _deskSidebarMode !== "list") return;
      const active = sortActiveSessions(_hubSessionsCache.active || []).slice(0, DESK_ACTIVE_PREWARM_LIMIT);
      if (!active.length) return;
      const queue = active
        .map((session) => buildSessionOpenHref(session.name, false))
        .filter((href) => href && !readCachedDeskChatUrl(href) && !_deskChatUrlInflight.has(href));
      if (!queue.length) return;
      const token = ++_deskActivePrewarmToken;
      let running = 0;
      const pump = () => {
        if (token !== _deskActivePrewarmToken) return;
        while (running < DESK_ACTIVE_PREWARM_CONCURRENCY && queue.length) {
          const href = queue.shift();
          if (!href) continue;
          running += 1;
          resolveSessionChatUrl(href)
            .catch(() => {})
            .finally(() => {
              running -= 1;
              pump();
            });
        }
      };
      pump();
    }

    function deskSidebarPageUrl(mode) {
      if (mode === "new") return `/new-session?embed=1&ts=${Date.now()}`;
      if (mode === "settings") return `/settings?embed=1&ts=${Date.now()}`;
      return "about:blank";
    }

    function syncDeskChatShellState() {
      try {
        _deskChatFrame?.contentWindow?.postMessage({
          type: "multiagent-hub-sidebar-state",
          open: !!isDeskSidebarOpen(),
        }, "*");
      } catch (_) {}
    }

    function setDeskSidebarOpen(isOpen) {
      if (!_deskWorkbench) return;
      _deskWorkbench.classList.toggle("sidebar-open", !!isOpen);
      if (_deskLauncherBtn) {
        _deskLauncherBtn.classList.toggle("is-active", !!isOpen);
      }
      syncDeskChatShellState();
      if (isOpen) {
        scheduleDeskActivePrewarm();
      } else {
        _deskActivePrewarmToken += 1;
      }
    }

    function isDeskSidebarOpen() {
      return !!(_deskWorkbench && _deskWorkbench.classList.contains("sidebar-open"));
    }

    function setDeskSidebarMode(mode) {
      _deskSidebarMode = mode;
      const settingsActive = mode === "settings";
      if (_deskSidebarSessions) _deskSidebarSessions.hidden = settingsActive;
      if (_deskSidebarPane) _deskSidebarPane.hidden = !settingsActive;
      if (_deskSettingsBtn) _deskSettingsBtn.classList.toggle("is-active", settingsActive);
      if (!settingsActive && _deskSidebarFrame) {
        _deskSidebarFrame.src = "about:blank";
      }
    }

    function showDeskSidebarList({ open = true } = {}) {
      setDeskSidebarMode("list");
      if (open) setDeskSidebarOpen(true);
    }

    function syncDeskNewSessionSection() {
      if (_deskNewSessionToggle) {
        _deskNewSessionToggle.classList.toggle("expanded", _deskNewSessionExpanded);
        _deskNewSessionToggle.setAttribute("aria-expanded", _deskNewSessionExpanded ? "true" : "false");
      }
      if (_deskNewSessionPanel) {
        _deskNewSessionPanel.classList.toggle("open", _deskNewSessionExpanded);
      }
    }

    function ensureDeskNewSessionFrameLoaded() {
      if (!_deskNewSessionFrame) return;
      if (_deskNewSessionFrame.dataset.loaded === "1") return;
      _deskNewSessionFrame.src = deskSidebarPageUrl("new");
      _deskNewSessionFrame.dataset.loaded = "1";
    }

    function setDeskNewSessionExpanded(expanded) {
      _deskNewSessionExpanded = !!expanded;
      if (_deskNewSessionExpanded) {
        setDeskSidebarMode("list");
        ensureDeskNewSessionFrameLoaded();
      }
      syncDeskNewSessionSection();
    }

    function toggleDeskNewSessionExpanded() {
      setDeskNewSessionExpanded(!_deskNewSessionExpanded);
      setDeskSidebarOpen(true);
    }

    function openDeskSidebarPage(mode) {
      if (mode === "new") {
        setDeskNewSessionExpanded(true);
        setDeskSidebarOpen(true);
        return;
      }
      if (!_deskSidebarFrame || !_deskSidebarPaneTitle) return;
      if (_deskSidebarMode === "settings") {
        showDeskSidebarList({ open: true });
        return;
      }
      _deskSidebarPaneTitle.textContent = "Settings";
      setDeskNewSessionExpanded(false);
      setDeskSidebarMode("settings");
      _deskSidebarFrame.src = deskSidebarPageUrl("settings");
      setDeskSidebarOpen(true);
    }

    function clearDeskChatFrame() {
      if (_deskChatFrame) _deskChatFrame.src = "about:blank";
    }

    function clearDeskSelection() {
      _deskOpenToken += 1;
      _deskSelectedSessionName = "";
      persistDeskSelection("");
      setDeskSelectionInUrl("");
      clearDeskChatFrame();
      renderDesktopSessions(_hubSessionsCache.active || [], _hubSessionsCache.archived || []);
    }

    function openChatInDesk(url, name) {
      if (!_deskChatFrame) return;
      _deskSelectedSessionName = name || "";
      setDeskNewSessionExpanded(false);
      persistDeskSelection(_deskSelectedSessionName);
      setDeskSelectionInUrl(_deskSelectedSessionName);
      if (_deskSelectedSessionName) {
        cacheDeskChatUrl(buildSessionOpenHref(_deskSelectedSessionName, false), url);
      }
      _deskChatFrame.src = url + (url.includes("?") ? "&" : "?") + "hub_shell=1&ts=" + Date.now();
      renderDesktopSessions(_hubSessionsCache.active || [], _hubSessionsCache.archived || []);
    }

    async function resolveSessionChatUrl(openHref) {
      const cached = readCachedDeskChatUrl(openHref);
      if (cached) return cached;
      const inflight = _deskChatUrlInflight.get(openHref);
      if (inflight) return inflight;
      const url = openHref + (openHref.includes("?") ? "&" : "?") + "format=json";
      const request = fetch(url, { cache: "no-store" })
        .then(async (response) => {
          const data = await response.json();
          if (response.ok && data && data.chat_url) {
            cacheDeskChatUrl(openHref, data.chat_url);
            return data.chat_url;
          }
          throw new Error((data && data.error) || "chat url unavailable");
        })
        .finally(() => {
          _deskChatUrlInflight.delete(openHref);
        });
      _deskChatUrlInflight.set(openHref, request);
      return request;
    }

    async function openSessionFrame(openHref, name) {
      if (!name) {
        window.location.href = openHref;
        return;
      }
      _deskSelectedSessionName = name;
      persistDeskSelection(name);
      setDeskSelectionInUrl(name);
      renderDesktopSessions(_hubSessionsCache.active || [], _hubSessionsCache.archived || []);
      const openToken = ++_deskOpenToken;
      try {
        const chatUrl = await resolveSessionChatUrl(openHref);
        if (openToken !== _deskOpenToken) return;
        openChatInDesk(chatUrl, name);
      } catch (_) {
        if (openToken !== _deskOpenToken) return;
        window.location.href = openHref;
      }
    }

    function maybeRestoreDeskSelection() {
      if (_deskSelectedSessionName) {
        if (!findSessionRecord(_deskSelectedSessionName)) {
          clearDeskSelection();
        }
        return;
      }
      const requested = getRequestedDeskSelection();
      if (requested) {
        const match = findSessionRecord(requested);
        if (!match) {
          persistDeskSelection("");
          setDeskSelectionInUrl("");
        } else {
          openSessionFrame(buildSessionOpenHref(requested, match.archived), requested);
          return;
        }
      }
      const active = _hubSessionsCache.active || [];
      if (active.length) {
        openSessionFrame(buildSessionOpenHref(active[0].name, false), active[0].name);
        return;
      }
      showDeskSidebarList({ open: true });
      clearDeskChatFrame();
    }

    function normalizeAgentKey(agentName) {
      return String(agentName || "").trim().toLowerCase().replace(/[-_]\d+$/, "");
    }

    function agentDisplayName(agentName) {
      const raw = String(agentName || "").trim();
      const normalized = normalizeAgentKey(raw);
      return AGENT_DISPLAY_NAMES[normalized] || raw || "Agent";
    }

    function agentIconSource(agentName) {
      return AGENT_ICON_SOURCES[normalizeAgentKey(agentName)] || "";
    }

    function countLabel(value, singular, plural = `${singular}s`) {
      const count = Math.max(0, Number(value) || 0);
      return `${count} ${count === 1 ? singular : plural}`;
    }

    function renderAgentIconStrip(agents) {
      if (!Array.isArray(agents) || !agents.length) {
        return `<span class="session-agent-empty">No agents</span>`;
      }
      const visibleAgents = agents.slice(0, 5);
      const hiddenCount = Math.max(0, agents.length - visibleAgents.length);
      return `<span class="session-agent-list">` + visibleAgents.map((agent) => {
        const label = agentDisplayName(agent);
        const iconSrc = agentIconSource(agent);
        if (iconSrc) {
          return `<span class="session-agent-icon" title="${esc(String(agent || label))}" aria-label="${esc(label)}">` +
            `<img src="${esc(iconSrc)}" alt="" loading="lazy" decoding="async">` +
          `</span>`;
        }
        return `<span class="session-agent-icon" title="${esc(String(agent || label))}" aria-label="${esc(label)}">${esc(label.slice(0, 1).toUpperCase())}</span>`;
      }).join("") + (hiddenCount ? `<span class="session-agent-more">+${hiddenCount}</span>` : "") + `</span>`;
    }

    function renderSessionDetailLine(label, valueHtml) {
      return `<div class="session-detail-line">` +
        `<div class="session-detail-label">${esc(label)}</div>` +
        `<div class="session-detail-value">${valueHtml}</div>` +
      `</div>`;
    }

    function renderSessionDetails(session) {
      const workspace = String(session.workspace || "").trim() || "workspace unavailable";
      const createdAt = String(session.created_at || session.updated_at || "").trim() || "unknown";
      return [
        renderSessionDetailLine("Workspace", `<span class="session-detail-path" title="${esc(workspace)}">${esc(workspace)}</span>`),
        renderSessionDetailLine("Agents", renderAgentIconStrip(session.agents || [])),
        renderSessionDetailLine("Created", esc(createdAt)),
      ].join("");
    }

    function renderDeskSessionRow(session, archived) {
      const sessionName = String(session.name || "");
      const archivedClass = archived ? " archived" : "";
      const rowKey = deskSessionRowKey(sessionName, archived);
      const expandedClass = isDeskRowExpanded(rowKey) ? " expanded" : "";
      const swipeActionLabel = archived ? "Delete" : "Kill";
      const swipeActionRoute = archived ? "delete-archived" : "kill";
      const runningClass = !archived && session.is_running ? " is-running" : "";
      const previewText = String(session.latest_message_preview || "").trim();
      const previewSender = String(session.latest_message_sender || "").trim();
      const previewHtml = previewText
        ? `<div class="desk-row-preview"><span class="sender">${esc(previewSender || "latest")}</span>${esc(previewText)}</div>`
        : "";
      return `<div class="desk-swipe-row" data-session-name="${esc(sessionName)}" data-desk-swipe-kind="${esc(swipeActionRoute)}">` +
        `<div class="desk-swipe-action-rail">` +
          `<button type="button" class="desk-swipe-action-btn" data-desk-swipe-action="${esc(swipeActionRoute)}" aria-label="${esc(swipeActionLabel + " " + sessionName)}">` +
            `<svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="3 6 5 6 21 6"></polyline><path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"></path><path d="M19 6l-1 14a1 1 0 0 1-1 1H7a1 1 0 0 1-1-1L5 6"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>` +
            `<span>${esc(swipeActionLabel)}</span>` +
          `</button>` +
        `</div>` +
        `<div class="desk-swipe-track">` +
          `<div class="desk-session-row${archivedClass}${expandedClass}" data-row-key="${esc(rowKey)}" data-session-name="${esc(sessionName)}" data-open-href="${buildSessionOpenHref(sessionName, archived)}" tabindex="0" role="button">` +
            `<div class="desk-row-head">` +
              `<div class="desk-row-main">` +
                `<span class="desk-row-bullet${runningClass}" aria-hidden="true"><i></i><i></i><i></i></span>` +
                `<div class="desk-row-stack">` +
                  `<div class="desk-row-name">${esc(sessionName)}</div>` +
                  previewHtml +
                `</div>` +
              `</div>` +
              `<button type="button" class="desk-row-expand-btn" data-desk-action="toggle-detail" aria-label="Toggle details" title="Details">` +
                `<svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="9 18 15 12 9 6"></polyline></svg>` +
              `</button>` +
            `</div>` +
            `<div class="desk-row-detail">` +
              renderSessionDetails(session) +
            `</div>` +
          `</div>` +
        `</div>` +
      `</div>`;
    }

    function closeDeskSwipeRow(wrapper, animate = true) {
      if (!wrapper) return;
      const track = wrapper.querySelector(".desk-swipe-track");
      if (!track) return;
      track.style.transition = animate ? "transform 220ms cubic-bezier(.25,.46,.45,.94)" : "none";
      track.style.transform = "";
      wrapper.dataset.swipeOpen = "0";
      if (_deskOpenSwipeRow === wrapper) _deskOpenSwipeRow = null;
    }

    function initDeskSwipeRow(wrapper) {
      if (!wrapper || wrapper.dataset.swipeBound === "1") return;
      const track = wrapper.querySelector(".desk-swipe-track");
      const row = wrapper.querySelector(".desk-session-row");
      const actionBtn = wrapper.querySelector("[data-desk-swipe-action]");
      if (!track || !row || !actionBtn) return;
      wrapper.dataset.swipeBound = "1";
      wrapper.dataset.swipeOpen = "0";
      let startX = 0;
      let startY = 0;
      let deltaX = 0;
      let axis = "";
      let active = false;
      let didSwipe = false;
      let baseX = 0;
      const setTrackX = (x, animate = false) => {
        track.style.transition = animate ? "transform 220ms cubic-bezier(.25,.46,.45,.94)" : "none";
        track.style.transform = x ? `translateX(${x}px)` : "";
        wrapper.dataset.swipeOpen = x ? "1" : "0";
        if (!x && _deskOpenSwipeRow === wrapper) _deskOpenSwipeRow = null;
        if (x) _deskOpenSwipeRow = wrapper;
      };
      const startDrag = (clientX, clientY) => {
        if (_deskOpenSwipeRow && _deskOpenSwipeRow !== wrapper) {
          closeDeskSwipeRow(_deskOpenSwipeRow, true);
        }
        startX = clientX;
        startY = clientY;
        deltaX = 0;
        axis = "";
        active = true;
        didSwipe = false;
        baseX = wrapper.dataset.swipeOpen === "1" ? -DESK_SWIPE_ACTION_WIDTH : 0;
        track.style.transition = "none";
      };
      const moveDrag = (clientX, clientY, preventDefault) => {
        if (!active) return;
        const moveX = clientX - startX;
        const moveY = clientY - startY;
        if (!axis) {
          if (Math.abs(moveY) > Math.abs(moveX) + 4) {
            axis = "y";
            return;
          }
          if (Math.abs(moveX) > 6) axis = "x";
        }
        if (axis !== "x") return;
        if (preventDefault) preventDefault();
        didSwipe = true;
        deltaX = moveX;
        let nextX = Math.max(-DESK_SWIPE_ACTION_WIDTH, Math.min(0, baseX + moveX));
        track.style.transform = nextX ? `translateX(${nextX}px)` : "";
      };
      const endDrag = () => {
        if (!active) return;
        active = false;
        if (axis !== "x") return;
        const finalX = Math.max(-DESK_SWIPE_ACTION_WIDTH, Math.min(0, baseX + deltaX));
        if (finalX < -DESK_SWIPE_OPEN_THRESHOLD) {
          setTrackX(-DESK_SWIPE_ACTION_WIDTH, true);
        } else {
          setTrackX(0, true);
        }
        if (didSwipe) {
          wrapper._swipeConsumedUntil = Date.now() + 260;
        }
        deltaX = 0;
      };
      track.addEventListener("touchstart", (event) => {
        if (event.target.closest("[data-desk-action]")) return;
        const touch = event.touches[0];
        if (!touch) return;
        startDrag(touch.clientX, touch.clientY);
      }, { passive: true });
      track.addEventListener("touchmove", (event) => {
        const touch = event.touches[0];
        if (!touch) return;
        moveDrag(touch.clientX, touch.clientY, () => event.preventDefault());
      }, { passive: false });
      track.addEventListener("touchend", endDrag, { passive: true });
      track.addEventListener("touchcancel", endDrag, { passive: true });
      track.addEventListener("mousedown", (event) => {
        if (event.target.closest("[data-desk-action], a, button")) return;
        event.preventDefault();
        startDrag(event.clientX, event.clientY);
        const onMove = (moveEvent) => moveDrag(moveEvent.clientX, moveEvent.clientY, () => moveEvent.preventDefault());
        const onUp = () => {
          endDrag();
          document.removeEventListener("mousemove", onMove);
          document.removeEventListener("mouseup", onUp);
        };
        document.addEventListener("mousemove", onMove);
        document.addEventListener("mouseup", onUp);
      });
      actionBtn.addEventListener("click", (event) => {
        event.preventDefault();
        event.stopPropagation();
        const sessionName = wrapper.dataset.sessionName || "";
        const kind = actionBtn.dataset.deskSwipeAction || "";
        if (!sessionName || !kind) return;
        if (kind === "delete-archived") {
          if (confirm("Delete archived logs for " + sessionName + "? This cannot be undone.")) {
            window.location.href = `/delete-archived-session?session=${encodeURIComponent(sessionName)}`;
          }
          return;
        }
        if (confirm("Kill " + sessionName + "?")) {
          window.location.href = `/kill-session?session=${encodeURIComponent(sessionName)}`;
        }
      });
    }

    function renderDesktopSessions(active, archived) {
      if (!_deskSessionList) return;
      const sortedActive = sortActiveSessions(active);
      const rowKeys = new Set();
      sortedActive.forEach((session) => rowKeys.add(deskSessionRowKey(session.name, false)));
      archived.forEach((session) => rowKeys.add(deskSessionRowKey(session.name, true)));
      let expandedChanged = false;
      _deskExpandedRows.forEach((rowKey) => {
        if (!rowKeys.has(rowKey)) {
          _deskExpandedRows.delete(rowKey);
          expandedChanged = true;
        }
      });
      if (expandedChanged) persistDeskExpandedRows();

      let html = "";
      if (sortedActive.length) {
        html += `<div class="desk-section-label">Active</div>`;
        html += sortedActive.map((session) => renderDeskSessionRow(session, false)).join("");
      }
      if (archived.length) {
        html += `<div class="desk-section-label">Archived</div>`;
        html += archived.map((session) => renderDeskSessionRow(session, true)).join("");
      }
      if (!sortedActive.length && !archived.length) {
        html = `<div class="desk-empty-list">No sessions found</div>`;
      }
      _deskSessionList.innerHTML = html;
      _deskSessionList.querySelectorAll(".desk-swipe-row").forEach(initDeskSwipeRow);
    }

    async function refreshHubSessions(force = false) {
      try {
        const response = await fetch(`/sessions?ts=${Date.now()}`, { cache: "no-store" });
        if (!response.ok) throw new Error("failed");
        const data = await response.json();
        const active = data.active_sessions || data.sessions || [];
        const archived = data.archived_sessions || [];
        _hubSessionsCache = { active, archived };

        const signature = JSON.stringify({
          active,
          archived,
          pinned: getPinned(),
          selected: _deskSelectedSessionName,
          expanded: Array.from(_deskExpandedRows),
        });
        if (force || window._lastHubRenderSig !== signature) {
          window._lastHubRenderSig = signature;
          renderDesktopSessions(active, archived);
        }
        if (isDeskSidebarOpen()) scheduleDeskActivePrewarm();
        maybeRestoreDeskSelection();
      } catch (_) {
        if (_deskSessionList) {
          _deskSessionList.innerHTML = `<div class="desk-empty-list">Failed to load sessions</div>`;
        }
      }
    }

    window.addEventListener("message", (event) => {
      if (event.data === "hub_close_chat") {
        showDeskSidebarList({ open: true });
        return;
      }
      if (event.data && event.data.type === "multiagent-toggle-hub-sidebar") {
        setDeskSidebarOpen(!isDeskSidebarOpen());
        if (isDeskSidebarOpen()) setDeskSidebarMode("list");
        return;
      }
      if (event.data && event.data.type === "multiagent-hub-open-chat-session") {
        const chatUrl = typeof event.data.chatUrl === "string" ? event.data.chatUrl : "";
        const sessionName = typeof event.data.sessionName === "string" ? event.data.sessionName : "";
        if (chatUrl && sessionName) {
          openChatInDesk(chatUrl, sessionName);
          refreshHubSessions(true);
        }
        return;
      }
      if (event.data && event.data.type === "multiagent-hub-inline-frame-height") {
        if (event.data.kind === "new-session" && _deskNewSessionFrame) {
          const height = Math.max(250, Math.min(760, Number(event.data.height) || 0));
          if (height) _deskNewSessionFrame.style.height = `${height}px`;
        }
        return;
      }
      if (event.data && event.data.type === "multiagent-open-hub-path") {
        const nextUrl = typeof event.data.url === "string" ? event.data.url : "";
        if (!nextUrl) return;
        try {
          const parsed = new URL(nextUrl, window.location.href);
          if (parsed.pathname === "/new-session") {
            setDeskSidebarOpen(true);
            openDeskSidebarPage("new");
            return;
          }
          if (parsed.pathname === "/settings") {
            setDeskSidebarOpen(true);
            openDeskSidebarPage("settings");
            return;
          }
        } catch (_) {}
        window.location.href = nextUrl;
      }
    });

    _deskChatFrame && _deskChatFrame.addEventListener("load", () => {
      syncDeskChatShellState();
    });

    _deskMain && _deskMain.addEventListener("click", () => {
      if (isPhoneViewport() && isDeskSidebarOpen()) {
        setDeskSidebarOpen(false);
      }
    });
    _deskLauncherBtn && _deskLauncherBtn.addEventListener("click", (event) => {
      event.preventDefault();
      if (isDeskSidebarOpen()) {
        setDeskSidebarOpen(false);
        return;
      }
      showDeskSidebarList({ open: true });
    });
    _deskSidebar && _deskSidebar.addEventListener("touchstart", (event) => {
      if (!isPhoneViewport() || !isDeskSidebarOpen()) return;
      const touch = event.touches[0];
      if (!touch) return;
      const rect = _deskSidebar.getBoundingClientRect();
      const fromRightEdge = rect.right - touch.clientX;
      if (fromRightEdge > DESK_SIDEBAR_CLOSE_SWIPE_EDGE_PX) return;
      _deskSidebar._closeSwipeStartX = touch.clientX;
      _deskSidebar._closeSwipeStartY = touch.clientY;
      _deskSidebar._closeSwipeTracking = true;
      _deskSidebar._closeSwipeAxis = "";
    }, { passive: true });
    _deskSidebar && _deskSidebar.addEventListener("touchmove", (event) => {
      if (!_deskSidebar._closeSwipeTracking) return;
      const touch = event.touches[0];
      if (!touch) return;
      const moveX = touch.clientX - (_deskSidebar._closeSwipeStartX || 0);
      const moveY = touch.clientY - (_deskSidebar._closeSwipeStartY || 0);
      if (!_deskSidebar._closeSwipeAxis) {
        if (Math.abs(moveY) > Math.abs(moveX) + 6) {
          _deskSidebar._closeSwipeAxis = "y";
          return;
        }
        if (Math.abs(moveX) > 8) _deskSidebar._closeSwipeAxis = "x";
      }
      if (_deskSidebar._closeSwipeAxis !== "x") return;
      _deskSidebar._closeSwipeDeltaX = moveX;
    }, { passive: true });
    const finishDeskSidebarSwipeClose = () => {
      if (!_deskSidebar || !_deskSidebar._closeSwipeTracking) return;
      const moveX = Number(_deskSidebar._closeSwipeDeltaX || 0);
      const shouldClose = _deskSidebar._closeSwipeAxis === "x" && moveX < -DESK_SIDEBAR_CLOSE_SWIPE_THRESHOLD;
      _deskSidebar._closeSwipeTracking = false;
      _deskSidebar._closeSwipeAxis = "";
      _deskSidebar._closeSwipeDeltaX = 0;
      if (shouldClose) setDeskSidebarOpen(false);
    };
    _deskSidebar && _deskSidebar.addEventListener("touchend", finishDeskSidebarSwipeClose, { passive: true });
    _deskSidebar && _deskSidebar.addEventListener("touchcancel", finishDeskSidebarSwipeClose, { passive: true });
    _deskSidebarResizer && _deskSidebarResizer.addEventListener("pointerdown", (event) => {
      if (isPhoneViewport()) return;
      event.preventDefault();
      const startWidth = _deskSidebarWidth;
      const startX = event.clientX;
      _deskSidebarResizer.setPointerCapture?.(event.pointerId);
      document.body.classList.add("desk-workbench-resizing");
      const onMove = (moveEvent) => {
        const nextWidth = startWidth + (moveEvent.clientX - startX);
        setDeskSidebarWidth(nextWidth);
      };
      const onUp = () => {
        document.body.classList.remove("desk-workbench-resizing");
        window.removeEventListener("pointermove", onMove);
        window.removeEventListener("pointerup", onUp);
        window.removeEventListener("pointercancel", onUp);
      };
      window.addEventListener("pointermove", onMove);
      window.addEventListener("pointerup", onUp);
      window.addEventListener("pointercancel", onUp);
    });

    setDeskSidebarWidth(readDeskSidebarWidth(), { persist: false });
    _deskExpandedRows = readDeskExpandedRows();
    syncDeskNewSessionSection();
    try {
      sessionStorage.removeItem("hub_chat_frame");
    } catch (_) {}

    _deskNewSessionToggle && _deskNewSessionToggle.addEventListener("click", (event) => {
      event.preventDefault();
      toggleDeskNewSessionExpanded();
    });
    _deskNewSessionToggle && _deskNewSessionToggle.addEventListener("keydown", (event) => {
      if (event.key !== "Enter" && event.key !== " ") return;
      event.preventDefault();
      toggleDeskNewSessionExpanded();
    });
    _deskSettingsBtn && _deskSettingsBtn.addEventListener("click", () => openDeskSidebarPage("settings"));
    _deskReloadBtn && _deskReloadBtn.addEventListener("click", async () => {
      if (_deskReloadBtn.classList.contains("restarting")) return;
      _deskReloadBtn.classList.add("restarting");
      _deskReloadBtn.disabled = true;
      try {
        await fetch("/restart-hub", { method: "POST" });
      } catch (_) {}
      const startedAt = Date.now();
      const poll = async () => {
        try {
          const response = await fetch(`/sessions?ts=${Date.now()}`, { cache: "no-store" });
          if (response.ok) {
            window.location.replace("/");
            return;
          }
        } catch (_) {}
        if (Date.now() - startedAt < 20000) {
          setTimeout(poll, 500);
        } else {
          window.location.reload();
        }
      };
      setTimeout(poll, 700);
    });

    if (_deskSessionList) {
      _deskSessionList.addEventListener("click", (event) => {
        const swipeAction = event.target.closest("[data-desk-swipe-action]");
        if (swipeAction) return;
        const action = event.target.closest("[data-desk-action]");
        if (action) {
          event.preventDefault();
          event.stopPropagation();
          const row = action.closest(".desk-session-row");
          if (!row) return;
          const rowKey = row.dataset.rowKey || "";
          const expanded = toggleDeskRowExpanded(rowKey);
          row.classList.toggle("expanded", expanded);
          return;
        }
        const row = event.target.closest(".desk-session-row");
        if (!row) return;
        const swipeRow = row.closest(".desk-swipe-row");
        if (swipeRow && swipeRow._swipeConsumedUntil && swipeRow._swipeConsumedUntil > Date.now()) {
          return;
        }
        if (swipeRow && swipeRow.dataset.swipeOpen === "1") {
          event.preventDefault();
          event.stopPropagation();
          closeDeskSwipeRow(swipeRow, true);
          return;
        }
        const href = row.dataset.openHref;
        const name = row.dataset.sessionName || "";
        if (href) openSessionFrame(href, name);
      });
      _deskSessionList.addEventListener("keydown", (event) => {
        const row = event.target.closest(".desk-session-row");
        if (!row) return;
        if (event.target.closest("[data-desk-action]")) return;
        if (event.key !== "Enter" && event.key !== " ") return;
        event.preventDefault();
        const href = row.dataset.openHref;
        const name = row.dataset.sessionName || "";
        if (href) openSessionFrame(href, name);
      });
    }

    window.refreshHubSessionLists = refreshHubSessions;
    refreshHubSessions(true);
    setInterval(() => {
      refreshHubSessions(false);
    }, 5000);
  __HUB_HEADER_JS__
  </script>
