<!doctype html>
<html lang="en" data-theme="__HUB_THEME__"__STARFIELD_ATTR__>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="rgb(10, 10, 10)">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Session Hub">
  <link rel="manifest" href="__HUB_MANIFEST_URL__">
  <link rel="icon" type="image/png" sizes="192x192" href="__PWA_ICON_192_URL__">
  <link rel="apple-touch-icon" href="__APPLE_TOUCH_ICON_URL__">
  <title>Skills</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: rgb(10, 10, 10);
      --bg-rgb: 10, 10, 10;
      --panel: rgb(20, 20, 20);
      --panel-2: rgb(15, 15, 15);
      --line: rgba(255,255,255,0.06);
      --line-strong: rgba(255,255,255,0.10);
      --fg: rgb(252, 252, 252);
      --muted: rgb(158, 158, 158);
      --accent: rgb(44, 132, 219);
    }
    html[data-theme="soft-light"] {
      color-scheme: light;
      --bg: rgb(244, 244, 242);
      --bg-rgb: 244, 244, 242;
      --panel: rgb(255, 255, 255);
      --panel-2: rgb(248, 248, 246);
      --line: rgba(15, 20, 30, 0.12);
      --line-strong: rgba(15, 20, 30, 0.2);
      --fg: rgb(26, 30, 36);
      --muted: rgb(98, 106, 120);
      --accent: rgb(44, 132, 219);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100dvh;
    }
    __HUB_HEADER_CSS__
    .skills-container {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 16px 80px;
    }
    .skills-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 20px;
    }
    .skill-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 16px 18px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .skill-card:hover { border-color: var(--line-strong); }
    .skill-card-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .skill-name {
      font-size: 15px;
      font-weight: 600;
      color: var(--fg);
    }
    .skill-description {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.5;
    }
    .skill-agents {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 10px;
    }
    .skill-agent-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 12px;
      background: rgba(44, 132, 219, 0.12);
      color: var(--accent);
      border: 1px solid rgba(44, 132, 219, 0.2);
    }
    .skill-agent-badge.missing {
      background: rgba(255, 80, 80, 0.08);
      color: rgb(220, 100, 100);
      border-color: rgba(220, 100, 100, 0.2);
    }
    .skill-detail {
      display: none;
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }
    .skill-card.expanded .skill-detail { display: block; }
    .skill-detail pre {
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--muted);
      background: var(--panel-2);
      border-radius: 6px;
      padding: 12px;
      overflow-x: auto;
    }
    .skills-empty {
      text-align: center;
      color: var(--muted);
      padding: 60px 0;
      font-size: 14px;
    }
    .skill-source {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }
  </style>
</head>
<body>
__HUB_HEADER_HTML__
<div class="skills-container">
  <div class="skills-title">Skills</div>
  <div id="skillsList">Loading...</div>
</div>
<script>
__HUB_HEADER_JS__
(async () => {
  const list = document.getElementById("skillsList");
  try {
    const res = await fetch("/skills/api");
    if (!res.ok) throw new Error(res.statusText);
    const data = await res.json();
    if (!data.skills || !data.skills.length) {
      list.innerHTML = '<div class="skills-empty">No skills found</div>';
      return;
    }
    const allAgents = ["claude", "cursor", "codex", "gemini", "qwen", "opencode", "copilot"];
    list.innerHTML = data.skills.map(skill => {
      const badges = allAgents.map(a => {
        const installed = (skill.installed_agents || []).includes(a);
        return `<span class="skill-agent-badge${installed ? "" : " missing"}">${a}${installed ? " ✓" : " ✗"}</span>`;
      }).join("");
      const escapedContent = (skill.content || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
      return `<div class="skill-card" onclick="this.classList.toggle('expanded')">
        <div class="skill-card-header">
          <span class="skill-name">${skill.name || "unnamed"}</span>
        </div>
        <div class="skill-description">${(skill.description || "").replace(/&/g,"&amp;").replace(/</g,"&lt;")}</div>
        <div class="skill-agents">${badges}</div>
        <div class="skill-source">Source: ${(skill.source || "").replace(/&/g,"&amp;").replace(/</g,"&lt;")}</div>
        <div class="skill-detail"><pre>${escapedContent}</pre></div>
      </div>`;
    }).join("");
  } catch (e) {
    list.innerHTML = `<div class="skills-empty">Error loading skills: ${e.message}</div>`;
  }
})();
</script>
</body>
</html>
