<!doctype html>
<html lang="en" data-theme="black-hole">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="rgb(10, 10, 10)">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="New Session">
  <link rel="manifest" href="__HUB_MANIFEST_URL__">
  <link rel="icon" type="image/png" sizes="192x192" href="__PWA_ICON_192_URL__">
  <link rel="apple-touch-icon" href="__APPLE_TOUCH_ICON_URL__">
  <title>New Session · Hub</title>
  <script>
    if (new URLSearchParams(window.location.search).get("embed") === "1") {
      document.documentElement.dataset.hubEmbed = "1";
    }
  </script>
  <style>
    :root {
      color-scheme: dark;
      --bg: rgb(10, 10, 10);
      --fg: rgb(252, 252, 252);
      --muted: rgba(255, 255, 255, 0.62);
      --line: rgba(255,255,255,0.08);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--fg);
      font-family: "SF Pro Text", "Segoe UI", sans-serif;
    }
    body {
      padding: 0 0 max(18px, env(safe-area-inset-bottom)) 0;
    }
    __HUB_HEADER_CSS__
    html[data-hub-embed="1"] body {
      padding-bottom: 0;
    }
    html[data-hub-embed="1"] .hub-page-header {
      display: none !important;
    }
    .shell {
      max-width: 760px;
      margin: 0 auto;
      min-height: 100dvh;
    }
    .panel {
      padding: 18px 14px 0;
      min-height: calc(100dvh - 48px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 14px;
    }
    .title {
      font-size: 18px;
      line-height: 1.2;
      font-weight: 600;
      letter-spacing: -0.02em;
    }
    .copy {
      font-size: 13px;
      line-height: 1.55;
      color: var(--muted);
      max-width: 30rem;
    }
    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    .pick-btn {
      min-width: 0;
      padding: 11px 13px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.10);
      color: var(--fg);
      border-radius: 12px;
      font: inherit;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.01em;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
      transition: background 140ms ease, border-color 140ms ease, opacity 140ms ease;
    }
    .pick-btn:hover {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.16);
    }
    .pick-btn[disabled] {
      opacity: 0.52;
      cursor: default;
    }
    .pick-btn svg {
      width: 15px;
      height: 15px;
      flex: 0 0 auto;
    }
    .status {
      min-height: 1.4em;
      font-size: 12px;
      line-height: 1.4;
      color: var(--muted);
      white-space: pre-wrap;
    }
    .status.error {
      color: rgb(232, 146, 146);
    }
  </style>
</head>
<body>
  <div class="shell">
    __HUB_HEADER_HTML__
    <section class="panel">
      <div class="title">New Session</div>
      <div class="copy">Choose a workspace and jump straight into chat. The first message decides which agents actually launch.</div>
      <div class="actions">
        <button type="button" class="pick-btn" id="pickBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          <span id="pickBtnLabel">Choose in Finder</span>
        </button>
      </div>
      <div class="status" id="statusText"></div>
    </section>
  </div>
  <script>
    const HUB_EMBED = document.documentElement.dataset.hubEmbed === "1";
    const pickBtn = document.getElementById("pickBtn");
    const pickBtnLabel = document.getElementById("pickBtnLabel");
    const statusText = document.getElementById("statusText");
    const NATIVE_PICKER_SUPPORTED =
      /mac/i.test(String(navigator.platform || "")) &&
      !/iphone|ipad|ipod|android/i.test(String(navigator.userAgent || ""));
    let startInFlight = false;
    let autostartAttempted = false;

    const queueEmbedHeight = (() => {
      let raf = 0;
      return () => {
        if (!HUB_EMBED || window.self === window.top) return;
        if (raf) cancelAnimationFrame(raf);
        raf = requestAnimationFrame(() => {
          raf = 0;
          const height = Math.max(220, Math.min(420, Math.ceil(document.documentElement.scrollHeight || document.body.scrollHeight || 0)));
          window.parent.postMessage({
            type: "multiagent-hub-inline-frame-height",
            kind: "new-session",
            height,
          }, "*");
        });
      };
    })();

    const setStatus = (message = "", isError = false) => {
      statusText.textContent = String(message || "");
      statusText.classList.toggle("error", !!(message && isError));
      queueEmbedHeight();
    };

    const pickWorkspace = async () => {
      if (!NATIVE_PICKER_SUPPORTED) {
        const manual = window.prompt("Workspace path", "");
        return manual === null ? "" : String(manual || "").trim();
      }
      const res = await fetch("/pick-workspace", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({}),
      });
      const data = await res.json().catch(() => ({}));
      if (data.ok && data.path) return String(data.path || "");
      if (data.canceled) return "";
      throw new Error(data.error || "Workspace picker failed.");
    };

    const beginDraftSession = async () => {
      if (startInFlight) return;
      startInFlight = true;
      pickBtn.disabled = true;
      pickBtnLabel.textContent = NATIVE_PICKER_SUPPORTED ? "Choosing…" : "Starting…";
      setStatus("Choose a workspace…");
      try {
        const workspace = await pickWorkspace();
        if (!workspace) {
          setStatus("");
          return;
        }
        pickBtnLabel.textContent = "Starting…";
        setStatus("Opening chat…");
        const res = await fetch("/start-session-draft", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ workspace }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok || !data.chat_url) {
          throw new Error(data.error || "Failed to start draft session.");
        }
        if (HUB_EMBED && window.self !== window.top) {
          window.parent.postMessage({
            type: "multiagent-hub-open-chat-session",
            chatUrl: data.chat_url,
            sessionName: data.session || "",
            sessionRecord: data.session_record || {},
          }, "*");
          return;
        }
        window.location.href = data.chat_url;
      } catch (err) {
        setStatus(err?.message || "Failed to start draft session.", true);
      } finally {
        startInFlight = false;
        pickBtn.disabled = false;
        pickBtnLabel.textContent = NATIVE_PICKER_SUPPORTED ? "Choose in Finder" : "Choose Workspace";
      }
    };

    pickBtn.addEventListener("click", () => {
      beginDraftSession();
    });

    window.addEventListener("load", () => {
      queueEmbedHeight();
      if (!autostartAttempted && new URLSearchParams(window.location.search).get("autostart") !== "0") {
        autostartAttempted = true;
        beginDraftSession();
      }
    }, { once: true });

    if (typeof ResizeObserver === "function") {
      try {
        new ResizeObserver(() => queueEmbedHeight()).observe(document.body);
      } catch (_) {}
    }

  __HUB_HEADER_JS__
  </script>
</body>
</html>
