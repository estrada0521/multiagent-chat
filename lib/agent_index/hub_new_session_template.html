<!doctype html>
<html lang="en" data-theme="black-hole" data-view-variant="__VIEW_VARIANT__">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="rgb(10, 10, 10)">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="New Session">
  <link rel="manifest" href="__HUB_MANIFEST_URL__">
  <link rel="icon" type="image/png" sizes="192x192" href="__PWA_ICON_192_URL__">
  <link rel="apple-touch-icon" href="__APPLE_TOUCH_ICON_URL__">
  <title>New Session · Hub</title>
  <script>
    (() => {
      const params = new URLSearchParams(window.location.search || "");
      let embed = (params.get("embed") || "") === "1";
      if (!embed) {
        const rawTarget = (params.get("target") || "").trim();
        if (rawTarget) {
          try {
            const next = new URL(rawTarget, window.location.origin);
            embed = (next.searchParams.get("embed") || "") === "1";
          } catch (_) {}
        }
      }
      if (embed) document.documentElement.dataset.hubEmbed = "1";
    })();
  </script>
  <style>
    :root {
      color-scheme: dark;
      --bg: rgb(10, 10, 10);
      --fg: rgb(252, 252, 252);
      --muted: rgba(255, 255, 255, 0.62);
      --line: rgba(255,255,255,0.08);
      --accent: rgb(44, 132, 219);
      --settings-text-size: __MESSAGE_TEXT_SIZE__px;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; min-height: 100%;
      background: var(--bg); color: var(--fg);
      font-family: "SF Pro Text", "Segoe UI", sans-serif;
      overscroll-behavior: contain;
    }
    body { padding: 0 0 max(18px, env(safe-area-inset-bottom)) 0; }
    __HUB_HEADER_CSS__
    .hub-page-header {
      --page-side-pad: 12px; --chrome-icon-btn-size: 44px;
      --chrome-icon-size: 21px; --chrome-icon-stroke: 1.85; --chrome-icon-gap: 9px;
    }
    .hub-page-header .hub-page-header-top {
      padding: max(8px, env(safe-area-inset-top)) calc(20px + env(safe-area-inset-right, 0px)) 8px var(--page-side-pad);
      min-height: 60px;
    }
    .hub-page-header .hub-page-title { min-width: 48px; min-height: 48px; }
    .hub-page-header .hub-page-logo { height: 24px; transform: translateY(-2px); }
    .hub-page-header .hub-page-header-actions { gap: 0; margin-left: auto; }
    .hub-page-header .hub-page-header-actions .hub-page-menu-btn {
      background: transparent; border: none; box-shadow: none;
      backdrop-filter: none; -webkit-backdrop-filter: none;
      -webkit-tap-highlight-color: transparent; transition: none;
      color: #fff; justify-content: flex-end; padding-right: 0;
    }
    .hub-page-header .hub-page-header-actions .hub-page-menu-btn svg { transform: translateY(-2px); }
    .hub-page-header .hub-page-header-actions .hub-page-menu-btn:active,
    .hub-page-header .hub-page-header-actions .hub-page-menu-btn.open { background: transparent; transform: none; }
    html[data-hub-embed="1"] body { padding-bottom: 0; }
    html[data-hub-embed="1"] .hub-page-header { display: none; }
    html[data-hub-embed="1"], html[data-hub-embed="1"] body { background: transparent; }
    .shell { position: relative; width: 100%; max-width: 760px; margin: 0 auto; min-height: 100dvh; }

    /* ── Desktop / native picker panel ── */
    #pickerPanel {
      padding: 18px 14px 0;
      min-height: calc(100dvh - 48px);
      display: flex; flex-direction: column;
      justify-content: center; gap: 14px;
    }
    .title { font-size: 18px; line-height: 1.2; font-weight: 600; letter-spacing: -0.02em; }
    .copy { font-size: 13px; line-height: 1.55; color: var(--muted); max-width: 30rem; }
    .actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .pick-btn {
      min-width: 0; padding: 11px 13px;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.10);
      color: var(--fg); border-radius: 12px; font: inherit; font-size: 13px;
      font-weight: 600; letter-spacing: 0.01em; cursor: pointer;
      appearance: none; -webkit-appearance: none;
      transition: background 140ms ease, border-color 140ms ease, opacity 140ms ease;
    }
    .pick-btn:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.16); }
    .pick-btn[disabled] { opacity: 0.52; cursor: default; }
    .pick-btn svg { width: 15px; height: 15px; flex: 0 0 auto; }
    .status { min-height: 1.4em; font-size: 12px; line-height: 1.4; color: var(--muted); white-space: pre-wrap; }
    .status.error { color: rgb(232, 146, 146); }

    html[data-view-variant="desktop"]:not([data-hub-embed="1"]) .hub-page-header { display: none; }
    html[data-view-variant="desktop"]:not([data-hub-embed="1"]) #pickerPanel { min-height: 100dvh; }

    /* Hide old panel on mobile/embed; show dir browser instead */
    html[data-hub-embed="1"] #pickerPanel,
    html[data-view-variant="mobile"] #pickerPanel { display: none; }
    html[data-hub-embed="1"] #dirBrowser,
    html[data-view-variant="mobile"] #dirBrowser { display: flex; }

    /* ── Directory browser ── */
    #dirBrowser {
      display: none; /* overridden above for mobile/embed */
      flex-direction: column;
      position: absolute; inset: 0;
      overflow: hidden;
    }
    /* Path bar */
    .dir-path-bar {
      display: flex; align-items: center;
      padding: 8px 12px;
      flex-shrink: 0;
    }
    .dir-path-bar[hidden] { display: none; }
    .dir-back-btn {
      background: transparent; border: none; color: var(--muted);
      font: inherit; font-size: 17px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      width: 22px; height: 22px; flex-shrink: 0; border-radius: 8px;
      margin: 0;
      padding: 0;
    }
    .dir-back-btn:active { opacity: 0.55; }
    .dir-back-btn[hidden] { display: none; }
    .dir-back-btn svg { display: block; width: 17px; height: 17px; }
    .dir-path-text {
      flex: 1; min-width: 0;
      color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      direction: rtl; text-align: left;
    }
    .dir-action-list { flex-shrink: 0; padding-bottom: 4px; }
    /* Row list */
    .dir-list {
      flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
      padding-bottom: max(16px, env(safe-area-inset-bottom));
      -webkit-mask-image: linear-gradient(to bottom, transparent 0, rgba(0,0,0,0.72) 14px, #000 30px, #000 100%);
      mask-image: linear-gradient(to bottom, transparent 0, rgba(0,0,0,0.72) 14px, #000 30px, #000 100%);
      will-change: transform, opacity;
    }
    .dir-list.slide-out-forward {
      opacity: 0;
      transform: translateX(-30px);
      transition: transform 150ms ease, opacity 120ms ease;
      overflow: hidden;
    }
    .dir-list.slide-out-back {
      opacity: 0;
      transform: translateX(30px);
      transition: transform 150ms ease, opacity 120ms ease;
      overflow: hidden;
    }
    .dir-list.slide-in-forward {
      opacity: 0;
      transform: translateX(30px);
    }
    .dir-list.slide-in-back {
      opacity: 0;
      transform: translateX(-30px);
    }
    .dir-list.slide-settle {
      opacity: 1;
      transform: translateX(0);
      transition: transform 210ms cubic-bezier(0.22, 1, 0.36, 1), opacity 160ms ease;
    }
    .dir-item,
    .dir-control-row {
      display: flex; align-items: center;
      padding: 8px 12px;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      gap: 12px;
      border: none; background: transparent; color: var(--fg);
      width: 100%; font: inherit; text-align: left;
    }
    .dir-current-row { cursor: default; }
    .dir-item:active,
    .dir-control-row:active { background: rgba(255,255,255,0.06); }
    .dir-current-row:active { background: transparent; }
    .dir-control-row[disabled] { opacity: 0.35; cursor: default; }
    .dir-control-row[disabled]:active { background: transparent; }
    .dir-item-icon,
    .dir-control-icon {
      flex-shrink: 0; color: #fff; display: flex; align-items: center; justify-content: center;
      width: 22px; height: 22px;
    }
    .dir-item-icon svg,
    .dir-control-icon svg { display: block; width: 17px; height: 17px; }
    .dir-item-name,
    .dir-control-label {
      flex: 1; min-width: 0;
      font-size: var(--settings-text-size, 15px); font-weight: 700;
      letter-spacing: 0;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      color: var(--fg);
    }
    .dir-current-row .dir-control-label { color: var(--muted); }
    .dir-start-btn {
      appearance: none; -webkit-appearance: none;
      border: none; background: transparent; color: var(--fg);
      font: inherit; font-size: var(--settings-text-size, 15px);
      font-weight: 700; line-height: 1;
      padding: 8px 0 8px 10px; border-radius: 8px;
      margin-right: 12px;
      flex-shrink: 0; cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .dir-start-btn:active { opacity: 0.55; }
    .dir-start-btn[disabled] { opacity: 0.35; cursor: default; }
    .dir-item-chevron { flex-shrink: 0; color: var(--muted); display: flex; align-items: center; }
    .dir-item-chevron svg { display: block; width: 14px; height: 14px; }
    .dir-item.leaf .dir-item-chevron { visibility: hidden; }
    .dir-empty, .dir-loading {
      padding: 40px 24px; text-align: center;
      font-size: var(--settings-text-size, 15px); color: var(--muted);
    }
    .dir-status {
      padding: 0 12px; font-size: 13px;
      color: rgba(255,255,255,0.45); flex-shrink: 0;
      min-height: 0;
    }
    .dir-status:not(:empty) { padding: 2px 12px 4px; min-height: 1.6em; }
    .dir-status.error { color: rgb(232, 146, 146); }
    .dir-create-overlay {
      position: fixed; inset: 0; z-index: 50;
      display: flex; align-items: center; justify-content: center;
      padding: 24px 12px;
      background: rgba(0,0,0,0.10);
      backdrop-filter: blur(0px);
      -webkit-backdrop-filter: blur(0px);
      opacity: 0; pointer-events: none;
      transition: opacity 240ms ease, background 320ms ease, backdrop-filter 320ms ease, -webkit-backdrop-filter 320ms ease;
    }
    .dir-create-overlay[hidden] { display: none; }
    .dir-create-overlay.visible {
      opacity: 1; pointer-events: auto;
      background: rgba(0,0,0,0.16);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .dir-create-composer {
      width: min(900px, calc(100vw - 24px));
      max-width: 900px;
      padding: 8px 7px 10px;
      margin: 0;
      border: none;
      background: transparent;
      position: relative;
      opacity: 0;
      filter: blur(18px);
      transform: translateY(42px) scale(0.952);
      transition: opacity 320ms ease, transform 620ms cubic-bezier(0.18, 0.9, 0.22, 1), filter 520ms ease;
    }
    .dir-create-composer::before {
      display: none;
    }
    .dir-create-overlay.visible .dir-create-composer {
      opacity: 1;
      filter: blur(0);
      transform: translateY(-42px) scale(1);
    }
    .dir-create-field {
      position: relative;
      z-index: 1;
      border-radius: 24px;
      min-height: 54px;
      border: none;
      background: transparent;
      box-shadow: none;
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
    }
    .dir-create-input {
      display: block;
      width: 100%;
      border: none;
      background: transparent;
      color: var(--fg);
      border-radius: 22px;
      min-height: 54px;
      padding: 12px 54px 12px 14px;
      font: 700 16px/1.5 "SF Pro Text","Segoe UI",sans-serif;
      outline: none;
      box-sizing: border-box;
      -webkit-appearance: none;
      appearance: none;
    }
    .dir-create-input::placeholder { color: var(--muted); }
    .dir-create-input:focus,
    .dir-create-input:active {
      background: transparent;
    }
    .dir-create-input:-webkit-autofill,
    .dir-create-input:-webkit-autofill:hover,
    .dir-create-input:-webkit-autofill:focus,
    .dir-create-input:-webkit-autofill:active {
      -webkit-text-fill-color: var(--fg);
      -webkit-box-shadow: 0 0 0 1000px transparent inset;
      transition: background-color 9999s ease-out 0s;
    }
    .dir-create-submit {
      position: absolute;
      right: 9px;
      bottom: 9px;
      width: 38px;
      height: 38px;
      border-radius: 8px;
      border: 1px solid rgba(215, 225, 238, 0.18);
      background: linear-gradient(180deg, rgba(245, 248, 252, 0.98) 0%, rgba(215, 225, 238, 0.98) 100%);
      color: var(--bg);
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }
    .dir-create-submit:disabled { opacity: 0.45; cursor: default; }
  </style>
</head>
<body>
  <div class="shell">
    __HUB_HEADER_HTML__
    <!-- Desktop / native picker panel -->
    <section id="pickerPanel">
      <div class="title">New Session</div>
      <div class="copy">Choose a workspace and jump straight into chat. The first message decides which agents actually launch.</div>
      <div class="actions">
        <button type="button" class="pick-btn" id="pickBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
          <span id="pickBtnLabel">Choose in Finder</span>
        </button>
      </div>
      <div class="status" id="statusText"></div>
    </section>
    <!-- Mobile / browser-style directory picker -->
    <div id="dirBrowser">
      <div class="dir-path-bar" id="dirPathBar" hidden>
        <button type="button" class="dir-back-btn" id="dirBackBtn" hidden>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polyline points="17 20 7 12 17 4"/></svg>
        </button>
      </div>
      <div class="dir-action-list">
        <div class="dir-control-row dir-current-row">
          <span class="dir-control-label dir-path-text" id="dirPathText"></span>
          <button type="button" class="dir-start-btn" id="dirStartBtn" disabled>Start New Session</button>
        </div>
        <button type="button" class="dir-control-row" id="dirCreateBtn">
          <span class="dir-control-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          </span>
          <span class="dir-control-label">Create New Directory</span>
        </button>
      </div>
      <div class="dir-status" id="dirStatus"></div>
      <div class="dir-list" id="dirList">
        <div class="dir-loading">Loading…</div>
      </div>
    </div>
    <div class="dir-create-overlay" id="dirCreateOverlay" hidden>
      <form class="dir-create-composer" id="dirCreateForm">
        <div class="dir-create-field">
          <input class="dir-create-input" id="dirCreateInput" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Directory name">
          <button type="button" class="dir-create-submit" id="dirCreateSubmit" aria-label="Create directory">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
          </button>
        </div>
      </form>
    </div>
  </div>
  <script>
    const HUB_EMBED = document.documentElement.dataset.hubEmbed === "1";
    const VIEW_VARIANT = document.documentElement.dataset.viewVariant || "";
    const USE_DIR_BROWSER = HUB_EMBED || VIEW_VARIANT === "mobile";

    const NATIVE_PICKER_SUPPORTED =
      !USE_DIR_BROWSER &&
      /mac/i.test(String(navigator.platform || "")) &&
      !/iphone|ipad|ipod|android/i.test(String(navigator.userAgent || ""));

    let startInFlight = false;

    // ── Embed height helper ──
    const queueEmbedHeight = (() => {
      let raf = 0;
      return () => {
        if (!HUB_EMBED || window.self === window.top) return;
        if (raf) cancelAnimationFrame(raf);
        raf = requestAnimationFrame(() => {
          raf = 0;
          const height = Math.max(220, Math.min(420, Math.ceil(document.documentElement.scrollHeight || document.body.scrollHeight || 0)));
          window.parent.postMessage({ type: "multiagent-hub-inline-frame-height", kind: "new-session", height }, "*");
        });
      };
    })();

    // ── Start session with a given workspace path ──
    const dirStatus = document.getElementById("dirStatus");
    const dirUseText = null; // no separate use button; user taps folder directly
    const startSession = async (workspace) => {
      if (startInFlight || !workspace) return;
      startInFlight = true;
      if (dirStatus) { dirStatus.textContent = "Opening chat…"; dirStatus.className = "dir-status"; }
      try {
        const res = await fetch("/start-session-draft", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ workspace }),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data.ok || !data.chat_url) throw new Error(data.error || "Failed to start draft session.");
        if (HUB_EMBED && window.self !== window.top) {
          window.parent.postMessage({
            type: "multiagent-hub-open-chat-session",
            chatUrl: data.chat_url,
            sessionName: data.session || "",
            sessionRecord: data.session_record || {},
          }, "*");
          return;
        }
        window.location.href = data.chat_url;
      } catch (err) {
        if (dirStatus) { dirStatus.textContent = err?.message || "Failed."; dirStatus.className = "dir-status error"; }
        startInFlight = false;
      }
    };

    // ── Desktop / native picker ──
    if (!USE_DIR_BROWSER) {
      const statusText = document.getElementById("statusText");
      const pickBtn = document.getElementById("pickBtn");
      const pickBtnLabel = document.getElementById("pickBtnLabel");
      const setStatus = (message = "", isError = false) => {
        statusText.textContent = String(message || "");
        statusText.classList.toggle("error", !!(message && isError));
        queueEmbedHeight();
      };
      const pickWorkspace = async () => {
        if (!NATIVE_PICKER_SUPPORTED) {
          const manual = window.prompt("Workspace path", "");
          return manual === null ? "" : String(manual || "").trim();
        }
        const res = await fetch("/pick-workspace", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({}) });
        const data = await res.json().catch(() => ({}));
        if (data.ok && data.path) return String(data.path || "");
        if (data.canceled) return "";
        throw new Error(data.error || "Workspace picker failed.");
      };
      const beginDraftSession = async () => {
        if (startInFlight) return;
        startInFlight = true;
        pickBtn.disabled = true;
        pickBtnLabel.textContent = NATIVE_PICKER_SUPPORTED ? "Choosing…" : "Starting…";
        setStatus("Choose a workspace…");
        try {
          const workspace = await pickWorkspace();
          if (!workspace) { setStatus(""); return; }
          await startSession(workspace);
        } catch (err) {
          setStatus(err?.message || "Failed to start draft session.", true);
        } finally {
          startInFlight = false;
          pickBtn.disabled = false;
          pickBtnLabel.textContent = NATIVE_PICKER_SUPPORTED ? "Choose in Finder" : "Choose Workspace";
        }
      };
      pickBtn.addEventListener("click", () => beginDraftSession());
      window.addEventListener("load", () => {
        queueEmbedHeight();
        if (new URLSearchParams(window.location.search).get("autostart") !== "0") beginDraftSession();
      }, { once: true });
      if (typeof ResizeObserver === "function") {
        try { new ResizeObserver(() => queueEmbedHeight()).observe(document.body); } catch (_) {}
      }
    }

    // ── Mobile directory browser ──
    if (USE_DIR_BROWSER) {
      const dirPathBar = document.getElementById("dirPathBar");
      const dirBackBtn = document.getElementById("dirBackBtn");
      const dirPathText = document.getElementById("dirPathText");
      const dirStartBtn = document.getElementById("dirStartBtn");
      const dirCreateBtn = document.getElementById("dirCreateBtn");
      const dirCreateOverlay = document.getElementById("dirCreateOverlay");
      const dirCreateForm = document.getElementById("dirCreateForm");
      const dirCreateInput = document.getElementById("dirCreateInput");
      const dirCreateSubmit = document.getElementById("dirCreateSubmit");
      const dirList = document.getElementById("dirList");

      let _currentPath = "";
      let _parentPath = null;
      let _loading = false;

      const folderSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>';
      const chevronSvg = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>';

      function shortPath(p) {
        const parts = (p || "").replace(/\/$/, "").split("/").filter(Boolean);
        if (!parts.length) return "/";
        if (parts.length <= 2) return "/" + parts.join("/");
        return "…/" + parts.slice(-2).join("/");
      }

      function esc(s) { return String(s || "").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
      function escAttr(s) { return String(s || "").replace(/"/g, "&quot;"); }
      function childPath(parent, name) {
        const base = String(parent || "").replace(/\/+$/, "");
        return (base || "") + "/" + String(name || "").replace(/^\/+/, "");
      }

      function openCreateOverlay() {
        if (_loading || !_currentPath || !dirCreateOverlay || !dirCreateInput) return;
        dirCreateInput.value = "";
        dirCreateOverlay.hidden = false;
        dirCreateOverlay.classList.add("visible");
        try { dirCreateInput.focus({ preventScroll: true }); } catch (_) { dirCreateInput.focus(); }
      }

      function closeCreateOverlay() {
        if (!dirCreateOverlay) return;
        dirCreateOverlay.classList.remove("visible");
        setTimeout(() => {
          if (!dirCreateOverlay.classList.contains("visible")) dirCreateOverlay.hidden = true;
        }, 140);
      }

      async function createDirectory(nameValue) {
        if (_loading || !_currentPath) return;
        const name = String(nameValue || "").trim();
        if (!name) return;
        if (/[\\/]/.test(name)) {
          if (dirStatus) { dirStatus.textContent = "Use a folder name, not a path."; dirStatus.className = "dir-status error"; }
          return;
        }
        const target = childPath(_currentPath, name);
        if (dirCreateBtn) dirCreateBtn.disabled = true;
        if (dirCreateSubmit) dirCreateSubmit.disabled = true;
        if (dirStatus) { dirStatus.textContent = "Creating…"; dirStatus.className = "dir-status"; }
        try {
          const res = await fetch("/mkdir", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ path: target }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || !data.ok) throw new Error(data.error || "Failed to create directory.");
          closeCreateOverlay();
          await loadDir(data.path || target, "forward");
        } catch (err) {
          if (dirStatus) { dirStatus.textContent = err?.message || "Failed."; dirStatus.className = "dir-status error"; }
        } finally {
          if (dirCreateBtn) dirCreateBtn.disabled = false;
          if (dirCreateSubmit) dirCreateSubmit.disabled = false;
        }
      }

      const dirTransitionDelay = (ms) => new Promise((resolve) => setTimeout(resolve, ms));

      function dirEntriesHtml(entries) {
        if (!entries.length) return '<div class="dir-empty">No subfolders</div>';
        return entries.map(e => {
          const leaf = !e.has_children;
          return `<div class="dir-item${leaf ? " leaf" : ""}" data-path="${escAttr(e.path)}">` +
            `<span class="dir-item-icon">${folderSvg}</span>` +
            `<span class="dir-item-name">${esc(e.name)}</span>` +
            `<span class="dir-item-chevron">${chevronSvg}</span>` +
            `</div>`;
        }).join("");
      }

      function attachDirItemHandlers() {
        dirList.querySelectorAll(".dir-item").forEach(el => {
          el.addEventListener("click", () => {
            const p = el.dataset.path;
            loadDir(p, "forward");
          });
        });
      }

      async function renderDirList(html, direction) {
        const animated = direction === "forward" || direction === "back";
        const outClass = direction === "back" ? "slide-out-back" : "slide-out-forward";
        const inClass = direction === "back" ? "slide-in-back" : "slide-in-forward";
        dirList.classList.remove("slide-out-forward", "slide-out-back", "slide-in-forward", "slide-in-back", "slide-settle");
        if (animated) {
          dirList.classList.add(outClass);
          await dirTransitionDelay(150);
        }
        dirList.innerHTML = html;
        dirList.scrollTop = 0;
        attachDirItemHandlers();
        if (!animated) return;
        dirList.classList.remove(outClass);
        dirList.classList.add(inClass);
        void dirList.offsetWidth;
        requestAnimationFrame(() => {
          dirList.classList.remove(inClass);
          dirList.classList.add("slide-settle");
        });
        await dirTransitionDelay(220);
        dirList.classList.remove("slide-settle");
      }

      async function loadDir(path, direction = "") {
        if (_loading) return;
        _loading = true;
        if (dirStartBtn) dirStartBtn.disabled = true;
        if (dirCreateBtn) dirCreateBtn.disabled = true;
        if (!_currentPath) dirList.innerHTML = '<div class="dir-loading">Loading…</div>';
        if (dirStatus) { dirStatus.textContent = ""; dirStatus.className = "dir-status"; }
        try {
          const url = "/dirs" + (path ? "?path=" + encodeURIComponent(path) : "");
          const res = await fetch(url, { cache: "no-store" });
          if (!res.ok) throw new Error("Failed to load directory.");
          const data = await res.json();
          _currentPath = data.path || path || "";
          _parentPath = data.parent || null;

          dirPathText.textContent = shortPath(_currentPath);
          if (dirPathBar) dirPathBar.hidden = !_parentPath;
          dirBackBtn.hidden = !_parentPath;
          if (dirStartBtn) dirStartBtn.disabled = !_currentPath;

          const entries = data.entries || [];
          await renderDirList(dirEntriesHtml(entries), direction);
        } catch (err) {
          if (dirStatus) { dirStatus.textContent = err?.message || "Failed."; dirStatus.className = "dir-status error"; }
          dirList.innerHTML = "";
        } finally {
          _loading = false;
          if (dirStartBtn) dirStartBtn.disabled = !_currentPath;
          if (dirCreateBtn) dirCreateBtn.disabled = !_currentPath;
        }
      }

      dirBackBtn.addEventListener("click", () => { if (_parentPath) loadDir(_parentPath, "back"); });
      if (dirStartBtn) dirStartBtn.addEventListener("click", () => { if (_currentPath) startSession(_currentPath); });
      if (dirCreateBtn) dirCreateBtn.addEventListener("click", openCreateOverlay);
      if (dirCreateOverlay) {
        dirCreateOverlay.addEventListener("click", (event) => {
          if (event.target === dirCreateOverlay) closeCreateOverlay();
        });
      }
      if (dirCreateForm) {
        dirCreateForm.addEventListener("submit", (event) => {
          event.preventDefault();
          return false;
        });
      }
      if (dirCreateSubmit) {
        dirCreateSubmit.addEventListener("click", (event) => {
          event.preventDefault();
          createDirectory(dirCreateInput ? dirCreateInput.value : "");
        });
      }
      if (dirCreateInput) {
        dirCreateInput.addEventListener("keydown", (event) => {
          if (event.key !== "Enter") return;
          event.preventDefault();
          createDirectory(dirCreateInput.value);
        });
      }
      window.addEventListener("keydown", (event) => {
        if (event.key === "Escape" && dirCreateOverlay && !dirCreateOverlay.hidden) closeCreateOverlay();
      });

      loadDir("");
    }

  __HUB_HEADER_JS__
  </script>
