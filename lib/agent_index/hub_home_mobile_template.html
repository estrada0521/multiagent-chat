<!doctype html>
<html lang="en" data-theme="black-hole">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="rgb(10, 10, 10)">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Session Hub">
  <link rel="manifest" href="__HUB_MANIFEST_URL__">
  <link rel="icon" type="image/png" sizes="192x192" href="__PWA_ICON_192_URL__">
  <link rel="apple-touch-icon" href="__APPLE_TOUCH_ICON_URL__">
  <script>
    (() => {
      if (!("serviceWorker" in navigator)) return;
      const isLocalHost = location.hostname === "localhost" || location.hostname === "127.0.0.1" || location.hostname === "[::1]";
      if (!(window.isSecureContext || isLocalHost)) return;
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/hub-service-worker.js", { scope: "/" }).catch((err) => {
          console.warn("hub service worker registration failed", err);
        });
      }, { once: true });
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap" rel="stylesheet">
  <title>Session Hub</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: rgb(10, 10, 10);
      --bg-rgb: 10, 10, 10;
      --panel: rgba(18, 18, 20, 0.7);
      --panel-2: rgba(25, 25, 28, 0.8);
      --line: rgba(255, 255, 255, 0.06);
      --line-strong: rgba(255, 255, 255, 0.12);
      --fg: rgb(245, 245, 245);
      --muted: rgb(140, 140, 145);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100dvh;
      background: var(--bg);
      color: var(--fg);
      font-family: "SF Pro Text", "Segoe UI", sans-serif;
    }

    body {
      padding: 0 0 env(safe-area-inset-bottom) 0;
    }

    .shell {
      position: relative;
      width: 100%;
      max-width: 900px;
      min-height: 100dvh;
      margin: 0 auto;
    }

    .shell> :not(.hub-page-header):not(.mob-list-wrap) {
      padding-left: 12px;
      padding-right: 12px;
    }

    .hero {
      padding: 8px 2px 18px 2px;
    }

    .eyebrow {
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 40px);
      line-height: 1.02;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    .sub {
      margin-top: 10px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.55;
      max-width: 40rem;
    }

    .home-grid {
      display: grid;
      gap: 12px;
      margin-top: 8px;
    }

    .hub-nav {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 14px;
      width: 100%;
      align-items: center;
    }

    .hub-nav a {
      color: var(--muted);
      text-decoration: none;
      border: 0.5px solid var(--line);
      background: var(--panel);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 12px;
      line-height: 1;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .hub-nav form {
      margin: 0;
    }

    .hub-nav .hub-restart-form {
      margin-left: auto;
    }

    .hub-nav button {
      color: var(--muted);
      border: 0.5px solid var(--line);
      background: var(--panel);
      border-radius: 999px;
      padding: 6px 10px;
      font: inherit;
      font-size: 12px;
      font-weight: 400;
      line-height: 1;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      appearance: none;
      -webkit-appearance: none;
    }

    .hub-nav .hub-restart-form button {
      color: rgb(44, 132, 219);
    }

    @keyframes hubRestartingPulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.4;
      }
    }

    .hub-nav button.restarting {
      animation: hubRestartingPulse 900ms ease-in-out infinite;
      pointer-events: none;
    }

    .home-card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--panel);
      border: 0.5px solid var(--line);
      border-radius: 20px;
      padding: 24px 22px 22px;
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15), inset 0 1px 1px rgba(255, 255, 255, 0.05);
      transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .home-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(circle at top left, rgba(255, 255, 255, 0.04), transparent 60%);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .home-card:hover {
      transform: translateY(-4px) scale(1.01);
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.25), inset 0 1px 1px rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.15);
      background: var(--panel-2);
    }

    .home-card:hover::before {
      opacity: 1;
    }

    .home-label {
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .home-title {
      font-size: 22px;
      line-height: 1.1;
      font-weight: 600;
      letter-spacing: -0.03em;
    }

    .home-note {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
      margin-top: 10px;
      max-width: 34rem;
    }

    .hub-nav a.active {
      background: var(--bg);
      border-color: rgba(255, 255, 255, 0.2);
    }

    /* ── Hub home layout ── */
    body {
      padding: 0;
    }

    __HUB_HEADER_CSS__

    .hub-page-header {
      --mobile-header-edge-gap: 10px;
      --chrome-icon-btn-size: 44px;
      --chrome-icon-size: 24px;
      --chrome-icon-stroke: 1.6;
      --chrome-icon-gap: 0;
    }

    .hub-page-header .hub-page-header-top {
      padding-top: max(0px, calc(env(safe-area-inset-top, 0px) - 8px));
      padding-right: calc(var(--mobile-header-edge-gap) + env(safe-area-inset-right, 0px));
      padding-bottom: 2px;
      padding-left: calc(var(--mobile-header-edge-gap) + env(safe-area-inset-left, 0px));
      min-height: 44px;
      align-items: center;
    }

    .hub-page-header .hub-page-title,
    .hub-page-header .hub-page-header-actions .hub-page-menu-btn {
      width: var(--chrome-icon-btn-size);
      height: var(--chrome-icon-btn-size);
      min-width: var(--chrome-icon-btn-size);
      min-height: var(--chrome-icon-btn-size);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0;
    }

    .hub-page-header .hub-page-header-actions {
      gap: 0;
      margin-left: auto;
      min-height: var(--chrome-icon-btn-size);
    }

    .hub-page-header .hub-page-title {
      margin: 0;
      gap: 0;
    }

    .hub-page-header .hub-page-title:hover {
      opacity: 1;
      transform: none;
    }

    .hub-page-header .hub-page-title .hub-page-logo {
      height: 22px;
      width: auto;
      transform: none;
    }

    .hub-page-header .hub-page-header-actions .hub-page-menu-btn {
      background: transparent;
      border: none;
      box-shadow: none;
      backdrop-filter: none;
      -webkit-backdrop-filter: none;
      -webkit-tap-highlight-color: transparent;
      transition: none;
      color: #fff;
      justify-content: center;
      padding: 0;
    }

    .hub-page-header .hub-page-header-actions .hub-page-menu-btn svg {
      transform: none;
    }

    .hub-page-header .hub-page-header-actions .hub-page-menu-btn:active,
    .hub-page-header .hub-page-header-actions .hub-page-menu-btn.open {
      background: transparent;
      transform: none;
    }

    .mob-list-wrap {
      display: block;
      max-width: 900px;
      margin: 0 auto;
      width: 100%;
      padding-bottom: 20px;
    }

    .mob-section-label {
      padding: 14px 14px 5px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .mob-session-row {
      display: block;
      padding: 14px;
      border-bottom: none;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      -webkit-tap-highlight-color: transparent;
      transition: background 80ms ease;
    }

    .mob-session-row:hover {
      background: var(--panel-2);
    }

    .mob-row-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 5px;
    }

    .mob-row-name {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: -0.02em;
      min-width: 0;
      word-break: break-word;
      flex: 1;
    }

    .mob-row-preview {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100%;
    }

    .mob-row-preview .sender {
      color: var(--fg);
      opacity: 0.72;
    }

    .mob-row-tools {
      flex: 0 0 auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .mob-badge {
      font-size: 10px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 999px;
      border: 0.5px solid var(--line-strong);
      color: var(--muted);
    }

    .mob-badge.idle {
      color: var(--ok);
    }

    .mob-badge.attached {
      color: var(--warn);
    }

    .mob-badge.degraded {
      color: var(--bad);
    }

    .mob-kill-link {
      font-size: 11px;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 8px;
      border: 0.5px solid rgba(214, 124, 124, 0.4);
      color: var(--bad);
      text-decoration: none;
    }

    .mob-session-row.archived-row .mob-row-name,
    .mob-session-row.archived-row .mob-badge {
      opacity: 0.55;
    }

    .mob-empty {
      padding: 48px 16px;
      color: var(--muted);
      font-size: 14px;
      text-align: center;
    }

    .mob-empty.loading {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 220px;
      padding: 0;
      color: inherit;
    }

    @keyframes hub-inline-loading-spin {
      to {
        transform: rotate(360deg);
      }
    }

    .mob-inline-loading {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 20px;
      line-height: 1;
    }

    .mob-inline-loading-spinner {
      width: 17px;
      height: 17px;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.24);
      border-top-color: rgba(255, 255, 255, 0.92);
      animation: hub-inline-loading-spin 800ms linear infinite;
      display: inline-block;
      vertical-align: middle;
      box-sizing: border-box;
    }

    /* ── Swipe-to-reveal (touch + mouse) ── */
    .swipe-row {
      position: relative;
      overflow: hidden;
      border-bottom: none;
    }

    .swipe-act {
      position: absolute;
      top: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-width: 80px;
      padding: 0 18px;
      gap: 5px;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      user-select: none;
      -webkit-user-select: none;
      cursor: pointer;
      overflow: hidden;
    }

    .swipe-act svg {
      display: block;
    }

    .swipe-act-right {
      right: 0;
      background: rgb(255, 59, 48);
    }

    .mob-session-row {
      background: var(--bg);
      opacity: 1;
      position: relative;
      z-index: 1;
      will-change: transform;
      border-bottom: none;
    }

    html[data-theme="black-hole"] .mob-session-row {
      background: rgb(10, 10, 10);
    }

    .launch-shell {
      position: fixed;
      inset: 0;
      z-index: 10002;
      background: rgb(10, 10, 10);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      pointer-events: none;
    }

    .launch-shell.visible {
      display: flex;
    }

    .launch-shell-card {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 52px;
      height: 52px;
      border-radius: 999px;
      background: rgba(20, 20, 20, 0.62);
      border: 0.5px solid rgba(255, 255, 255, 0.16);
      backdrop-filter: blur(16px) saturate(170%);
      -webkit-backdrop-filter: blur(16px) saturate(170%);
      box-shadow: 0 8px 28px rgba(0, 0, 0, 0.36);
    }

    .launch-shell-spinner {
      width: 18px;
      height: 18px;
      border-radius: 999px;
      border: 2px solid rgba(255, 255, 255, 0.24);
      border-top-color: rgba(255, 255, 255, 0.92);
      animation: hub-inline-loading-spin 800ms linear infinite;
      box-sizing: border-box;
    }

    /* ── Chat iframe overlay ── */
    /* overscroll contain は Safari の下端 UI ジェスチャを親 Hub に伝えにくくするため付けない */
    #chatOverlay {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000;
      opacity: 1;
      transform: translate3d(100%, 0, 0);
      transition: transform 340ms cubic-bezier(0.22, 1, 0.36, 1), opacity 180ms ease;
      will-change: transform, opacity;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    #chatOverlay[hidden] {
      display: none;
    }

    #chatOverlay.overlay-visible {
      opacity: 1;
      transform: translate3d(0, 0, 0);
    }

    #chatOverlay.overlay-closing {
      opacity: 1;
      transform: translate3d(100%, 0, 0);
      transition: transform 320ms cubic-bezier(0.32, 0.72, 0, 1), opacity 220ms ease;
    }

    #chatOverlay.prewarming {
      display: block;
      left: -9999px;
      top: -9999px;
      right: auto;
      bottom: auto;
      width: 1px;
      height: 1px;
      overflow: hidden;
      pointer-events: none;
      background: transparent;
      opacity: 0;
      transform: none;
      transition: none;
    }

    @media (prefers-reduced-motion: reduce) {
      #chatOverlay {
        transition: opacity 120ms ease;
      }

      #chatOverlay.overlay-closing {
        transition: opacity 120ms ease;
      }
    }

    #chatFrame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      background: #000;
    }

    /* チャット iframe 表示中: Local のみ。親をわずかにスクロール可能にし、子から scroll-signal で親を動かす */
    html.hub-chat-overlay-active {
      overflow-y: auto;
      height: 100%;
      height: -webkit-fill-available;
    }

    body.hub-chat-overlay-active {
      overscroll-behavior-y: none;
      min-height: 100vh;
      min-height: 100svh;
      min-height: -webkit-fill-available;
    }

    /* ── Bottom sheet (New Session / Settings) ── */
    .mob-sheet-backdrop {
      position: fixed;
      inset: 0;
      z-index: 10001;
      background: rgba(0, 0, 0, 0);
      display: flex;
      align-items: flex-end;
      transition: background 300ms ease;
    }

    .mob-sheet-backdrop[hidden] {
      display: none;
    }

    html.mob-sheet-active,
    body.mob-sheet-active {
      overflow: hidden;
      overscroll-behavior: none;
    }

    body.mob-sheet-active {
      position: fixed;
      width: 100%;
      left: 0;
      right: 0;
    }

    .mob-sheet-backdrop.sheet-open {
      background: rgba(0, 0, 0, 0.55);
    }

    .mob-sheet-panel {
      background: rgba(30, 30, 35, 0.25);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-height: 92dvh;
      height: 92dvh;
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 340ms cubic-bezier(0.22, 1, 0.36, 1);
      overflow: hidden;
      border-top: 0.5px solid rgba(255, 255, 255, 0.15);
      /* iOS風のハイライトエッジ */
      box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.4);
    }

    .mob-sheet-backdrop.sheet-open .mob-sheet-panel {
      transform: translateY(0);
    }

    .mob-sheet-backdrop.sheet-closing .mob-sheet-panel {
      transform: translateY(100%);
      transition: transform 280ms cubic-bezier(0.32, 0.72, 0, 1);
    }

    .mob-sheet-backdrop.sheet-closing {
      background: rgba(0, 0, 0, 0);
    }

    /* Nav bar */
    .mob-sheet-nav {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: transparent;
      cursor: grab;
    }

    .mob-sheet-pill {
      width: 36px;
      height: 5px;
      background: rgba(255, 255, 255, 0.22);
      border-radius: 3px;
      margin: 10px 0 0;
      flex-shrink: 0;
    }

    .mob-sheet-nav-bar {
      display: flex;
      align-items: center;
      width: 100%;
      padding: 4px 4px 8px;
      position: relative;
      min-height: 44px;
    }

    .mob-sheet-nav-gap {
      flex: 0 0 44px;
    }

    .mob-sheet-nav-title {
      position: absolute;
      left: 50%;
      transform: translateX(-50%);
      font-size: 17px;
      font-weight: 600;
      color: rgb(245, 245, 245);
      white-space: nowrap;
      pointer-events: none;
    }

    .mob-sheet-close {
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.65);
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
      border-radius: 8px;
      margin-left: auto;
      padding: 0;
    }

    .mob-sheet-close:active {
      opacity: 0.45;
    }

    .mob-sheet-close svg {
      display: block;
    }

    #mobSheetFrame {
      flex: 1;
      border: none;
      min-height: 0;
      width: 100%;
      display: block;
      background: transparent;
      opacity: 0;
      transition: opacity 80ms ease;
    }

    #mobSheetFrame.sheet-frame-ready {
      opacity: 1;
    }
  </style>
</head>

<body>
  <div id="launchShell" class="launch-shell" hidden>
    <div class="launch-shell-card" aria-hidden="true">
      <span class="launch-shell-spinner"></span>
    </div>
  </div>
  <div id="chatOverlay" hidden><iframe id="chatFrame" src="about:blank"
      allow="camera; microphone; clipboard-write"></iframe></div>
  <!-- Bottom sheet for New Session / Settings -->
  <div id="mobSheet" class="mob-sheet-backdrop" hidden>
    <div class="mob-sheet-panel" id="mobSheetPanel">
      <div class="mob-sheet-nav" id="mobSheetNav">
        <div class="mob-sheet-pill"></div>
        <div class="mob-sheet-nav-bar">
          <div class="mob-sheet-nav-gap"></div>
          <div class="mob-sheet-nav-title" id="mobSheetTitle"></div>
          <button class="mob-sheet-close" id="mobSheetClose" aria-label="Close">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
              stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18" />
              <line x1="6" y1="6" x2="18" y2="18" />
            </svg>
          </button>
        </div>
      </div>
      <iframe id="mobSheetFrame"
        srcdoc="<!doctype html><html><head><meta name='color-scheme' content='dark'><style>html,body{margin:0;min-height:100%;background:transparent;color-scheme:dark}</style></head><body></body></html>"
        allow="camera; microphone; clipboard-write"></iframe>
    </div>
  </div>
  <div class="shell">
    __HUB_HEADER_HTML__
    <div class="mob-list-wrap" id="mobListWrap">
      <div class="mob-empty loading" id="mobLoading"><span class="mob-inline-loading"><span class="mob-inline-loading-spinner" aria-hidden="true"></span></span></div>
    </div>
  </div>
  <script>
    // ── Chat iframe overlay ──
    const _chatOverlay = document.getElementById("chatOverlay");
    const _chatFrame = document.getElementById("chatFrame");
    const _launchShell = document.getElementById("launchShell");
    let _hubChatParentLayoutMax = 0;
    let _hubMinParentChromeGap = Infinity;
    let _hubLayoutRefW = 0;
    let _hubLayoutRefH = 0;
    let _hubVVBridgeHandler = null;
    let _hubPreOverlayScrollY = 0;
    let _currentChatSessionName = "";
    let _currentChatUrl = "";
    let _prewarmedSessionName = "";
    let _prewarmedChatUrl = "";
    let _prewarmedFrameReady = false;
    let _prewarmedFrameRenderReady = false;
    let _prewarmToken = 0;
    let _hubLaunchShellPending = false;
    let _hubLaunchShellFallbackTimer = 0;
    let _awaitingChatRenderReady = false;
    let _chatRenderReadyFallbackTimer = 0;
    let _chatOverlayCloseTimer = 0;
    const _chatUrlCache = new Map();
    const _chatUrlInflight = new Map();
    const HUB_CHAT_FRAME_KEY = "hub_chat_frame";
    const HUB_LAST_SESSION_KEY = "multiagent_hub_last_session_name";
    const HUB_PENDING_ERROR_KEY = "multiagent_hub_pending_error";

          const base = (sr._snap || 0) * SNAP_W;
          let x = Math.max(-SNAP_W, Math.min(0, base + dx));
          if (!actR && x < 0) x = 0;
          inner.style.transform = x ? `translateX(${x}px)` : "";
        };
        const endDrag = () => {
          if (!active || axis !== "x") { active = false; return; }
          active = false;
          const base = (sr._snap || 0) * SNAP_W;
          const fx = base + dx;
          const ease = "transform 220ms cubic-bezier(.25,.46,.45,.94)";
          if (fx < -THRESH && actR) {
            inner.style.transition = ease; inner.style.transform = `translateX(${-SNAP_W}px)`;
            sr._snap = -1; anyOpen = sr;
          } else {
            inner.style.transition = ease; inner.style.transform = "";
            sr._snap = 0; if (anyOpen === sr) anyOpen = null;
          }
          dx = 0;
        };
        // Touch events
        inner.addEventListener("touchstart", (e) => startDrag(e.touches[0].clientX, e.touches[0].clientY), { passive: true });
        inner.addEventListener("touchmove", (e) => moveDrag(e.touches[0].clientX, e.touches[0].clientY, () => e.preventDefault()), { passive: false });
        inner.addEventListener("touchend", endDrag, { passive: true });
        // Mouse events (PC swipe)
        inner.addEventListener("mousedown", (e) => {
          if (e.target.closest("a, button")) return;
          e.preventDefault();
          startDrag(e.clientX, e.clientY);
          const onMove = (me) => moveDrag(me.clientX, me.clientY, () => me.preventDefault());
          const onUp = () => { endDrag(); document.removeEventListener("mousemove", onMove); document.removeEventListener("mouseup", onUp); };
          document.addEventListener("mousemove", onMove);
          document.addEventListener("mouseup", onUp);
        });
        if (actR) actR.addEventListener("click", (e) => {
          e.stopPropagation();
          const n = sr.dataset.sessionName;
          const action = actR.dataset.action;
          if (action === "delete-archived") {
            if (confirm("Delete archived logs for " + n + "? This cannot be undone.")) {
              window.location.href = `/delete-archived-session?session=${encodeURIComponent(n)}`;
            }
            return;
          }
          if (confirm("Kill " + n + "?")) window.location.href = `/kill-session?session=${encodeURIComponent(n)}`;
        });
        // tap/click on row body navigates (unless swipe was happening)
        inner.addEventListener("click", (e) => {
          if (didSwipe) { didSwipe = false; e.stopPropagation(); return; }
          if (sr._snap !== 0) { closeRow(sr, true); anyOpen = null; e.stopPropagation(); return; }
          if (e.target.closest(".swipe-act")) return;
          const href = inner.dataset.openHref;
          if (href) openSessionFrame(href, sr.dataset.sessionName || "");
        });
      };

      const renderRows = (active, archived) => {
        let html = "";
        const trashSvg = `<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>`;
        if (active.length) {
          html += `<div class="mob-section-label">Active</div>`;
          html += active.map((s) => {
            const preview = s.latest_message_preview ? `<div class="mob-row-preview"><span class="sender">${esc(s.latest_message_sender || "latest")}</span> ${esc(s.latest_message_preview)}</div>` : "";
            return `<div class="swipe-row" data-session-name="${esc(s.name)}">` +
              `<div class="swipe-act swipe-act-right" data-action="kill">${trashSvg}<span>Kill</span></div>` +
              `<div class="mob-session-row" data-open-href="/open-session?session=${encodeURIComponent(s.name)}" role="link" tabindex="0">` +
              `<div class="mob-row-head">` +
              `<div class="mob-row-name">${esc(s.name)}</div>` +
              `</div>` +
              preview +
              `</div></div>`;
          }).join("");
        }
        if (archived.length) {
          html += `<div class="mob-section-label">Archived</div>`;
          html += archived.map((s) => {
            const preview = s.latest_message_preview ? `<div class="mob-row-preview"><span class="sender">${esc(s.latest_message_sender || "latest")}</span> ${esc(s.latest_message_preview)}</div>` : "";
            return `<div class="swipe-row" data-session-name="${esc(s.name)}">` +
              `<div class="swipe-act swipe-act-right" data-action="delete-archived">${trashSvg}<span>Delete</span></div>` +
              `<div class="mob-session-row archived-row" data-open-href="/revive-session?session=${encodeURIComponent(s.name)}" role="link" tabindex="0">` +
              `<div class="mob-row-head">` +
              `<div class="mob-row-name">${esc(s.name)}</div>` +
              `</div>` +
              preview +
              `</div></div>`;
          }).join("");
        }
        if (!active.length && !archived.length) {
          html = `<div class="mob-empty">No sessions found</div>`;
        }
        wrap.innerHTML = html;
        wrap.querySelectorAll(".swipe-row").forEach(initSwipeRow);
      };
      const refresh = async (force) => {
        try {
          const res = await fetch(`/sessions?ts=${Date.now()}`, { cache: "no-store" });
          if (!res.ok) throw new Error("failed");
          const data = await res.json();
          const activeSessions = data.active_sessions || data.sessions || [];

          // Prevent layout thrashing and animation re-triggering if data hasn't changed
          const sig = JSON.stringify({
            active: activeSessions,
            archived: data.archived_sessions || [],
          });
          if (!force && window._lastMobRenderSig === sig) return;
          window._lastMobRenderSig = sig;

          renderRows(activeSessions, data.archived_sessions || []);
          scheduleActiveSessionPrewarm(activeSessions);
          releaseHubLaunchShellAfterRender();
        } catch (_) {
          wrap.innerHTML = `<div class="mob-empty">Failed to load sessions</div>`;
        }
      };
      kickstartRememberedSessionPrewarm();
      window._mobRefresh = refresh;
      refresh();
      setInterval(refresh, 5000);
    })();

    // ── Bottom sheet (New Session / Settings) ──
    (function () {
      var sheet = document.getElementById("mobSheet");
      var sheetFrame = document.getElementById("mobSheetFrame");
      var sheetPanel = document.getElementById("mobSheetPanel");
      var sheetNav = document.getElementById("mobSheetNav");
      var sheetTitle = document.getElementById("mobSheetTitle");
      var sheetClose = document.getElementById("mobSheetClose");
      if (!sheet || !sheetFrame || !sheetPanel) return;

      var _sheetCloseTimer = 0;
      var _sheetIsNewSession = false;
      var _sheetFrameLoadToken = 0;
      var _sheetOpeningChat = false;
      var _sheetScrollY = 0;
      var _sheetScrollLocked = false;
      var _sheetBlankDoc = "<!doctype html><html><head><meta name='color-scheme' content='dark'><style>html,body{margin:0;min-height:100%;background:rgb(10,10,10);color-scheme:dark}</style></head><body></body></html>";

      function lockSheetScroll() {
        if (_sheetScrollLocked) return;
        _sheetScrollLocked = true;
        _sheetScrollY = window.scrollY || document.documentElement.scrollTop || 0;
        document.documentElement.classList.add("mob-sheet-active");
        document.body.classList.add("mob-sheet-active");
        document.body.style.top = "-" + _sheetScrollY + "px";
      }

      function unlockSheetScroll() {
        if (!_sheetScrollLocked) return;
        _sheetScrollLocked = false;
        document.documentElement.classList.remove("mob-sheet-active");
        document.body.classList.remove("mob-sheet-active");
        document.body.style.top = "";
        try { window.scrollTo(0, _sheetScrollY || 0); } catch (_) { }
      }

      function openSheet(url, isNewSession, title) {
        _sheetIsNewSession = !!isNewSession;
        if (sheetTitle) sheetTitle.textContent = title || "";
        if (_sheetCloseTimer) { clearTimeout(_sheetCloseTimer); _sheetCloseTimer = 0; }
        var loadToken = ++_sheetFrameLoadToken;
        sheetFrame.classList.remove("sheet-frame-ready");
        sheetFrame.onload = function () {
          if (loadToken !== _sheetFrameLoadToken) return;
          requestAnimationFrame(function () {
            if (loadToken === _sheetFrameLoadToken) sheetFrame.classList.add("sheet-frame-ready");
          });
        };
        sheetFrame.removeAttribute("srcdoc");
        sheetFrame.src = url;
        lockSheetScroll();
        sheet.hidden = false;
        sheet.classList.remove("sheet-closing");
        requestAnimationFrame(function () {
          requestAnimationFrame(function () {
            sheet.classList.add("sheet-open");
          });
        });
      }

      function finishSheetClose(refreshSessionList) {
        var wasNewSession = _sheetIsNewSession;
        _sheetIsNewSession = false;
        sheet.classList.remove("sheet-closing");
        sheet.hidden = true;
        _sheetFrameLoadToken++;
        sheetFrame.onload = null;
        sheetFrame.classList.remove("sheet-frame-ready");
        sheetFrame.removeAttribute("src");
        sheetFrame.srcdoc = _sheetBlankDoc;
        unlockSheetScroll();
        if (wasNewSession && refreshSessionList !== false && window._mobRefresh) {
          window._lastMobRenderSig = null;
          window._mobRefresh(true);
        }
      }

      function closeSheet(options) {
        options = options || {};
        const immediate = options.immediate === true;
        const refreshSessionList = options.refreshSessionList !== false;
        if (_sheetCloseTimer) {
          clearTimeout(_sheetCloseTimer);
          _sheetCloseTimer = 0;
        }
        if (immediate) {
          sheet.classList.remove("sheet-open", "sheet-closing");
          finishSheetClose(refreshSessionList);
          return;
        }
        sheet.classList.remove("sheet-open");
        sheet.classList.add("sheet-closing");
        _sheetCloseTimer = setTimeout(function () {
          _sheetCloseTimer = 0;
          finishSheetClose(refreshSessionList);
        }, 300);
      }

      window._openMobSheet = openSheet;
      window._closeMobSheet = closeSheet;

      // Backdrop tap closes sheet
      sheet.addEventListener("click", function (e) {
        if (e.target === sheet) closeSheet();
      });

      // ✕ button closes sheet
      if (sheetClose) sheetClose.addEventListener("click", closeSheet);

      // Drag on nav bar to dismiss
      if (sheetNav) {
        var _startY = 0, _dy = 0, _dragging = false;
        sheetNav.addEventListener("touchstart", function (e) {
          _startY = e.touches[0].clientY; _dy = 0; _dragging = true;
          sheetPanel.style.transition = "none";
        }, { passive: true });
        sheetNav.addEventListener("touchmove", function (e) {
          if (!_dragging) return;
          _dy = Math.max(0, e.touches[0].clientY - _startY);
          sheetPanel.style.transform = "translateY(" + _dy + "px)";
        }, { passive: true });
        sheetNav.addEventListener("touchend", function () {
          if (!_dragging) return;
          _dragging = false;
          sheetPanel.style.transition = "";
          sheetPanel.style.transform = "";
          if (_dy > 80) closeSheet();
        }, { passive: true });
      }

      // postMessage from iframe
      window.addEventListener("message", function (e) {
        if (!sheetFrame || e.source !== sheetFrame.contentWindow) return;
        if (e.data && e.data.type === "multiagent-hub-close-sidebar-page") closeSheet();
        if (e.data === "hub_close_chat") closeSheet();
        if (e.data && e.data.type === "multiagent-hub-open-chat-session") {
          if (_sheetOpeningChat) return;
          _sheetOpeningChat = true;
          var chatUrl = typeof e.data.chatUrl === "string" ? e.data.chatUrl : "";
          var sessionName = typeof e.data.sessionName === "string" ? e.data.sessionName : "";
          closeSheet({ immediate: true, refreshSessionList: false });
          if (chatUrl) {
            requestAnimationFrame(function () {
              _sheetOpeningChat = false;
              openChatInFrame(chatUrl, sessionName);
            });
          } else {
            _sheetOpeningChat = false;
          }
        }
      });

      // Intercept native bridge: new-session / settings → bottom sheet
      var bridge = document.getElementById("hubPageNativeMenuBridge");
      if (bridge) {
        bridge.addEventListener("change", function (e) {
          var val = bridge.value;
          if (!val) return;
          if (val === "new-session") {
            e.stopImmediatePropagation();
            bridge.value = "";
            openSheet("/new-session?embed=1&view=mobile", true, "New Session");
          } else if (val === "settings") {
            e.stopImmediatePropagation();
            bridge.value = "";
            openSheet("/settings?embed=1&view=mobile", false, "Settings");
          } else if (val === "close-session" || val === "hub") {
            e.stopImmediatePropagation();
            bridge.value = "";
            closeChatFrame();
          }
        });
      }
    })();

    // ── Hub scroll-to-hide logic ──
    (function () {
      const header = document.querySelector(".hub-page-header");
      let prevScrollTop = 0;
      let scrollUpAccum = 0;
      const HIDE_THRESHOLD = 50;
      const SCROLL_UP_REVEAL_PX = 56;

      window.addEventListener("scroll", () => {
        // Skip if a sheet or chat overlay is open
        if (document.documentElement.classList.contains("mob-sheet-active")) return;
        if (!_chatOverlay.hidden && !_chatOverlay.classList.contains("prewarming")) return;

        const st = window.scrollY || document.documentElement.scrollTop || 0;
        const delta = st - prevScrollTop;
        const goingDown = delta > 0;
        const goingUp = delta < 0;

        if (goingUp) scrollUpAccum += -delta;
        else scrollUpAccum = 0;

        const isAtTop = st <= HIDE_THRESHOLD;

        if (goingDown && st > HIDE_THRESHOLD) {
          if (header) header.classList.add("header-hidden");
        } else if (isAtTop || scrollUpAccum >= SCROLL_UP_REVEAL_PX) {
          if (header) {
            header.classList.remove("header-hidden");
            scrollUpAccum = 0;
          }
        }
        prevScrollTop = st;
      }, { passive: true });
    })();

    __HUB_HEADER_JS__
  </script>
  <div id="safariSafeAreaHack"
    style="position:absolute;bottom:0;width:100%;height:env(safe-area-inset-bottom);pointer-events:none;opacity:0;z-index:-1;">
  </div>
